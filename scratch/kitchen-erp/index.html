<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ERP para Cozinha Industrial — Controle completo de estoque, produção e armazenamento" />
  <title>Controle Cozinha Central — Esphirra's Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QuaggaJS for barcode scanning -->
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="LOGO_BASE64_PLACEHOLDER" alt="Esphirra's Delivery" class="logo-img" />
        <div class="logo-text">
          <span class="logo-title">Controle</span>
          <span class="logo-subtitle">Cozinha Central</span>
        </div>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" title="Fechar menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <div class="nav-section-label">Cadastros</div>
      <a href="#" class="nav-item" data-page="produtos">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span>Produtos</span>
      </a>
      <a href="#" class="nav-item" data-page="fichas">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Fichas Técnicas</span>
      </a>
      <div class="nav-section-label">Movimentação</div>
      <a href="#" class="nav-item" data-page="entrada">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M16 7l5 5-5 5"/></svg>
        <span>Entrada</span>
        <span class="nav-badge" id="badge-entrada">0</span>
      </a>
      <a href="#" class="nav-item" data-page="producao">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        <span>Produção</span>
      </a>
      <a href="#" class="nav-item" data-page="armazenamento">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        <span>Armazenamento</span>
      </a>
      <a href="#" class="nav-item" data-page="saida">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12H3M8 7l-5 5 5 5"/></svg>
        <span>Saída</span>
      </a>
      <div class="nav-section-label">Análise</div>
      <a href="#" class="nav-item" data-page="relatorios">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Relatórios</span>
      </a>
      <a href="#" class="nav-item" data-page="pedidos">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>Pedidos</span>
      </a>
      <div class="nav-section-label">Gestão</div>
      <a href="#" class="nav-item" data-page="dp">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Depto. Pessoal</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">CZ</div>
        <div class="user-details">
          <span class="user-name">Cozinha Industrial</span>
          <span class="user-role">Administrador</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Top Header -->
    <header class="top-header">
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-breadcrumb">
        <span id="pageTitle">Dashboard</span>
      </div>
      <div class="header-actions">
        <div class="date-display" id="dateDisplay"></div>
        <button class="btn-icon" id="notifBtn" title="Notificações">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-dot" id="notifDot"></span>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <div class="page-container" id="pageContainer">
      <!-- Pages loaded dynamically -->
    </div>
  </main>

  <!-- Global Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Título</h3>
        <button class="modal-close" id="modalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Barcode Scanner Overlay -->
  <div class="scanner-overlay" id="scannerOverlay">
    <div class="scanner-container">
      <div class="scanner-header">
        <h3>📷 Leitura de Código de Barras</h3>
        <button class="scanner-close" id="scannerClose">✕</button>
      </div>
      <div class="scanner-viewport" id="scannerViewport">
        <div id="interactive" class="viewport"></div>
        <div class="scanner-line"></div>
      </div>
      <div class="scanner-result" id="scannerResult">
        <p>Aponte a câmera para o código de barras...</p>
      </div>
      <div class="scanner-manual">
        <input type="text" id="manualBarcode" placeholder="Ou digite o código manualmente" />
        <button class="btn btn-primary" id="manualBarcodeBtn">OK</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  
  
  
  
  
  
  
  
  
  
  
  <script src="js/db.js"></script>
  <script src="js/barcode.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/produtos.js"></script>
  <script src="js/fichas.js"></script>
  <script src="js/entrada.js"></script>
  <script src="js/producao.js"></script>
  <script src="js/armazenamento.js"></script>
  <script src="js/saida.js"></script>
  <script src="js/pedidos.js"></script>
  <script src="js/relatorios.js"></script>
  <script src="js/dp.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
