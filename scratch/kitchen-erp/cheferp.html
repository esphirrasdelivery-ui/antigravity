  formatarChave: function(input) {
    var nums = input.value.replace(/\D/g, '').substr(0, 44);
    var fmt  = nums.match(/.{1,4}/g);
    input.value = fmt ? fmt.join(' ') : nums;
    var infoEl = document.getElementById('nfeChaveInfo');
    if (!infoEl) return;
    if (nums.length === 44) {
      infoEl.innerHTML = '<span style="color:var(--accent)">✅ Chave válida — ' + EntradaPage._extrairInfoChave(nums) + '</span>';
    } else {
      infoEl.innerHTML = nums.length > 0 ? '<span style="color:var(--text-muted)">' + nums.length + '/44 dígitos</span>' : '';
    }
  },

  _extrairInfoChave: function(chave) {
    var estados = {'11':'RO','12':'AC','13':'AM','14':'RR','15':'PA','16':'AP','17':'TO','21':'MA','22':'PI','23':'CE','24':'RN','25':'PB','26':'PE','27':'AL','28':'SE','29':'BA','31':'MG','32':'ES','33':'RJ','35':'SP','41':'PR','42':'SC','43':'RS','50':'MS','51':'MT','52':'GO','53':'DF'};
    var cuf = chave.substr(0,2), aamm = chave.substr(2,4), cnpj = chave.substr(6,14), mod = chave.substr(20,2);
    var nNF = parseInt(chave.substr(25,9));
    var uf  = estados[cuf] || 'UF'+cuf;
    var modelo = mod === '65' ? 'NFC-e' : 'NF-e';
    return modelo + ' nº ' + nNF + ' | ' + uf + ' | ' + aamm.substr(2,2) + '/20' + aamm.substr(0,2) + ' | CNPJ: ' + cnpj.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  },

  buscarNFePorChave: function() {
    var input = document.getElementById('nfeChave');
    if (!input) return;
    var chave = input.value.replace(/\D/g, '');
    if (chave.length !== 44) { App.showToast('Chave de acesso deve ter 44 dígitos', 'warning'); return; }
    EntradaPage._setNFeStatus(true, 'Conectando ao portal SEFAZ...');
    var urls = [
      'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://www.nfe.fazenda.gov.br/portal/downloadNFe.aspx?chave=' + chave + '&tipo=XML'),
      'https://corsproxy.io/?' + encodeURIComponent('https://nfe.fazenda.gov.br/portal/downloadNFe.aspx?chave=' + chave + '&tipo=XML')
    ];
    EntradaPage._tentarUrls(urls, 0, chave);
  },

  _tentarUrls: function(urls, idx, chave) {
    if (idx >= urls.length) {
      EntradaPage._setNFeStatus(false);
      App.showToast('Não foi possível buscar automaticamente — use o upload do XML.', 'warning');
      window.open('https://www.nfe.fazenda.gov.br/portal/consultaRecaptcha.aspx?tipoConsulta=resumo&tipoConteudo=7PhJ+gAVw2g=&nfe=' + chave, '_blank');
      return;
    }
    EntradaPage._setNFeStatus(true, 'Tentativa ' + (idx+1) + '/' + urls.length + '...');
    fetch(urls[idx], { signal: AbortSignal.timeout(10000) })
      .then(function(r) { return r.text(); })
      .then(function(txt) {
        if (txt && (txt.includes('<nfeProc') || txt.includes('<NFe'))) {
          EntradaPage._setNFeStatus(false);
          EntradaPage._processarXmlText(txt);
        } else { EntradaPage._tentarUrls(urls, idx+1, chave); }
      })
      .catch(function() { EntradaPage._tentarUrls(urls, idx+1, chave); });
  },

  processarXmlFile: function(input) {
    if (!input || !input.files || !input.files[0]) return;
    var file = input.files[0];
    var statusEl = document.getElementById('nfeXMLStatus');
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-secondary)">📖 Lendo <strong>' + file.name + '</strong>...</span>';
    var reader = new FileReader();
    reader.onload = function(e) { EntradaPage._processarXmlText(e.target.result); };
    reader.onerror = function() { if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ Erro ao ler o arquivo</span>'; };
    reader.readAsText(file, 'UTF-8');
  },

  _processarXmlText: function(xmlStr) {
    var parser = new DOMParser();
    var doc    = parser.parseFromString(xmlStr, 'application/xml');
    var infNFe = doc.querySelector('infNFe') || doc.getElementsByTagName('infNFe')[0];
    if (!infNFe) { App.showToast('XML inválido ou não é uma NF-e', 'danger'); return; }

    var getVal = function(root, tag) {
      var found = root.querySelector ? root.querySelector(tag) : null;
      if (!found) { var els = root.getElementsByTagName(tag); found = els && els[0] ? els[0] : null; }
      return found ? found.textContent.trim() : '';
    };

    var emitente = getVal(doc, 'xNome') || 'Fornecedor';
    var nNF      = getVal(doc, 'nNF');
    var dEmi     = (getVal(doc, 'dEmi') || getVal(doc, 'dhEmi') || '').substr(0,10);

    var detEls = doc.querySelectorAll ? doc.querySelectorAll('det') : doc.getElementsByTagName('det');
    var itens  = [];
    for (var d = 0; d < detEls.length; d++) {
      var det = detEls[d];
      var xProd = getVal(det,'xProd'), cEAN = getVal(det,'cEAN');
      var qCom  = parseFloat(getVal(det,'qCom') || '0');
      var vUnCom = parseFloat(getVal(det,'vUnCom') || '0');
      var uCom  = getVal(det,'uCom');
      if (!xProd || qCom <= 0) continue;
      itens.push({ xProd:xProd, cEAN:cEAN, qCom:qCom, vUnCom:vUnCom, uCom:uCom, prodMatch: EntradaPage._matchProduto(cEAN, xProd) });
    }

    if (itens.length === 0) { App.showToast('Nenhum item encontrado no XML', 'warning'); return; }
    App.closeModal();
    setTimeout(function() { EntradaPage._exibirPreviewNFe(emitente, nNF, dEmi, itens); }, 200);
  },

  _matchProduto: function(cEAN, xProd) {
    var produtos = DB.getProdutos();
    if (cEAN && cEAN.length > 3 && cEAN !== 'SEM GTIN') {
      var byEAN = null;
      for (var i = 0; i < produtos.length; i++) { if (produtos[i].codigoBarras === cEAN) { byEAN = produtos[i]; break; } }
      if (byEAN) return { produto: byEAN, metodo: 'EAN', confianca: 100 };
    }
    var norm = function(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim(); };
    var nomeNF = norm(xProd);
    var melhor = null, melhorScore = 0;
    produtos.forEach(function(p) {
      var words1 = nomeNF.split(' ').filter(function(w){return w.length>2;});
      var words2 = norm(p.nome).split(' ').filter(function(w){return w.length>2;});
      var comuns = words1.filter(function(w){return words2.indexOf(w)>=0;}).length;
      var score  = words1.length > 0 ? comuns / words1.length * 100 : 0;
      if (score > melhorScore && score >= 40) { melhorScore = score; melhor = p; }
    });
    return melhor ? { produto: melhor, metodo: 'Nome', confianca: Math.round(melhorScore) } : null;
  },

  _exibirPreviewNFe: function(emitente, nNF, dEmi, itens) {
    var prodOptions = function(selId) {
      return DB.getProdutos().sort(function(a,b){return a.nome.localeCompare(b.nome);}).map(function(p) {
        return '<option value="' + p.id + '">' + p.nome + '</option>';
      }).join('');
    };

    var rows = itens.map(function(item, idx) {
      var match    = item.prodMatch;
      var selVal   = match ? match.produto.id : '';
      var opts     = '<option value="">— Ignorar —</option>' + DB.getProdutos().sort(function(a,b){return a.nome.localeCompare(b.nome);}).map(function(p){ return '<option value="' + p.id + '"' + (p.id===selVal?' selected':'') + '>' + p.nome + '</option>'; }).join('');

      var vinculoCell;
      if (match) {
        vinculoCell = '<span style="color:var(--accent);font-size:.72rem">✅ ' + match.produto.nome + ' (' + match.metodo + ' ' + match.confianca + '%)</span>'
          + '<br><select id="nfeProdSel_'+idx+'" style="font-size:.75rem;padding:3px;width:100%;margin-top:4px">' + opts + '</select>';
      } else {
        vinculoCell = '<div id="nfeCadastroArea_'+idx+'" style="display:flex;flex-direction:column;gap:6px">'
          + '<button type="button" onclick="EntradaPage.cadastrarProdutoNFe('+idx+')"'
          + ' style="background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;border-radius:6px;'
          + 'padding:6px 10px;font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;width:fit-content">'
          + '<span style="font-size:.9rem">➕</span> Cadastrar Produto</button>'
          + '<span style="color:#f59e0b;font-size:.7rem">⚠️ Não encontrado no sistema</span>'
          + '<select id="nfeProdSel_'+idx+'" style="font-size:.75rem;padding:3px;width:100%">' + opts + '</select>'
          + '</div>';
      }

      return '<tr id="nfeRow_'+idx+'">'
        + '<td style="font-size:.78rem">' + item.xProd + (item.cEAN && item.cEAN.length>3 ? '<br><code style="font-size:.68rem;color:var(--text-muted)">EAN: '+item.cEAN+'</code>' : '') + '</td>'
        + '<td style="font-weight:700">' + item.qCom + ' ' + item.uCom + '</td>'
        + '<td>R$ ' + item.vUnCom.toFixed(2) + '</td>'
        + '<td id="nfeVinculoCell_'+idx+'">' + vinculoCell + '</td>'
        + '<td style="text-align:center"><input type="checkbox" id="nfeCheck_'+idx+'" '+(match?'checked':'')+' style="width:18px;height:18px;cursor:pointer"></td>'
        + '</tr>';
    }).join('');

    var dataFmt = dEmi ? dEmi.split('-').reverse().join('/') : '—';
    var body = '<div><div style="display:flex;gap:24px;flex-wrap:wrap;padding:12px 16px;background:var(--bg-input);border-radius:8px;margin-bottom:16px">'
      + '<div><div style="font-size:.7rem;color:var(--text-muted)">FORNECEDOR</div><div style="font-weight:700">' + emitente + '</div></div>'
      + '<div><div style="font-size:.7rem;color:var(--text-muted)">NF-e Nº</div><div style="font-weight:700">' + (nNF||'—') + '</div></div>'
      + '<div><div style="font-size:.7rem;color:var(--text-muted)">EMISSÃO</div><div style="font-weight:700">' + dataFmt + '</div></div>'
      + '<div><div style="font-size:.7rem;color:var(--text-muted)">ITENS</div><div style="font-weight:700">' + itens.length + '</div></div>'
      + '</div>'
      + '<div style="max-height:360px;overflow-y:auto"><table><thead><tr><th>Produto na NF-e</th><th>Qtd</th><th>Custo Unit.</th><th>Vincular ao cadastro</th><th>✔</th></tr></thead><tbody>' + rows + '</tbody></table></div>'
      + '<p style="margin-top:12px;font-size:.78rem;color:var(--text-secondary)">Marque os itens a importar e vincule cada produto da NF ao cadastro do sistema. Itens não vinculados são ignorados.</p>'
      + '</div>';

    window._nfeItens = itens;
    window._nfeMeta  = { emitente: emitente, nNF: nNF };

    App.openModal('📋 Prévia NF-e — Confirmar Importação', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: '📥 Importar Selecionados', class: 'btn-primary', action: 'EntradaPage.confirmarImportacaoNFe()' }
    ], 'modal-lg');
  },

  confirmarImportacaoNFe: function() {
    var itens = window._nfeItens || [], meta = window._nfeMeta || {}, count = 0;
    itens.forEach(function(item, idx) {
      var chk   = document.getElementById('nfeCheck_' + idx);
      var selEl = document.getElementById('nfeProdSel_' + idx);
      if (!chk || !chk.checked || !selEl || !selEl.value) return;
      var produto = DB.getProdutoPorId(selEl.value);
      if (!produto) return;
      var lote = DB._gerarLote();
      DB.addMovimentacao({ tipo:'entrada', produtoId:produto.id, produtoNome:produto.nome, quantidade:item.qCom, custo:item.vUnCom, fornecedor:meta.emitente||'', notaFiscal:meta.nNF||'', validade:'', lote:lote, observacao:'Importado NF-e: '+item.xProd });
      DB.addLote({ produtoId:produto.id, produtoNome:produto.nome, lote:lote, quantidadeInicial:item.qCom, quantidadeAtual:item.qCom, local:produto.local||'Câmara Seca', validade:'', fornecedor:meta.emitente||'', notaFiscal:meta.nNF||'' });
      if (item.vUnCom > 0) DB.updateProduto(produto.id, { custo: item.vUnCom });
      count++;
    });
    App.closeModal();
    App.showToast(count > 0 ? '✅ ' + count + ' produto(s) importados da NF-e!' : 'Nenhum item importado.', count > 0 ? 'success' : 'warning');
    App.navigateTo('entrada');
  },

  // Abre modal de cadastro rápido usando dados da NF-e, e após salvar atualiza o select da linha
  cadastrarProdutoNFe: function(idx) {
    var item = (window._nfeItens || [])[idx];
    if (!item) return;

    // Normaliza unidade NF-e → sistema
    var unitMap = {'KG':'kg','G':'g','L':'L','ML':'ml','UN':'un','CX':'cx','PCT':'pct','FD':'fardo','PC':'pct','DZ':'dz'};
    var unidade = unitMap[(item.uCom||'').toUpperCase()] || 'kg';
    var unidades = ['kg','g','L','ml','un','cx','fardo','pct','dz'];
    var unidOpts = unidades.map(function(u){ return '<option value="'+u+'"'+(u===unidade?' selected':'')+'>'+u+'</option>'; }).join('');

    var categorias = ['Carnes','Hortifruti','Laticínios','Grãos e Cereais','Condimentos','Bebidas','Embalagens','Higiene/Limpeza','Outros'];
    var catOpts = categorias.map(function(c){ return '<option value="'+c+'">'+c+'</option>'; }).join('');

    // Nome tratado: capitaliza primeira letra de cada palavra
    var nomeFormatado = item.xProd.toLowerCase().replace(/\b\w/g, function(l){ return l.toUpperCase(); });

    var body = '<form id="formCadAutoNFe" onsubmit="return false">'
      + '<div style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);border-radius:8px;padding:12px;margin-bottom:16px;font-size:.8rem">'
      + '<strong style="color:#818cf8">📄 Dados da NF-e:</strong> ' + item.xProd
      + (item.cEAN && item.cEAN.length>3 ? ' &nbsp;|&nbsp; EAN: <code>'+item.cEAN+'</code>' : '')
      + ' &nbsp;|&nbsp; ' + item.qCom + ' ' + item.uCom + ' &nbsp;|&nbsp; R$ ' + item.vUnCom.toFixed(2)
      + '</div>'
      + '<div class="form-grid">'
      + '<div class="form-group"><label>Nome do Produto *</label><input type="text" id="cadAutoNome" required value="'+nomeFormatado+'" /></div>'
      + '<div class="form-group"><label>Categoria *</label><select id="cadAutoCat" required><option value="">Selecione...</option>'+catOpts+'</select></div>'
      + '<div class="form-group"><label>Código de Barras EAN</label><input type="text" id="cadAutoEAN" value="'+(item.cEAN && item.cEAN.length>3 ? item.cEAN : '')+'" style="font-family:monospace" /></div>'
      + '<div class="form-group"><label>Unidade de Medida *</label><select id="cadAutoUnidade" required>'+unidOpts+'</select></div>'
      + '<div class="form-group"><label>Custo Unitário (R$)</label><input type="number" id="cadAutoCusto" min="0" step="0.01" value="'+item.vUnCom.toFixed(2)+'" /></div>'
      + '<div class="form-group"><label>Fornecedor</label><input type="text" id="cadAutoFornecedor" value="'+(window._nfeMeta && window._nfeMeta.emitente ? window._nfeMeta.emitente : '')+'" /></div>'
      + '</div>'
      + '</form>';

    App.openModal('➕ Cadastrar Produto da NF-e', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: '✅ Cadastrar e Vincular', class: 'btn-primary',
        action: 'EntradaPage._salvarCadastroAutoNFe(' + idx + ')' }
    ]);
  },

  _salvarCadastroAutoNFe: function(idx) {
    var nome     = (document.getElementById('cadAutoNome')     || {}).value || '';
    var cat      = (document.getElementById('cadAutoCat')      || {}).value || '';
    var ean      = (document.getElementById('cadAutoEAN')      || {}).value || '';
    var unidade  = (document.getElementById('cadAutoUnidade')  || {}).value || 'kg';
    var custo    = parseFloat((document.getElementById('cadAutoCusto') || {}).value) || 0;
    var fornec   = (document.getElementById('cadAutoFornecedor') || {}).value || '';

    if (!nome.trim()) { App.showToast('Informe o nome do produto', 'warning'); return; }
    if (!cat)         { App.showToast('Selecione a categoria', 'warning'); return; }

    var item       = (window._nfeItens || [])[idx];
    var meta       = window._nfeMeta || {};

    var novoProduto = DB.addProduto({
      nome: nome.trim(),
      categoria: cat,
      codigoBarras: ean.trim(),
      codigoInterno: '',
      unidade: unidade,
      custo: custo,
      fornecedor: fornec.trim(),
      estoque: 0,
      estoqueMinimo: 0,
      estoqueMaximo: 0,
      local: 'Câmara Fria',
      formaEntrega: '',
      qtdPorUnidade: 0,
      temperatura: '',
      observacoes: 'Cadastrado automaticamente via NF-e'
    });

    // Alimenta o estoque imediatamente com a quantidade da NF-e
    if (item && item.qCom > 0) {
      var lote = DB._gerarLote();
      DB.addMovimentacao({
        tipo:        'entrada',
        produtoId:   novoProduto.id,
        produtoNome: novoProduto.nome,
        quantidade:  item.qCom,
        custo:       item.vUnCom || custo,
        fornecedor:  meta.emitente || fornec.trim(),
        notaFiscal:  meta.nNF || '',
        validade:    '',
        lote:        lote,
        observacao:  'Entrada automática via NF-e: ' + item.xProd
      });
      DB.addLote({
        produtoId:        novoProduto.id,
        produtoNome:      novoProduto.nome,
        lote:             lote,
        quantidadeInicial: item.qCom,
        quantidadeAtual:  item.qCom,
        local:            'Câmara Fria',
        validade:         '',
        fornecedor:       meta.emitente || fornec.trim(),
        notaFiscal:       meta.nNF || ''
      });
    }

    App.closeModal();

    // Atualiza a célula da linha no preview sem fechar o preview
    var cellEl = document.getElementById('nfeVinculoCell_' + idx);
    if (cellEl) {
      var qtdTexto = item ? item.qCom + ' ' + item.uCom : '';
      cellEl.innerHTML = '<span style="color:var(--accent);font-size:.78rem;font-weight:700">✅ ' + novoProduto.nome + '</span>'
        + '<br><span style="color:#10b981;font-size:.7rem">📦 Estoque atualizado: +' + qtdTexto + ' já registrado</span>';
    }

    // Marca o checkbox como já importado e desabilita para não duplicar
    var chk = document.getElementById('nfeCheck_' + idx);
    if (chk) {
      chk.checked  = false;   // desmarca — já foi importado diretamente
      chk.disabled = true;
      chk.title    = 'Já importado automaticamente';
    }

    // Destaca a linha em verde
    var row = document.getElementById('nfeRow_' + idx);
    if (row) {
      row.style.background  = 'rgba(16,185,129,0.12)';
      row.style.transition  = 'background 0.4s';
    }

    App.showToast('✅ "' + novoProduto.nome + '" cadastrado e ' + (item ? item.qCom + ' ' + item.uCom : '') + ' adicionados ao estoque!', 'success');
  },

  _setNFeStatus: function(show, msg) {
    var el = document.getElementById('nfeProcessingStatus');
    var txt = document.getElementById('nfeStatusMsg');
    if (el) el.style.display = show ? 'block' : 'none';
    if (txt && msg) txt.textContent = msg;
  }
};



/**
 * producao.js — Módulo de Produção
 */

const ProducaoPage = {
  fichaPreSelecionada: null,

  render() {
    const producoes = DB.getProducoes().sort((a, b) => new Date(b.data) - new Date(a.data));
    const fichas = DB.getFichas();

    return `
      <div class="page-header">
        <div>
          <h1>🍳 Produção</h1>
          <p>Registro de produções e controle de ingredientes consumidos</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="ProducaoPage.openModal()">+ Nova Produção</button>
        </div>
      </div>

      <!-- Cards de Fichas -->
      ${fichas.length > 0 ? `
      <div class="card mb-16">
        <h3 style="font-size:.9rem;font-weight:600;color:var(--text-secondary);margin-bottom:12px">🚀 Produção Rápida — Selecione uma Ficha Técnica</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${fichas.map(f => {
            const disponivel = FichasPage.verificarDisponibilidade(f);
            return `
              <button class="btn ${disponivel ? 'btn-secondary' : 'btn-secondary'} btn-sm"
                style="${disponivel ? 'border-color:var(--accent);color:var(--accent)' : 'opacity:.6'}"
                onclick="ProducaoPage.iniciarProducaoFicha('${f.id}')"
                title="${disponivel ? 'Iniciar produção' : 'Ingredientes insuficientes'}">
                ${disponivel ? '✅' : '⚠️'} ${f.nome}
              </button>
            `;
          }).join('')}
        </div>
      </div>` : ''}

      <!-- Histórico de Produções -->
      <div class="table-container">
        <div class="table-toolbar">
          <div style="font-weight:600;font-size:.9rem">Histórico de Produções</div>
          <span style="font-size:.8rem;color:var(--text-muted)">${producoes.length} produções</span>
        </div>
        ${producoes.length === 0 ?
          `<div class="empty-state"><div class="empty-icon">🍳</div><h3>Nenhuma produção registrada</h3><p>Clique em "+ Nova Produção" para começar</p></div>` :
          `<table>
            <thead><tr><th>Data</th><th>Produto/Ficha</th><th>Lote</th><th>Rendimento</th><th>Ingredientes Consumidos</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>
              ${producoes.slice(0,50).map(p => {
                const ficha = p.fichaId ? DB.getFichas().find(f => f.id === p.fichaId) : null;
                const numIng = p.ingredientesConsumidos?.length || 0;
                return `<tr>
                  <td style="font-size:.8rem;white-space:nowrap">${new Date(p.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                  <td>
                    <strong>${p.nomeProduto || ficha?.nome || '—'}</strong>
                    ${ficha ? `<br><span style="font-size:.72rem;color:var(--text-muted)">Ficha: ${ficha.nome}</span>` : ''}
                  </td>
                  <td><code style="font-size:.75rem;color:var(--text-secondary)">${p.lote}</code></td>
                  <td class="text-accent fw-bold">${p.quantidade} ${p.unidade||'un'}</td>
                  <td style="font-size:.78rem;color:var(--text-muted)">${numIng} item(ns)</td>
                  <td><span class="badge badge-success">✅ Concluído</span></td>
                  <td>
                    <button class="btn btn-secondary btn-sm" onclick="ProducaoPage.verDetalhes('${p.id}')">👁️</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`
        }
      </div>
    `;
  },

  iniciarProducaoFicha(fichaId) {
    this.fichaPreSelecionada = fichaId;
    this.openModal();
  },

  openModal() {
    const fichas = DB.getFichas();
    const produtos = DB.getProdutos();
    const fichaId = this.fichaPreSelecionada;
    const ficha = fichaId ? fichas.find(f => f.id === fichaId) : null;

    const body = `
      <form id="formProducao" onsubmit="ProducaoPage.salvar(event)">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Ficha Técnica (opcional)</label>
            <select id="prFicha" onchange="ProducaoPage.onFichaChange(this.value)">
              <option value="">— Produção sem ficha técnica —</option>
              ${fichas.map(f => `<option value="${f.id}" ${fichaId===f.id?'selected':''}>${f.nome} (${f.rendimento} ${f.unidadeRendimento||'porções'})</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Produto Produzido *</label>
            <select id="prProduto" required>
              <option value="">Selecione...</option>
              ${produtos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('')}
            </select>
            <span class="form-hint">Produto que irá para o estoque</span>
          </div>
          <div class="form-group">
            <label>Quantidade Produzida *</label>
            <input type="number" id="prQtd" required min="0.001" step="0.001" placeholder="0" value="${ficha?.rendimento||''}" />
          </div>
          <div class="form-group">
            <label>Unidade</label>
            <input type="text" id="prUnidade" placeholder="Ex: porções" value="${ficha?.unidadeRendimento||'un'}" />
          </div>
          <div class="form-group">
            <label>Data de Validade do Produto</label>
            <input type="date" id="prValidade" />
          </div>
          <div class="form-group">
            <label>Local de Armazenamento</label>
            <select id="prLocal">
              ${['Câmara Fria','Câmara Seca','Despensa','Congelador','Prateleira'].map(l=>`<option>${l}</option>`).join('')}
            </select>
          </div>
          <div class="form-group full-width">
            <label>Observações da Produção</label>
            <textarea id="prObs" placeholder="Anotações, alterações na receita..."></textarea>
          </div>
        </div>

        <div id="ingredientesConsumo" style="margin-top:16px">
          ${ficha ? this.renderIngredientesConsumo(ficha) : ''}
        </div>

        <input type="submit" style="display:none" />
      </form>
    `;

    App.openModal('Nova Produção', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal(); ProducaoPage.fichaPreSelecionada = null;' },
      { label: '🍳 Registrar Produção', class: 'btn-primary', action: `document.getElementById('formProducao').requestSubmit()` }
    ], 'modal-lg');

    this.fichaPreSelecionada = null;
  },

  renderIngredientesConsumo(ficha) {
    if (!ficha?.ingredientes?.length) return '';
    return `
      <div>
        <h4 style="font-size:.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px">📦 Ingredientes que serão consumidos do estoque:</h4>
        <div style="background:var(--bg-input);border-radius:8px;overflow:hidden">
          <table style="margin:0">
            <thead><tr><th>Ingrediente</th><th>Quantidade</th><th>Estoque Atual</th><th>Após Produção</th><th>OK?</th></tr></thead>
            <tbody>
              ${ficha.ingredientes.map(ing => {
                const p = DB.getProdutoPorId(ing.produtoId);
                const estoque = parseFloat(p?.estoque || 0);
                const consumo = parseFloat(ing.quantidade || 0);
                const apos = estoque - consumo;
                const ok = apos >= 0;
                return `<tr>
                  <td style="font-size:.83rem"><strong>${p?.nome || '—'}</strong></td>
                  <td style="font-size:.83rem">${consumo} ${ing.unidade}</td>
                  <td style="font-size:.83rem">${estoque.toFixed(2)} ${p?.unidade||''}</td>
                  <td style="font-size:.83rem" class="${ok ? 'text-accent' : 'text-danger'}">${apos.toFixed(2)} ${p?.unidade||''}</td>
                  <td><span class="badge ${ok?'badge-success':'badge-danger'}">${ok?'✅':'❌'}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  onFichaChange(fichaId) {
    const ficha = fichaId ? DB.getFichas().find(f => f.id === fichaId) : null;
    const div = document.getElementById('ingredientesConsumo');
    if (div) div.innerHTML = ficha ? this.renderIngredientesConsumo(ficha) : '';

    if (ficha) {
      const qtd = document.getElementById('prQtd');
      const und = document.getElementById('prUnidade');
      if (qtd) qtd.value = ficha.rendimento;
      if (und) und.value = ficha.unidadeRendimento || 'un';
    }
  },

  salvar(e) {
    e.preventDefault();
    const fichaId = document.getElementById('prFicha').value;
    const produtoId = document.getElementById('prProduto').value;
    const quantidade = parseFloat(document.getElementById('prQtd').value);
    const unidade = document.getElementById('prUnidade').value;
    const validade = document.getElementById('prValidade').value;
    const local = document.getElementById('prLocal').value;
    const obs = document.getElementById('prObs').value;

    const produto = DB.getProdutoPorId(produtoId);
    const ficha = fichaId ? DB.getFichas().find(f => f.id === fichaId) : null;

    // Verificar disponibilidade
    if (ficha?.ingredientes) {
      for (const ing of ficha.ingredientes) {
        const p = DB.getProdutoPorId(ing.produtoId);
        if (p && parseFloat(p.estoque || 0) < parseFloat(ing.quantidade || 0)) {
          if (!confirm(`⚠️ Estoque insuficiente de "${p.nome}" (${p.estoque} < ${ing.quantidade} ${ing.unidade}). Continuar mesmo assim?`)) return;
          break;
        }
      }
    }

    const lote = DB._gerarLote();
    const ingredientesConsumidos = [];

    // Dar baixa nos ingredientes
    if (ficha?.ingredientes) {
      for (const ing of ficha.ingredientes) {
        const p = DB.getProdutoPorId(ing.produtoId);
        if (p) {
          ingredientesConsumidos.push({ produtoId: p.id, produtoNome: p.nome, quantidade: ing.quantidade, unidade: ing.unidade });
          DB.addMovimentacao({
            tipo: 'consumo',
            produtoId: p.id,
            produtoNome: p.nome,
            quantidade: ing.quantidade,
            motivo: `Produção: ${ficha.nome} (Lote ${lote})`,
            fichaId,
            loteProducao: lote
          });
        }
      }
    }

    // Registrar a produção
    const producao = DB.addProducao({
      fichaId,
      fichaName: ficha?.nome,
      produtoId,
      nomeProduto: produto?.nome,
      quantidade,
      unidade: unidade || produto?.unidade,
      validade,
      local,
      ingredientesConsumidos,
      observacoes: obs
    });

    // Adicionar ao estoque o produto produzido
    DB.addMovimentacao({
      tipo: 'entrada',
      produtoId,
      produtoNome: produto?.nome,
      quantidade,
      validade,
      lote: producao.lote,
      motivo: `Produção interna — ${ficha?.nome || 'Avulso'}`,
      producaoId: producao.id
    });

    // Criar lote do produto produzido
    DB.addLote({
      produtoId,
      produtoNome: produto?.nome,
      lote: producao.lote,
      quantidadeInicial: quantidade,
      quantidadeAtual: quantidade,
      local,
      validade,
      fornecedor: 'Produção Interna'
    });

    App.showToast(`Produção registrada! Lote: ${producao.lote}`, 'success');
    App.closeModal();
    App.navigateTo('producao');
  },

  verDetalhes(id) {
    const p = DB.getProducoes().find(pr => pr.id === id);
    if (!p) return;

    const body = `
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
        <div class="card" style="flex:1;min-width:140px;text-align:center">
          <div style="font-size:1.2rem;font-weight:800;color:var(--accent)">${p.quantidade} ${p.unidade||'un'}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">Produzido</div>
        </div>
        <div class="card" style="flex:1;min-width:140px;text-align:center">
          <div style="font-size:1rem;font-weight:700;color:var(--info)">${p.lote}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">Lote</div>
        </div>
        <div class="card" style="flex:1;min-width:140px;text-align:center">
          <div style="font-size:1rem;font-weight:700;color:var(--warning)">${p.validade || '—'}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">Validade</div>
        </div>
      </div>
      ${p.ingredientesConsumidos?.length ? `
        <h4 style="font-size:.85rem;color:var(--text-secondary);margin-bottom:8px">Ingredientes Consumidos</h4>
        <div class="table-container" style="margin-bottom:12px">
          <table>
            <thead><tr><th>Ingrediente</th><th>Quantidade</th><th>Unidade</th></tr></thead>
            <tbody>
              ${p.ingredientesConsumidos.map(i=>`<tr><td>${i.produtoNome}</td><td>${i.quantidade}</td><td>${i.unidade}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      ` : ''}
      ${p.observacoes ? `<p style="font-size:.83rem;color:var(--text-secondary)">${p.observacoes}</p>` : ''}
    `;

    App.openModal(`Produção — ${p.nomeProduto || p.fichaName}`, body, [
      { label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal()' }
    ]);
  },

  postRender() {}
};

// Helper estendido em FichasPage
FichasPage.verificarDisponibilidade = function(ficha) {
  if (!ficha?.ingredientes?.length) return true;
  return ficha.ingredientes.every(ing => {
    const p = DB.getProdutoPorId(ing.produtoId);
    return p && parseFloat(p.estoque || 0) >= parseFloat(ing.quantidade || 0);
  });
};


/**
 * armazenamento.js — Módulo de Armazenamento
 */

const ArmazenamentoPage = {
  localAtivo: null,
  filtroStatus: 'todos',

  render() {
    const lotes = DB.getLotesAtivos();
    const locais = [...new Set(lotes.map(l => l.local).filter(Boolean))];
    locais.unshift('Todos');

    const hoje = new Date();
    const lotesFiltrados = this.localAtivo && this.localAtivo !== 'Todos'
      ? lotes.filter(l => l.local === this.localAtivo)
      : lotes;

    const totalLocais = {};
    lotes.forEach(l => {
      if (!totalLocais[l.local || 'Sem local']) totalLocais[l.local || 'Sem local'] = 0;
      totalLocais[l.local || 'Sem local']++;
    });

    return `
      <div class="page-header">
        <div>
          <h1>🗄️ Armazenamento</h1>
          <p>Gestão de lotes e localização de produtos em estoque</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary btn-sm" onclick="ArmazenamentoPage.verificarValidades()">
            ⏰ Verificar Validades
          </button>
          <button class="btn btn-primary" onclick="ArmazenamentoPage.openModal()">
            + Registrar Lote
          </button>
        </div>
      </div>

      <!-- Locais de Armazenamento -->
      <div class="storage-grid mb-16">
        ${[
          { nome: 'Todos', icon: '📦', desc: `${lotes.length} lotes` },
          { nome: 'Câmara Fria', icon: '🧊', desc: `${totalLocais['Câmara Fria']||0} lotes` },
          { nome: 'Câmara Seca', icon: '🏠', desc: `${totalLocais['Câmara Seca']||0} lotes` },
          { nome: 'Congelador', icon: '❄️', desc: `${totalLocais['Congelador']||0} lotes` },
          { nome: 'Despensa', icon: '🗃️', desc: `${totalLocais['Despensa']||0} lotes` },
          { nome: 'Prateleira', icon: '📚', desc: `${totalLocais['Prateleira']||0} lotes` },
        ].map(l => `
          <div class="storage-card ${this.localAtivo === l.nome || (!this.localAtivo && l.nome === 'Todos') ? 'selected' : ''}"
               onclick="ArmazenamentoPage.filtrarLocal('${l.nome}')">
            <div class="storage-icon">${l.icon}</div>
            <div class="storage-name">${l.nome}</div>
            <div class="storage-items">${l.desc}</div>
          </div>
        `).join('')}
      </div>

      <!-- Filtros de Status -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="tab-btn ${this.filtroStatus==='todos'?'active':''}" onclick="ArmazenamentoPage.filtrarStatus('todos')">Todos (${lotes.length})</button>
        <button class="tab-btn ${this.filtroStatus==='ok'?'active':''}" onclick="ArmazenamentoPage.filtrarStatus('ok')">✅ OK</button>
        <button class="tab-btn ${this.filtroStatus==='vencendo'?'active':''}" onclick="ArmazenamentoPage.filtrarStatus('vencendo')" style="color:var(--warning)">⏰ Vencendo (${DB.getLotesVencendo().length})</button>
        <button class="tab-btn ${this.filtroStatus==='vencido'?'active':''}" onclick="ArmazenamentoPage.filtrarStatus('vencido')" style="color:var(--danger)">❌ Vencidos (${DB.getLotesVencidos().length})</button>
      </div>

      <!-- Tabela de Lotes -->
      <div class="table-container">
        <div class="table-toolbar">
          <div style="font-weight:600;font-size:.9rem">
            ${this.localAtivo && this.localAtivo !== 'Todos' ? this.localAtivo : 'Todos os Armazéns'}
          </div>
          <span style="font-size:.8rem;color:var(--text-muted)">${this.getLotesFiltrados().length} lotes</span>
        </div>
        ${this.renderTabela()}
      </div>
    `;
  },

  getLotesFiltrados() {
    let lotes = DB.getLotesAtivos();
    const hoje = new Date();

    if (this.localAtivo && this.localAtivo !== 'Todos') {
      lotes = lotes.filter(l => l.local === this.localAtivo);
    }

    if (this.filtroStatus === 'vencendo') {
      const limite = new Date();
      limite.setDate(limite.getDate() + 7);
      lotes = lotes.filter(l => l.validade && new Date(l.validade) <= limite && new Date(l.validade) >= hoje);
    } else if (this.filtroStatus === 'vencido') {
      lotes = lotes.filter(l => l.validade && new Date(l.validade) < hoje);
    } else if (this.filtroStatus === 'ok') {
      lotes = lotes.filter(l => !l.validade || new Date(l.validade) >= new Date(Date.now() + 7*24*60*60*1000));
    }

    return lotes.sort((a, b) => {
      if (!a.validade) return 1;
      if (!b.validade) return -1;
      return new Date(a.validade) - new Date(b.validade);
    });
  },

  renderTabela() {
    const lotes = this.getLotesFiltrados();
    const hoje = new Date();

    if (lotes.length === 0) {
      return `<div class="empty-state"><div class="empty-icon">🗄️</div><h3>Nenhum lote encontrado</h3><p>Registre entradas para ver os lotes aqui</p></div>`;
    }

    return `
      <table>
        <thead><tr>
          <th>Produto</th><th>Lote</th><th>Local</th><th>Qtd Inicial</th><th>Qtd Atual</th>
          <th>Validade</th><th>Fornecedor</th><th>Status</th><th>Ações</th>
        </tr></thead>
        <tbody>
          ${lotes.map(l => {
            const val = l.validade ? new Date(l.validade) : null;
            const diasRestantes = val ? Math.ceil((val - hoje) / (1000*60*60*24)) : null;
            let statusBadge = '<span class="badge badge-success">✅ OK</span>';
            let expiryClass = '';
            if (val) {
              if (val < hoje) { statusBadge = '<span class="badge badge-danger">❌ Vencido</span>'; expiryClass = 'expiry-expired'; }
              else if (diasRestantes <= 3) { statusBadge = `<span class="badge badge-danger">⚠️ ${diasRestantes}d</span>`; expiryClass = 'expiry-expired'; }
              else if (diasRestantes <= 7) { statusBadge = `<span class="badge badge-warning">⏰ ${diasRestantes}d</span>`; expiryClass = 'expiry-near'; }
            }
            const pct = l.quantidadeInicial > 0 ? Math.min(100, (l.quantidadeAtual / l.quantidadeInicial) * 100) : 100;

            return `<tr>
              <td><strong>${l.produtoNome}</strong></td>
              <td><code style="font-size:.75rem;color:var(--text-secondary)">${l.lote}</code></td>
              <td><span class="badge badge-gray">${l.local || '—'}</span></td>
              <td style="font-size:.83rem">${parseFloat(l.quantidadeInicial||0).toFixed(2)}</td>
              <td>
                <div class="stock-level">
                  <div class="stock-level-text"><span style="font-weight:600">${parseFloat(l.quantidadeAtual||0).toFixed(2)}</span></div>
                  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                </div>
              </td>
              <td class="${expiryClass}" style="font-size:.82rem;font-weight:500">${l.validade || '—'}</td>
              <td style="font-size:.78rem">${l.fornecedor || '—'}</td>
              <td>${statusBadge}</td>
              <td>
                <div style="display:flex;gap:4px">
                  <button class="btn btn-secondary btn-sm" onclick="ArmazenamentoPage.editarLote('${l.id}')" title="Editar">✏️</button>
                  <button class="btn btn-warning btn-sm" onclick="ArmazenamentoPage.transferir('${l.id}')" title="Transferir">↔️</button>
                  <button class="btn btn-danger btn-sm" onclick="ArmazenamentoPage.descartar('${l.id}')" title="Descartar">🗑️</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  },

  filtrarLocal(local) {
    this.localAtivo = local;
    App.navigateTo('armazenamento');
  },

  filtrarStatus(status) {
    this.filtroStatus = status;
    App.navigateTo('armazenamento');
  },

  verificarValidades() {
    const vencidos = DB.getLotesVencidos();
    const vencendo = DB.getLotesVencendo(7);

    if (vencidos.length === 0 && vencendo.length === 0) {
      App.showToast('✅ Todas as validades estão em dia!', 'success');
      return;
    }

    const body = `
      ${vencidos.length > 0 ? `
        <div class="alert alert-danger">❌ ${vencidos.length} lote(s) VENCIDOS — Descarte imediato necessário!</div>
        <div class="table-container" style="margin-bottom:16px">
          <table>
            <thead><tr><th>Produto</th><th>Lote</th><th>Validade</th><th>Qtd</th><th>Local</th></tr></thead>
            <tbody>${vencidos.map(l=>
              `<tr style="background:var(--danger-dim)">
                <td><strong>${l.produtoNome}</strong></td>
                <td><code style="font-size:.75rem">${l.lote}</code></td>
                <td class="expiry-expired">${l.validade}</td>
                <td>${l.quantidadeAtual}</td>
                <td>${l.local}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : ''}

      ${vencendo.length > 0 ? `
        <div class="alert alert-warning">⏰ ${vencendo.length} lote(s) vencem nos próximos 7 dias</div>
        <div class="table-container">
          <table>
            <thead><tr><th>Produto</th><th>Lote</th><th>Validade</th><th>Dias</th><th>Local</th></tr></thead>
            <tbody>${vencendo.map(l=>{
              const dias = Math.ceil((new Date(l.validade)-new Date())/(1000*60*60*24));
              return `<tr>
                <td><strong>${l.produtoNome}</strong></td>
                <td><code style="font-size:.75rem">${l.lote}</code></td>
                <td class="expiry-near">${l.validade}</td>
                <td class="expiry-near fw-bold">${dias}d</td>
                <td>${l.local}</td>
              </tr>`;
            }).join('')}
            </tbody>
          </table>
        </div>` : ''}
    `;

    App.openModal('⚠️ Alerta de Validades', body, [
      { label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal()' }
    ], 'modal-lg');
  },

  openModal() {
    const produtos = DB.getProdutos();
    const body = `
      <form id="formLote" onsubmit="ArmazenamentoPage.salvarLote(event)">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Produto *</label>
            <select id="lProduto" required>
              <option value="">Selecione...</option>
              ${produtos.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Quantidade *</label>
            <input type="number" id="lQtd" required min="0.001" step="0.001" />
          </div>
          <div class="form-group">
            <label>Local de Armazenamento</label>
            <select id="lLocal">
              ${['Câmara Fria','Câmara Seca','Congelador','Despensa','Prateleira','Adega'].map(l=>`<option>${l}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Data de Validade</label>
            <input type="date" id="lValidade" />
          </div>
          <div class="form-group">
            <label>Fornecedor</label>
            <input type="text" id="lFornecedor" placeholder="Nome" />
          </div>
        </div>
        <input type="submit" style="display:none" />
      </form>
    `;
    App.openModal('Registrar Lote', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: 'Salvar', class: 'btn-primary', action: `document.getElementById('formLote').requestSubmit()` }
    ]);
  },

  salvarLote(e) {
    e.preventDefault();
    const produtoId = document.getElementById('lProduto').value;
    const quantidade = parseFloat(document.getElementById('lQtd').value);
    const local = document.getElementById('lLocal').value;
    const validade = document.getElementById('lValidade').value;
    const fornecedor = document.getElementById('lFornecedor').value;
    const produto = DB.getProdutoPorId(produtoId);

    DB.addLote({
      produtoId, produtoNome: produto?.nome,
      lote: DB._gerarLote(),
      quantidadeInicial: quantidade, quantidadeAtual: quantidade,
      local, validade, fornecedor
    });
    DB.addMovimentacao({ tipo: 'entrada', produtoId, produtoNome: produto?.nome, quantidade, local, validade, motivo: 'Registro manual de lote' });

    App.showToast('Lote registrado!', 'success');
    App.closeModal();
    App.navigateTo('armazenamento');
  },

  editarLote(id) {
    const lote = DB.getLotes().find(l => l.id === id);
    if (!lote) return;
    const locais = ['Câmara Fria','Câmara Seca','Congelador','Despensa','Prateleira','Adega'];
    const body = `
      <form id="formEditLote" onsubmit="ArmazenamentoPage.salvarEdicaoLote(event, '${id}')">
        <div class="form-grid">
          <div class="form-group">
            <label>Quantidade Atual</label>
            <input type="number" id="elQtd" value="${lote.quantidadeAtual}" min="0" step="0.001" />
          </div>
          <div class="form-group">
            <label>Local</label>
            <select id="elLocal">
              ${locais.map(l=>`<option ${l===lote.local?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Validade</label>
            <input type="date" id="elValidade" value="${lote.validade||''}" />
          </div>
        </div>
        <input type="submit" style="display:none" />
      </form>
    `;
    App.openModal(`Editar Lote — ${lote.produtoNome}`, body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: 'Salvar', class: 'btn-primary', action: `document.getElementById('formEditLote').requestSubmit()` }
    ]);
  },

  salvarEdicaoLote(e, id) {
    e.preventDefault();
    DB.updateLote(id, {
      quantidadeAtual: parseFloat(document.getElementById('elQtd').value),
      local: document.getElementById('elLocal').value,
      validade: document.getElementById('elValidade').value
    });
    App.showToast('Lote atualizado!', 'success');
    App.closeModal();
    App.navigateTo('armazenamento');
  },

  transferir(id) {
    const lote = DB.getLotes().find(l => l.id === id);
    if (!lote) return;
    const locais = ['Câmara Fria','Câmara Seca','Congelador','Despensa','Prateleira','Adega'];
    const body = `
      <p style="margin-bottom:16px;font-size:.85rem">Transferindo lote <strong>${lote.lote}</strong> de <span class="badge badge-info">${lote.local}</span></p>
      <div class="form-group">
        <label>Novo Local</label>
        <select id="transLocal">
          ${locais.filter(l=>l!==lote.local).map(l=>`<option>${l}</option>`).join('')}
        </select>
      </div>
    `;
    App.openModal('Transferir Lote', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: '↔️ Transferir', class: 'btn-primary', action: `ArmazenamentoPage.confirmarTransferencia('${id}')` }
    ]);
  },

  confirmarTransferencia(id) {
    const novoLocal = document.getElementById('transLocal').value;
    DB.updateLote(id, { local: novoLocal });
    App.showToast(`Lote transferido para ${novoLocal}`, 'success');
    App.closeModal();
    App.navigateTo('armazenamento');
  },

  descartar(id) {
    const lote = DB.getLotes().find(l => l.id === id);
    if (!lote) return;
    if (!confirm(`Descartar lote "${lote.lote}" (${lote.quantidadeAtual} un. de ${lote.produtoNome})?`)) return;

    DB.addMovimentacao({
      tipo: 'saida',
      produtoId: lote.produtoId,
      produtoNome: lote.produtoNome,
      quantidade: lote.quantidadeAtual,
      motivo: 'Descarte — vencimento/avaria',
      lote: lote.lote
    });
    DB.updateLote(id, { quantidadeAtual: 0 });
    App.showToast('Lote descartado e baixa no estoque realizada.', 'warning');
    App.navigateTo('armazenamento');
  },

  postRender() {}
};

                  const motivoColor = s.motivo?.toLowerCase().includes('descarte') ? 'badge-danger' : 
                    s.motivo?.toLowerCase().includes('venda') ? 'badge-success' : 'badge-gray';
                  return `<tr>
                    <td style="font-size:.8rem;white-space:nowrap">${new Date(s.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                    <td><strong>${p?.nome || s.produtoNome || '—'}</strong></td>
                    <td class="text-danger fw-bold">-${s.quantidade} ${p?.unidade||''}</td>
                    <td><span class="badge ${motivoColor}">${s.motivo||'—'}</span></td>
                    <td style="font-size:.78rem;color:var(--text-muted)">${s.observacao||'—'}</td>
                    <td style="font-size:.78rem">${s.responsavel||'—'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`
        }
      </div>
    `;
  },

  atualizarEstoqueInfo(produtoId) {
    const el = document.getElementById('srEstoqueInfo');
    if (!el) return;
    const p = DB.getProdutoPorId(produtoId);
    if (!p) { el.textContent = ''; return; }
    const estoque = parseFloat(p.estoque || 0);
    const cor = estoque <= parseFloat(p.estoqueMinimo || 0) ? 'var(--danger)' : 'var(--accent)';
    el.innerHTML = `<span style="color:${cor}">Estoque disponível: <strong>${estoque.toFixed(2)} ${p.unidade}</strong></span>`;
  },

  scanSaida() {
    BarcodeScanner.open((codigo) => {
      const p = DB.getProdutoPorCodigo(codigo);
      if (p) {
        const sel = document.getElementById('srProduto');
        if (sel) {
          sel.value = p.id;
          this.atualizarEstoqueInfo(p.id);
          App.showToast(`Produto: ${p.nome}`, 'success');
        }
      } else {
        App.showToast(`Código ${codigo} não encontrado`, 'warning');
      }
    });
  },

  salvarRapido(e) {
    e.preventDefault();
    const produtoId = document.getElementById('srProduto').value;
    const quantidade = parseFloat(document.getElementById('srQtd').value);
    const motivo = document.getElementById('srMotivo').value;
    const obs = document.getElementById('srObs').value.trim();

    const produto = DB.getProdutoPorId(produtoId);
    if (!produto || !quantidade) return;

    const estoque = parseFloat(produto.estoque || 0);
    if (quantidade > estoque) {
      if (!confirm(`⚠️ Quantidade (${quantidade}) maior que o estoque (${estoque} ${produto.unidade}). Continuar?`)) return;
    }

    DB.addMovimentacao({ tipo: 'saida', produtoId, produtoNome: produto.nome, quantidade, motivo, observacao: obs });

    App.showToast(`Saída de ${quantidade} ${produto.unidade} de "${produto.nome}" registrada!`, 'success');
    e.target.reset();
    document.getElementById('srEstoqueInfo').textContent = '';
    App.navigateTo('saida');
  },

  openModal() {
    const produtos = DB.getProdutos().filter(p => parseFloat(p.estoque || 0) > 0);
    const body = `
      <form id="formSaidaCompleto" onsubmit="SaidaPage.salvarCompleto(event)">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Produto *</label>
            <div class="input-group">
              <select id="scProduto" required onchange="SaidaPage.updateEstoqueModal(this.value)">
                <option value="">Selecione...</option>
                ${produtos.map(p => `<option value="${p.id}">${p.nome} (${parseFloat(p.estoque||0).toFixed(2)} ${p.unidade})</option>`).join('')}
              </select>
              <button type="button" class="btn btn-secondary" onclick="SaidaPage.scanCompleto()">📷</button>
            </div>
            <div id="scEstoqueInfo" class="form-hint"></div>
          </div>
          <div class="form-group">
            <label>Quantidade *</label>
            <input type="number" id="scQtd" required min="0.001" step="0.001" />
          </div>
          <div class="form-group">
            <label>Motivo *</label>
            <select id="scMotivo" required>
              <option>Consumo interno</option>
              <option>Venda</option>
              <option>Descarte/Vencimento</option>
              <option>Transferência</option>
              <option>Ajuste de estoque</option>
              <option>Outro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Responsável</label>
            <input type="text" id="scResponsavel" placeholder="Nome do responsável" />
          </div>
          <div class="form-group full-width">
            <label>Observação</label>
            <textarea id="scObs" placeholder="Detalhes da saída..."></textarea>
          </div>
        </div>
        <input type="submit" style="display:none" />
      </form>
    `;
    App.openModal('Registrar Saída', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: '📤 Registrar Saída', class: 'btn-primary', action: `document.getElementById('formSaidaCompleto').requestSubmit()` }
    ]);
  },

  updateEstoqueModal(produtoId) {
    const el = document.getElementById('scEstoqueInfo');
    if (!el) return;
    const p = DB.getProdutoPorId(produtoId);
    if (!p) { el.textContent = ''; return; }
    el.innerHTML = `Estoque atual: <strong style="color:var(--accent)">${parseFloat(p.estoque||0).toFixed(2)} ${p.unidade}</strong>`;
  },

  scanCompleto() {
    BarcodeScanner.open((codigo) => {
      const p = DB.getProdutoPorCodigo(codigo);
      if (p) {
        const sel = document.getElementById('scProduto');
        if (sel) { sel.value = p.id; this.updateEstoqueModal(p.id); }
      }
    });
  },

  salvarCompleto(e) {
    e.preventDefault();
    const produtoId = document.getElementById('scProduto').value;
    const quantidade = parseFloat(document.getElementById('scQtd').value);
    const motivo = document.getElementById('scMotivo').value;
    const responsavel = document.getElementById('scResponsavel').value.trim();
    const obs = document.getElementById('scObs').value.trim();
    const produto = DB.getProdutoPorId(produtoId);

    DB.addMovimentacao({ tipo: 'saida', produtoId, produtoNome: produto?.nome, quantidade, motivo, observacao: obs, responsavel });
    App.showToast('Saída registrada!', 'success');
    App.closeModal();
    App.navigateTo('saida');
  },

  openLote() {
    const produtos = DB.getProdutos().filter(p => parseFloat(p.estoque||0) > 0);
    let itens = [{ produtoId: '', quantidade: '', motivo: 'Consumo interno' }];

    const renderItens = () => {
      const motivos = ['Consumo interno','Venda','Descarte/Vencimento','Ajuste de estoque'];
      return itens.map((item, i) => `
        <div style="display:flex;gap:8px;align-items:center;padding:8px;background:var(--bg-input);border-radius:8px;margin-bottom:8px" id="lote_item_${i}">
          <select style="flex:2" onchange="(function(){SaidaPage._loteItens[${i}].produtoId=this.value})()" >
            <option value="">Produto...</option>
            ${produtos.map(p=>`<option value="${p.id}" ${item.produtoId===p.id?'selected':''}>${p.nome}</option>`).join('')}
          </select>
          <input type="number" style="flex:0.7;min-width:70px" placeholder="Qtd" min="0.001" step="0.001" value="${item.quantidade||''}" onchange="SaidaPage._loteItens[${i}].quantidade=this.value" />
          <select style="flex:1" onchange="SaidaPage._loteItens[${i}].motivo=this.value">
            ${motivos.map(m=>`<option ${item.motivo===m?'selected':''}>${m}</option>`).join('')}
          </select>
          <button type="button" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.1rem" onclick="SaidaPage.removeLoteItem(${i})">✕</button>
        </div>
      `).join('');
    };

    SaidaPage._loteItens = itens;

    const body = `
      <div id="loteItensContainer">${renderItens()}</div>
      <button type="button" class="btn btn-secondary btn-sm mt-8" onclick="SaidaPage.addLoteItem()">+ Adicionar Item</button>
      <div class="form-group mt-16">
        <label>Responsável / Observação geral</label>
        <input type="text" id="loteObs" placeholder="Ex: Serviço do dia / Mesa 5" />
      </div>
    `;

    App.openModal('Saída em Lote', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: '📤 Registrar Tudo', class: 'btn-primary', action: 'SaidaPage.salvarLote()' }
    ], 'modal-lg');
  },

  _loteItens: [],

  addLoteItem() {
    this._loteItens.push({ produtoId: '', quantidade: '', motivo: 'Consumo interno' });
    this.refreshLoteContainer();
  },

  removeLoteItem(i) {
    this._loteItens.splice(i, 1);
    this.refreshLoteContainer();
  },

  refreshLoteContainer() {
    const produtos = DB.getProdutos().filter(p => parseFloat(p.estoque||0) > 0);
    const motivos = ['Consumo interno','Venda','Descarte/Vencimento','Ajuste de estoque'];
    const container = document.getElementById('loteItensContainer');
    if (container) {
      container.innerHTML = this._loteItens.map((item, i) => `
        <div style="display:flex;gap:8px;align-items:center;padding:8px;background:var(--bg-input);border-radius:8px;margin-bottom:8px">
          <select style="flex:2" onchange="SaidaPage._loteItens[${i}].produtoId=this.value">
            <option value="">Produto...</option>
            ${produtos.map(p=>`<option value="${p.id}" ${item.produtoId===p.id?'selected':''}>${p.nome}</option>`).join('')}
          </select>
          <input type="number" style="flex:0.7;min-width:70px" placeholder="Qtd" value="${item.quantidade||''}" onchange="SaidaPage._loteItens[${i}].quantidade=parseFloat(this.value)" />
          <select style="flex:1" onchange="SaidaPage._loteItens[${i}].motivo=this.value">
            ${motivos.map(m=>`<option ${item.motivo===m?'selected':''}>${m}</option>`).join('')}
          </select>
          <button type="button" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.1rem" onclick="SaidaPage.removeLoteItem(${i})">✕</button>
        </div>
      `).join('');
    }
  },

  salvarLote() {
    const obs = document.getElementById('loteObs')?.value || '';
    let count = 0;
    for (const item of this._loteItens) {
      if (!item.produtoId || !item.quantidade) continue;
      const p = DB.getProdutoPorId(item.produtoId);
      if (!p) continue;
      DB.addMovimentacao({ tipo: 'saida', produtoId: p.id, produtoNome: p.nome, quantidade: parseFloat(item.quantidade), motivo: item.motivo, observacao: obs });
      count++;
    }
    if (count === 0) { App.showToast('Nenhum item válido para registrar.', 'warning'); return; }
    App.showToast(`${count} saída(s) registrada(s)!`, 'success');
    App.closeModal();
    App.navigateTo('saida');
  },

  postRender() {}
};

  ],

  LOJAS_FIXAS: ["VALPARAISO", "VITORIA", "ITAPARICA", "GUARAPARI", "LINHARES", "ITAPOÃ", "Outro"],

  LOJAS_CORES: {
    'GUARAPARI': { bg: '#111111', text: '#ffffff' },
    'VITORIA':   { bg: '#1d4ed8', text: '#ffffff' },
    'ITAPOÃ':    { bg: '#ea580c', text: '#ffffff' },
    'ITAPOA':    { bg: '#ea580c', text: '#ffffff' },
    'ITAPARICA': { bg: '#16a34a', text: '#ffffff' },
    'VALPARAISO': { bg: '#eab308', text: '#000000' },
  },

  _corLoja(loja) {
    return this.LOJAS_CORES[(loja || '').toUpperCase()] || { bg: '#6b7280', text: '#ffffff' };
  },

  _badgeLoja(loja) {
    const c = this._corLoja(loja);
    return `<span style="display:inline-block;padding:3px 12px;border-radius:20px;font-weight:700;font-size:.85rem;letter-spacing:.03em;background:${c.bg};color:${c.text}">${loja}</span>`;
  },

  render() {
    // Limpa itens expirados a cada abertura da aba
    DB.limparLixeiraExpirada();
    if (this.activeSeparacao) return this.renderSeparacaoView();
    if (this.viewLixeira) return this.renderLixeiraView();
    return this.renderListView();
  },

  postRender() {
    // Inicialização se necessário
  },

  // Busca a config de meta da loja informada, ou 0 se n tiver
  getMetaLojaCache: function(lojaStr) {
      if(!this._metasCache) this._metasCache = DB.getMetas();
      const meta = this._metasCache.find(m => m.loja === lojaStr);
      return meta ? meta.itens : {};
  },

  // ===== VIEW DE LISTAGEM =====
  renderListView() {
    const pedidos = DB.getPedidos() || [];
    this._metasCache = DB.getMetas(); // recarrega pro render
    
    // Sort desc by data
    pedidos.sort((a,b) => new Date(b.data).getTime() - new Date(a.data).getTime());

    let rows = '';
    
    if (pedidos.length === 0) {
      rows = `<tr><td colspan="5" class="text-center" style="padding:40px;color:var(--text-muted)">Nenhum inventário recebido das lojas ainda.</td></tr>`;
    } else {
      pedidos.forEach(p => {
        const dataStr = new Date(p.data).toLocaleString('pt-BR');
        let statusBadge = '';
        if(p.status === 'pendente') statusBadge = `<span class="badge" style="background:var(--warning-dim);color:var(--warning)">A Separar</span>`;
        else if(p.status === 'conferido') statusBadge = `<span class="badge" style="background:var(--info-dim);color:var(--info)">Separado/Enviado</span>`;
        else statusBadge = `<span class="badge">${p.status}</span>`;

        let acoes = '';
        if(p.status === 'pendente') {
          acoes = `
            <button class="btn btn-secondary btn-sm" onclick="PedidosPage.imprimirRomaneio('${p.id}')">📄 Romaneio</button>
            <button class="btn btn-primary btn-sm" onclick="PedidosPage.iniciarSeparacao('${p.id}')">📦 Conferir e Separar</button>
            <button class="btn btn-sm" onclick="PedidosPage.excluirPedido('${p.id}')" style="background:var(--danger);color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;margin-left:4px" title="Excluir pedido">🗑️</button>
          `;
        } else {
          acoes = `
            <button class="btn btn-secondary btn-sm" onclick="PedidosPage.imprimirRomaneio('${p.id}')">📄 Ver Romaneio</button>
            <button class="btn btn-sm" onclick="PedidosPage.excluirPedido('${p.id}')" style="background:var(--danger);color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;margin-left:4px" title="Excluir pedido">🗑️</button>
          `;
        }

        // Calcula quantos itens de fato serão repostos
        const metasLoja = this.getMetaLojaCache(p.loja);
        let enviosNecessarios = 0;
        
        if (p.itens) {
            p.itens.forEach(i => {
                const max = Number(metasLoja[i.nome] || 0);
                const atual = Number(i.quantidade || 0);
                const enviar = max - atual;
                if(enviar > 0) enviosNecessarios += enviar;
            });
        }

        let volStr;
        if (p.tipoPedido === 'direto') {
          const qtdItens = (p.itens || []).filter(i => Number(i.quantidade) > 0).length;
          volStr = `<span style="color:var(--info)">${qtdItens} iten(s) solicitados diretamente</span>`;
        } else {
          volStr = `${enviosNecessarios} envios (calculado)`;
          if (enviosNecessarios === 0 && p.status === 'pendente') volStr = '<span style="color:var(--danger)">Estoque cheio / Sem estoque máximo</span>';
        }

        rows += `
          <tr>
            <td>#${p.id.substring(3, 9)}</td>
            <td>${this._badgeLoja(p.loja)}</td>
            <td>${dataStr}</td>
            <td>${statusBadge}</td>
            <td>${volStr}</td>
            <td style="text-align:right">${acoes}</td>
          </tr>
        `;
      });
    }

    return `
      <div class="card">
        <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <h2>🛒 Inventários / Romaneios de Loja</h2>
            <p>Gerencie as solicitações feitas pelas filiais baseadas no Estoque Máximo, emita romaneios e faça baixa via scanner.</p>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-outline" onclick="PedidosPage.abrirModalCatalogo()">📋 Itens do Formulário</button>
            <button class="btn btn-outline" onclick="PedidosPage.abrirModalMetas()">⚙️ Cfg Estoque Máximo Lojas</button>
            <button class="btn btn-outline" onclick="PedidosPage.abrirLixeira()" style="position:relative">
              🗑️ Lixeira
              ${DB.getLixeira().length > 0 ? `<span style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.68rem;display:flex;align-items:center;justify-content:center;font-weight:700">${DB.getLixeira().length}</span>` : ''}
            </button>
          </div>
        </div>
        <div class="card-body" style="overflow-x:auto;">
          <table class="table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Loja Destino</th>
                <th>Data Inclusão</th>
                <th>Status</th>
                <th>Reposição (Par-Level)</th>
                <th style="text-align:right">Ações</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

  excluirPedido(id) {
    const pedidos = DB.getPedidos() || [];
    const pedido  = pedidos.find(p => p.id === id);
    if (!pedido) return;
    const label = `#${id.substring(3, 9)} — ${pedido.loja}`;
    if (!confirm(`Mover o pedido ${label} para a Lixeira?\n\nVocê poderá restaurá-lo por até 60 meses.`)) return;
    DB.deletePedido(id);
    App.showToast(`🗑️ Pedido ${label} movido para a Lixeira.`, 'success');
    App.navigateTo('pedidos');
  },

  abrirLixeira() {
    this.viewLixeira = true;
    App.navigateTo('pedidos');
  },

  fecharLixeira() {
    this.viewLixeira = false;
    App.navigateTo('pedidos');
  },

  restaurarPedido(id) {
    if (!confirm('Restaurar este pedido para a fila de separação?')) return;
    DB.restaurarDaLixeira(id);
    App.showToast('♻️ Pedido restaurado com sucesso!', 'success');
    App.navigateTo('pedidos');
  },

  excluirPermanente(id) {
    const item = DB.getLixeira().find(i => i.id === id);
    if (!item) return;
    const label = `#${id.substring(3,9)} — ${item.loja}`;
    if (!confirm(`ATENÇÃO: Excluir PERMANENTEMENTE o pedido ${label}?\n\nEsta ação NÃO pode ser desfeita.`)) return;
    DB.excluirDaLixeiraPermanentemente(id);
    App.showToast('❌ Pedido excluído permanentemente.', 'error');
    App.navigateTo('pedidos');
  },

  renderLixeiraView() {
    const lixeira = DB.getLixeira().sort((a,b) => new Date(b._deletadoEm) - new Date(a._deletadoEm));

    let rows = '';
    if (lixeira.length === 0) {
      rows = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">🗑️ Lixeira vazia</td></tr>`;
    } else {
      lixeira.forEach(p => {
        const deletadoEm = new Date(p._deletadoEm).toLocaleString('pt-BR');
        const expiraEm   = new Date(p._expiraEm);
        const diasRestantes = Math.ceil((expiraEm - new Date()) / (1000*60*60*24));
        const expiraLabel = diasRestantes > 0
          ? `<span style="font-size:.75rem;color:var(--text-muted)">${diasRestantes} dias restantes</span>`
          : `<span style="font-size:.75rem;color:var(--danger)">Expirado</span>`;

        rows += `
          <tr style="opacity:.85">
            <td>#${p.id.substring(3,9)}</td>
            <td><strong>${p.loja}</strong></td>
            <td>${deletadoEm}</td>
            <td><span class="badge" style="background:var(--bg-secondary);color:var(--text-muted)">${p.status}</span></td>
            <td>${expiraLabel}</td>
            <td style="text-align:right">
              <button class="btn btn-secondary btn-sm" onclick="PedidosPage.restaurarPedido('${p.id}')">♻️ Restaurar</button>
              <button class="btn btn-sm" onclick="PedidosPage.excluirPermanente('${p.id}')" style="background:var(--danger);color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;margin-left:4px">❌ Excluir</button>
            </td>
          </tr>
        `;
      });
    }

    return `
      <div class="card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <h2>🗑️ Lixeira de Pedidos</h2>
            <p>Pedidos excluídos são mantidos por <strong>60 meses</strong> antes de serem apagados definitivamente.</p>
          </div>
          <button class="btn btn-outline" onclick="PedidosPage.fecharLixeira()">← Voltar aos Pedidos</button>
        </div>

  // ===== GERENCIAMENTO DO CATÁLOGO DE ITENS DO FORMULÁRIO =====
  _catTab: 0, // ííndice da aba ativa no moídal de catálogo

  abrirModalCatalogo() {
    this._catTab = 0;
    App.openModal('📋 Itens do Formulário de Pedidos', this._renderCatalogoBody(), [
      { label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: '💾 Salvar Tudo', class: 'btn-primary', action: 'PedidosPage.salvarCatalogo()' }
    ], 'modal-lg');
  },

  restaurarCatalogoPadrao() {
    if (!confirm('Restaurar o catalogo para os itens padrao?\nTodos os itens customizados serao perdidos.')) return;
    DB.saveCatalogoPedido(DB._catalogoPadrao());
    this._catTab = 0;
    const modalBodyEl = document.getElementById('modalBody');
    if (modalBodyEl) modalBodyEl.innerHTML = this._renderCatalogoBody();
    App.showToast('Catalogo restaurado para o padrao!', 'success');
  },

  _renderCatalogoBody() {
    const cats = DB.getCatalogoPedido();

    // Abas de categorias
    const tabs = cats.map((c, i) => `
      <button type="button"
        id="catTab_${i}"
        onclick="PedidosPage._trocarCatTab(${i})"
        style="padding:8px 18px; border:none; border-radius:8px 8px 0 0; cursor:pointer; font-weight:600; font-size:.9rem; font-family:inherit;
               background:${i===this._catTab?'var(--bg-card)':'var(--bg-secondary)'};
               color:${i===this._catTab?'var(--accent)':'var(--text-muted)'};
               border-bottom: ${i===this._catTab?'2px solid var(--accent)':'2px solid transparent'}">
        ${c.icon} ${c.nome}
      </button>
    `).join('');

    // Painel da aba ativa
    const cat = cats[this._catTab];

    // Recheios: somente leitura — gerenciado pelo cadastro de produtos
    if (cat.id === 'insumos') {
      const temProdutos = DB.getProdutos().some(p => p.categoria === 'Recheios');
      const linhasRO = cat.itens.map(item => `
        <tr>
          <td style="padding:7px 6px;font-size:.9rem">${item.nome}</td>
          <td style="padding:7px 6px;text-align:center;font-size:.88rem;color:var(--text-muted)">${item.max || 0}</td>
          <td style="padding:7px 6px;font-size:.85rem;color:var(--text-muted)">${item.fornecedor || '—'}</td>

          <div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:.88rem;color:var(--text-secondary)">
            <strong style="color:var(--info)">Gerenciado pelo Cadastro de Produtos</strong><br>
            Os Recheios são derivados automaticamente dos produtos com categoria <strong>"Recheios"</strong>. Para editar, adicionar ou remover itens, use a aba <strong>Produtos</strong> do menu principal.
            ${!temProdutos ? `<br><br><button onclick="PedidosPage.migrarRecheiosParaERP()" style="background:var(--accent);color:#000;border:none;border-radius:7px;padding:8px 18px;font-weight:700;cursor:pointer;font-size:.88rem;margin-top:4px">⬆️ Importar itens atuais para o ERP</button>` : ''}
          </div>
          <div style="max-height:42vh;overflow-y:auto">
            <table style="width:100%;border-collapse:collapse">
              <thead><tr style="font-size:.78rem;color:var(--text-muted)">
                <th style="padding:4px 6px;text-align:left">Item</th>
                <th style="padding:4px 6px;text-align:center">Máx. Padrão</th>
                <th style="padding:4px 6px;text-align:left">Fornecedor</th>
              </tr></thead>
              <tbody>${linhasRO || '<tr><td colspan="3" style="padding:20px;text-align:center;color:var(--text-muted)">Nenhum produto com categoria Recheios cadastrado ainda.</td></tr>'}</tbody>

          </div>
        </div>

      return `<div style="margin-bottom:-1px;display:flex;gap:4px;flex-wrap:wrap">${tabs}</div>${painel}`;
    }

    const _lojaAbbr = {VALPARAISO:'VALP',VITORIA:'VIT',ITAPARICA:'ITPAR',GUARAPARI:'GUAR',LINHARES:'LIN','ITAPOÃ':'ITPOA',Outro:'OUT'};
    const _lojaPills = (item, idx) => this.LOJAS_FIXAS.map((l, li) => {
      const checked = (item.lojas || []).includes(l);
      return `<label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;border:1px solid ${checked?'rgba(59,130,246,.45)':'var(--border)'};background:${checked?'rgba(59,130,246,.1)':'var(--bg-secondary)'};color:${checked?'var(--info)':'var(--text-muted)'};transition:all .1s">
        <input type="checkbox" id="catLoja_${idx}_${li}" style="width:11px;height:11px;cursor:pointer;accent-color:var(--info)" ${checked?'checked':''}> ${_lojaAbbr[l]||l}
      </label>`;

    const linhas = cat.itens.map((item, idx) => `
      <tr id="catRow_${idx}">
        <td style="padding:8px 6px">

          <input type="text" class="input-form" style="padding:6px 10px;font-size:.88rem"

        </td>
        <td style="padding:8px 6px;min-width:220px">
          <div style="display:flex;flex-wrap:wrap;gap:4px">${_lojaPills(item, idx)}</div>
        </td>
        <td style="padding:8px 6px; width:40px; text-align:center">
          <button type="button" onclick="PedidosPage._deletarItemCatalogo(${idx})"
            style="background:var(--danger);color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.85rem"
            title="Remover item">✕</button>

    const painel = `

          ${cat.itens.length} itens — marque as lojas em que cada item deve aparecer no formulário. <strong>Sem nenhuma marcada = aparece em todas.</strong>
        </div>
        <div style="max-height:45vh;overflow:auto">
          <table style="width:100%;border-collapse:collapse;min-width:700px">
            <thead>
              <tr style="font-size:.75rem;color:var(--text-muted);">
                <th style="padding:4px 6px;text-align:left">Nome do Item</th>
                <th style="padding:4px 6px;text-align:center">Máx.</th>
                <th style="padding:4px 6px;text-align:left">Fornecedor(es)</th>
                <th style="padding:4px 6px;text-align:left">Lojas que recebem este item</th>
                <th></th>
              </tr>
            </thead>

          </table>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)">
          <input type="text" class="input-form" id="novoItemNome" placeholder="Nome do novo item..." style="flex:2;min-width:150px;padding:8px 12px;font-size:.9rem" />
          <input type="number" class="input-form" id="novoItemMax" placeholder="Máx" min="0" value="0" style="width:70px;padding:8px;text-align:center;font-size:.9rem" />
          <input type="text" class="input-form" id="novoItemForn" placeholder="Fornecedor(es)..." style="flex:2;min-width:150px;padding:8px 12px;font-size:.9rem" />
          <button type="button" onclick="PedidosPage._adicionarItemCatalogo()"
            style="background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-weight:700;white-space:nowrap"
