        ${vencendo.length > 0 && vencidos.length === 0 ? `<div class="alert alert-warning" style="flex:1;min-width:280px">⏰ <strong>${vencendo.length} lote(s)</strong> vencendo nos próximos 7 dias</div>` : ''}
      </div>` : ''}

      <div class="stats-grid">
        <div class="stat-card" style="--stat-color: var(--accent); --stat-bg: var(--accent-dim)">
          <div class="stat-icon">📦</div>
          <div class="stat-info">
            <div class="stat-value">${resumo.totalProdutos}</div>
            <div class="stat-label">Produtos Cadastrados</div>
            <div class="stat-sub">${DB.getProdutos().filter(p => parseFloat(p.estoque||0) > 0).length} em estoque</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color: var(--danger); --stat-bg: var(--danger-dim)">
          <div class="stat-icon">⚠️</div>
          <div class="stat-info">
            <div class="stat-value">${resumo.estoquesBaixos}</div>
            <div class="stat-label">Estoques Críticos</div>
            <div class="stat-sub">Abaixo do mínimo</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color: var(--info); --stat-bg: var(--info-dim)">
          <div class="stat-icon">📥</div>
          <div class="stat-info">
            <div class="stat-value">${resumo.entradasHoje}</div>
            <div class="stat-label">Entradas Hoje</div>
            <div class="stat-sub">Recebimentos do dia</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color: var(--purple); --stat-bg: var(--purple-dim)">
          <div class="stat-icon">📤</div>
          <div class="stat-info">
            <div class="stat-value">${resumo.saidasHoje}</div>
            <div class="stat-label">Saídas Hoje</div>
            <div class="stat-sub">Consumo/Vendas</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color: var(--warning); --stat-bg: var(--warning-dim)">
          <div class="stat-icon">⏰</div>
          <div class="stat-info">
            <div class="stat-value">${resumo.lotesVencendo}</div>
            <div class="stat-label">Vencendo em 7 dias</div>
            <div class="stat-sub">Requer atenção</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color: var(--accent); --stat-bg: var(--accent-dim)">
          <div class="stat-icon">📋</div>
          <div class="stat-info">
            <div class="stat-value">${DB.getFichas().length}</div>
            <div class="stat-label">Fichas Técnicas</div>
            <div class="stat-sub">Receitas cadastradas</div>
          </div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <h3>Movimentação dos últimos 7 dias</h3>
          <div class="chart-wrap">
            <canvas id="chartMovimentacao"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <h3>Estoque por Categoria</h3>
          <div class="chart-wrap">
            <canvas id="chartCategorias"></canvas>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 style="font-size:.9rem;font-weight:600;color:var(--text-secondary);margin-bottom:16px">⚠️ Estoques Críticos</h3>
          ${estoquesB.length === 0 ? '<p class="text-muted" style="font-size:.85rem;text-align:center;padding:20px">✅ Todos os estoques estão em dia</p>' : `
            <div style="display:flex;flex-direction:column;gap:12px">
              ${estoquesB.slice(0,6).map(p => {
                const pct = parseFloat(p.estoque) / parseFloat(p.estoqueMinimo) * 100;
                const cor = pct <= 30 ? 'danger' : 'warning';
                return `
                  <div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                      <span style="font-size:.85rem;font-weight:500">${p.nome}</span>
                      <span class="text-${cor}" style="font-size:.8rem">${parseFloat(p.estoque||0).toFixed(1)} ${p.unidade||''}</span>
                    </div>
                    <div class="progress-bar">
                      <div class="progress-fill ${cor}" style="width:${Math.min(100, pct)}%"></div>
                    </div>
                    <div style="font-size:.7rem;color:var(--text-muted);margin-top:2px">Mínimo: ${p.estoqueMinimo} ${p.unidade||''}</div>
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div>

        <div class="card">
          <h3 style="font-size:.9rem;font-weight:600;color:var(--text-secondary);margin-bottom:16px">🕒 Últimas Movimentações</h3>
          ${movRecentes.length === 0 ? '<p class="text-muted" style="font-size:.85rem;text-align:center;padding:20px">Nenhuma movimentação recente</p>' : `
            <div style="display:flex;flex-direction:column;gap:10px">
              ${movRecentes.slice(0,8).map(m => {
                const tipo = m.tipo === 'entrada' ? { icon:'📥', color:'accent', label:'Entrada' } :
                             m.tipo === 'saida' ? { icon:'📤', color:'danger', label:'Saída' } :
                             { icon:'🍳', color:'purple', label:'Produção' };
                const produto = DB.getProdutoPorId(m.produtoId);
                const dataFmt = new Date(m.data).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
                return `
                  <div style="display:flex;align-items:center;gap:10px">
                    <div style="font-size:1.2rem">${tipo.icon}</div>
                    <div style="flex:1;min-width:0">
                      <div style="font-size:.83rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${produto ? produto.nome : m.produtoNome || 'Produto'}</div>
                      <div style="font-size:.72rem;color:var(--text-muted)">${dataFmt}</div>
                    </div>
                    <span class="badge badge-${tipo.color === 'purple' ? 'purple' : tipo.color === 'accent' ? 'success' : 'danger'}">${m.quantidade} ${produto ? produto.unidade||'' : ''}</span>
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div>
      </div>

      ${(vencendo.length > 0 || vencidos.length > 0) ? `
      <div class="card mt-16">
        <h3 style="font-size:.9rem;font-weight:600;color:var(--text-secondary);margin-bottom:16px">📅 Validades — Atenção Necessária</h3>
        <div class="table-container" style="border:none">
          <table>
            <thead><tr>
              <th>Produto</th><th>Lote</th><th>Local</th><th>Quantidade</th><th>Validade</th><th>Status</th>
            </tr></thead>
            <tbody>
              ${[...vencidos, ...vencendo].map(l => {
                const hoje = new Date();
                const val = new Date(l.validade);
                const vencido = val < hoje;
                const dias = Math.ceil((val - hoje) / (1000*60*60*24));
                return `<tr>
                  <td><strong>${l.produtoNome}</strong></td>
                  <td><code style="font-size:.75rem;color:var(--text-secondary)">${l.lote}</code></td>
                  <td>${l.local}</td>
                  <td>${l.quantidadeAtual}</td>
                  <td class="${vencido ? 'expiry-expired' : 'expiry-near'}">${l.validade}</td>
                  <td><span class="badge ${vencido ? 'badge-danger' : 'badge-warning'}">${vencido ? '❌ Vencido' : `⏰ ${dias}d`}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}
    `;
  },

  postRender() {
    this.renderChartMovimentacao();
    this.renderChartCategorias();
  },

  refresh() {
    App.navigateTo('dashboard');
  },

  renderChartMovimentacao() {
    const ctx = document.getElementById('chartMovimentacao');
    if (!ctx) return;

    const labels = [];
    const entradas = [];
    const saidas = [];

    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dayStr = d.toDateString();
      labels.push(d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}));
      const movs = DB.getMovimentacoes().filter(m => new Date(m.data).toDateString() === dayStr);
      entradas.push(movs.filter(m => m.tipo === 'entrada').reduce((s, m) => s + parseFloat(m.quantidade||0), 0));
      saidas.push(movs.filter(m => m.tipo === 'saida').reduce((s, m) => s + parseFloat(m.quantidade||0), 0));
    }

    if (this.charts.mov) this.charts.mov.destroy();
    this.charts.mov = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Entradas', data: entradas, backgroundColor: 'rgba(16,185,129,0.7)', borderColor: '#10b981', borderWidth: 1, borderRadius: 4 },
          { label: 'Saídas', data: saidas, backgroundColor: 'rgba(239,68,68,0.5)', borderColor: '#ef4444', borderWidth: 1, borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8b949e' } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8b949e' } }
        }
      }
    });
  },

  renderChartCategorias() {
    const ctx = document.getElementById('chartCategorias');
    if (!ctx) return;

    const produtos = DB.getProdutos();
    const por = {};
    produtos.forEach(p => {
      const cat = p.categoria || 'Outros';
      if (!por[cat]) por[cat] = 0;
      por[cat] += parseFloat(p.estoque || 0);
    });

    const labels = Object.keys(por);
    const data = Object.values(por);
    const colors = ['#10b981','#3b82f6','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#ec4899'];

    if (this.charts.cat) this.charts.cat.destroy();
    this.charts.cat = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: colors.slice(0, labels.length),
          borderColor: 'rgba(0,0,0,0)',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { color: '#8b949e', font: { size: 11 }, padding: 12 } }
        }
      }
    });
  }
};


/**
 * produtos.js — Módulo de Cadastro de Produtos
 */

const ProdutosPage = {
  filtro: '',
  categoriaFiltro: '',

  render() {
    const categorias = [...new Set(DB.getProdutos().map(p => p.categoria).filter(Boolean))];
    return `
      <div class="page-header">
        <div>
          <h1>📦 Produtos</h1>
          <p>Cadastro e gerenciamento de todos os produtos</p>
        </div>
      </div>

      <!-- Botão grande centralizado -->
      <div style="display:flex;justify-content:center;margin-bottom:28px">
        <button onclick="ProdutosPage.openModal()"
          style="background:linear-gradient(135deg,#10b981,#059669);color:#000;border:none;border-radius:16px;
                 padding:22px 56px;font-size:1.3rem;font-weight:800;cursor:pointer;
                 box-shadow:0 0 40px rgba(16,185,129,0.45);display:flex;align-items:center;
                 gap:14px;font-family:Inter,sans-serif;letter-spacing:-.3px;
                 transition:transform .15s,box-shadow .15s"
          onmouseover="this.style.transform='scale(1.04)';this.style.boxShadow='0 0 60px rgba(16,185,129,0.65)'"
          onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 0 40px rgba(16,185,129,0.45)'">
          <span style="font-size:1.8rem">➕</span>
          <span>NOVO PRODUTO</span>
        </button>
      </div>

      <div class="table-container">
        <div class="table-toolbar">
          <div class="search-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchProduto" placeholder="Buscar produto..." value="${this.filtro}" oninput="ProdutosPage.setFiltro(this.value)" />
          </div>
          <select id="filtroCategoria" style="width:auto;padding:8px 12px" onchange="ProdutosPage.setCategoria(this.value)">
            <option value="">Todas as categorias</option>
            ${categorias.map(c => `<option value="${c}" ${this.categoriaFiltro === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
          <div class="table-actions">
            <button class="btn btn-secondary btn-sm" onclick="ProdutosPage.openScannerBusca()">📷 Ler Barcode</button>
            <button class="btn btn-secondary btn-sm" onclick="ProdutosPage.exportCSV()">⬇️ Exportar CSV</button>
          </div>
        </div>
        <div id="produtosTableBody">
          ${this.renderTable()}
        </div>
      </div>
    `;
  },

  renderTable() {
    let produtos = DB.getProdutos()
      .sort((a, b) => (a.nome || '').localeCompare(b.nome || '', 'pt-BR', { sensitivity: 'base' }));
    if (this.filtro) {
      const f = this.filtro.toLowerCase();
      produtos = produtos.filter(p =>
        p.nome.toLowerCase().includes(f) ||
        (p.codigoInterno || '').toLowerCase().includes(f) ||
        (p.codigoBarras || '').includes(f) ||
        (p.categoria || '').toLowerCase().includes(f)
      );
    }
    if (this.categoriaFiltro) {
      produtos = produtos.filter(p => p.categoria === this.categoriaFiltro);
    }

    if (produtos.length === 0) {
      return `<div class="empty-state"><div class="empty-icon">📦</div><h3>Nenhum produto encontrado</h3><p>Clique em "+ Novo Produto" para começar</p></div>`;
    }

    const tempMap = {
      'Congelado':            { icon: '❄️', cls: 'badge-info' },
      'Resfriado':            { icon: '🧊', cls: 'badge-info' },
      'Temperatura Ambiente': { icon: '🌡️', cls: 'badge-gray' },
    };

    const rows = produtos.map(p => {
      const estoque  = parseFloat(p.estoque || 0);
      const minimo   = parseFloat(p.estoqueMinimo || 0);
      const maximo   = parseFloat(p.estoqueMaximo || 0);

      let status, badgeClass;
      if (estoque === 0)                         { status = 'Zerado';  badgeClass = 'badge-danger'; }
      else if (minimo > 0 && estoque <= minimo)  { status = 'Crítico'; badgeClass = 'badge-warning'; }
      else if (maximo > 0 && estoque >= maximo)  { status = 'Máximo';  badgeClass = 'badge-info'; }
      else                                       { status = 'Normal';  badgeClass = 'badge-success'; }

      const pct    = maximo > 0 ? Math.min(100, (estoque / maximo) * 100) : 50;
      const corBar = estoque === 0 ? 'danger' : (estoque <= minimo ? 'warning' : '');
      const temp   = tempMap[p.temperatura] || null;

      const codigoCell = p.codigoInterno || p.codigoBarras
        ? `<code style="font-size:.78rem;color:var(--text-secondary)">${p.codigoInterno || p.codigoBarras}</code>${p.codigoBarras && p.codigoInterno ? `<br><code style="font-size:.68rem;color:var(--text-muted)">${p.codigoBarras}</code>` : ''}`
        : '—';

      const tempCell = temp
        ? `<span class="badge ${temp.cls}">${temp.icon} ${p.temperatura}</span>`
        : '<span style="color:var(--text-muted)">—</span>';

      return `
        <tr>
          <td>${codigoCell}</td>
          <td>
            <span style="font-weight:600">${p.nome}</span>
            ${p.fornecedor ? `<br><span style="font-size:.72rem;color:var(--text-muted)">${p.fornecedor}</span>` : ''}
          </td>
          <td><span class="badge badge-gray">${p.categoria || '—'}</span></td>
          <td style="font-size:.82rem">
            ${p.formaEntrega || '—'}
            ${p.qtdPorUnidade > 0 ? '<br><span style="font-size:.7rem;color:var(--text-muted)">1 ' + p.formaEntrega + ' = ' + p.qtdPorUnidade + ' ' + p.unidade + '</span>' : ''}
          </td>
          <td>${tempCell}</td>
          <td>
            <div class="stock-level">
              <div class="stock-level-text">
                <span style="font-weight:600">${estoque.toFixed(2)}</span>
                <span>${p.unidade || ''}</span>
              </div>
              <div class="progress-bar"><div class="progress-fill ${corBar}" style="width:${pct}%"></div></div>
            </div>
          </td>
          <td style="font-size:.8rem;color:var(--text-secondary)">${minimo}/${maximo} ${p.unidade || ''}</td>
          <td>R$ ${parseFloat(p.custo || 0).toFixed(2)}</td>
          <td>R$ ${parseFloat(p.precoVenda || 0).toFixed(2)}</td>
          <td style="font-size:.82rem">${p.local || '—'}</td>
          <td><span class="badge ${badgeClass}">${status}</span></td>
          <td>
            <div style="display:flex;gap:4px;justify-content:center">
              <button class="btn btn-secondary btn-sm" onclick="ProdutosPage.openModal('${p.id}')" title="Editar">✏️</button>
              <button class="btn btn-secondary btn-sm" onclick="ProdutosPage.verHistorico('${p.id}')" title="Histórico">📋</button>
              <button class="btn btn-danger btn-sm" onclick="ProdutosPage.deletar('${p.id}')" title="Excluir">🗑️</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    return `
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Forma de Entrega</th>
            <th>Temperatura</th>
            <th>Estoque Atual</th>
            <th>Mín/Máx</th>
            <th>Custo Unit.</th>
            <th>Preço Venda</th>
            <th>Local</th>
            <th>Status</th>
            <th style="text-align:center">Ações</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  },

  setFiltro(v) {
    this.filtro = v;
    document.getElementById('produtosTableBody').innerHTML = this.renderTable();
  },

  setCategoria(v) {
    this.categoriaFiltro = v;
    document.getElementById('produtosTableBody').innerHTML = this.renderTable();
  },

  openScannerBusca() {
    BarcodeScanner.open(codigo => {
      const p = DB.getProdutoPorCodigo(codigo);
      if (p) {
        this.filtro = codigo;
        document.getElementById('searchProduto').value = codigo;
        document.getElementById('produtosTableBody').innerHTML = this.renderTable();
        App.showToast('Produto encontrado!', 'success');
      } else {
        App.showToast('Código não encontrado. Deseja cadastrar?', 'warning');
        this.openModal(null, codigo);
      }
    });
  },

  // ── MODAL DE CADASTRO / EDIÇÃO ──────────────────────────────────────────────
  openModal(id, codigoBarrasParam) {
    id              = id || null;
    codigoBarrasParam = codigoBarrasParam || '';

    const produto = id ? DB.getProdutoPorId(id) : null;
    const titulo  = produto ? 'Editar Produto' : 'Novo Produto';

    const categorias    = ['Recheios','Carnes','Hortifruti','Laticínios','Grãos e Cereais','Condimentos','Bebidas','Embalagens','Higiene/Limpeza','Outros'];
    const unidades      = ['kg','g','L','ml','un','cx','fardo','pct','dz'];
    const locais        = ['Câmara Fria','Câmara Seca','Despensa','Congelador','Prateleira','Adega'];
    const formasEntrega = ['Caixa','Saco','Bandeja','Fardo','Engradado','Galão','Lata','Pacote','Pote','Saco a vácuo','Unidade','Outro'];

    // helpers para não quebrar aspas dentro de template literals
    const val  = k => (produto && produto[k]) ? produto[k] : '';
    const sel  = (k, v) => val(k) === v ? 'selected' : '';
    const chk  = v => val('temperatura') === v ? 'checked' : '';

    const estInicialHtml = id ? '' : `
      <div class="form-group">
        <label>Estoque Inicial</label>
        <input type="number" id="pEstInicial" min="0" step="0.01" placeholder="0" value="0" />
      </div>`;

    const body = `
      <form id="formProduto" onsubmit="ProdutosPage.salvar(event, '${id || ''}')">

        <!-- IDENTIFICAÇÃO -->
        <div class="form-section-title">Identificação</div>
        <div class="form-grid" style="margin-bottom:20px">
          <div class="form-group">
            <label>Nome do Produto *</label>
            <input type="text" id="pNome" required placeholder="Ex: Frango Inteiro" value="${val('nome')}" />
          </div>
          <div class="form-group">
            <label>Categoria *</label>
            <select id="pCategoria" required onchange="ProdutosPage.onCategoriaChange(this.value)">
              <option value="">Selecione...</option>
              ${categorias.map(c => `<option value="${c}" ${sel('categoria', c)}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Código Interno do Produto * <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400">(usado no EAN-13 da balança)</span></label>
            <input type="text" id="pCodigoInt" required placeholder="Ex: 150" value="${val('codigoInterno')}" />
            <span class="form-hint">Digite apenas o número do código — Ex: <code>150</code> → EAN-13 <code>2<u>00150</u>003528X</code></span>
          </div>
          <div class="form-group">
            <label>Código de Barras (EAN)</label>
            <div class="input-group">
              <input type="text" id="pCodigoBar" placeholder="Digite ou escaneie" value="${val('codigoBarras') || codigoBarrasParam}" />
              <button type="button" class="btn btn-secondary" onclick="ProdutosPage.scanBarcode()" title="Escanear câmera">📷</button>
            </div>
          </div>
        </div>

        <!-- ENTREGA E CONSERVAÇÃO -->
        <div class="form-section-title">Entrega e Conservação</div>
        <div class="form-grid" style="margin-bottom:20px">
          <div class="form-group">
            <label>Forma de Entrega *</label>
            <select id="pFormaEntrega" required onchange="ProdutosPage.onFormaEntregaChange()">
              <option value="">Como o produto chega?</option>
              ${formasEntrega.map(f => '<option value="' + f + '" ' + sel('formaEntrega', f) + '>' + f + '</option>').join('')}
            </select>
            <span class="form-hint">Embalagem usada pelo fornecedor na entrega</span>
          </div>
          <div class="form-group">
            <label id="lblQtdUnidade">Quantidade por Unidade de Entrega</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="number" id="pQtdPorUnidade" min="0" step="0.001" placeholder="Ex: 20"
                value="${val('qtdPorUnidade')}" style="flex:1"
                oninput="ProdutosPage.onQtdUnidadeInput()" />
              <span id="spanQtdUnidade" style="font-size:.82rem;color:var(--text-secondary);white-space:nowrap">kg / unidade</span>
            </div>
            <span class="form-hint" id="hintQtdUnidade">Ex: 1 Caixa contém 20 kg → Ao dar entrada de 1 caixa, o sistema adiciona 20 kg automaticamente</span>
          </div>
          <div class="form-group">
            <label>Temperatura de Conservação *</label>
            <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">

              <label class="temp-option" id="lbl-congelado" onclick="ProdutosPage.onTemperaturaChange('Congelado')">
                <input type="radio" name="pTemperatura" value="Congelado" ${chk('Congelado')}
                  style="width:auto;accent-color:var(--info)" />
                <span style="font-size:1.1rem">❄️</span>
                <div>
                  <div style="font-size:.875rem;font-weight:600;color:var(--text-primary)">Congelado</div>
                  <div style="font-size:.72rem;color:var(--text-muted)">Abaixo de -18°C — Congelador</div>
                </div>
              </label>

              <label class="temp-option" id="lbl-resfriado" onclick="ProdutosPage.onTemperaturaChange('Resfriado')">
                <input type="radio" name="pTemperatura" value="Resfriado" ${chk('Resfriado')}
                  style="width:auto;accent-color:var(--info)" />
                <span style="font-size:1.1rem">🧊</span>
                <div>
                  <div style="font-size:.875rem;font-weight:600;color:var(--text-primary)">Resfriado</div>
                  <div style="font-size:.72rem;color:var(--text-muted)">Entre 0°C e 10°C — Câmara Fria</div>
                </div>
              </label>

              <label class="temp-option" id="lbl-ambiente" onclick="ProdutosPage.onTemperaturaChange('Temperatura Ambiente')">
                <input type="radio" name="pTemperatura" value="Temperatura Ambiente" ${chk('Temperatura Ambiente')}
                  style="width:auto;accent-color:var(--info)" />
                <span style="font-size:1.1rem">🌡️</span>
                <div>
                  <div style="font-size:.875rem;font-weight:600;color:var(--text-primary)">Temperatura Ambiente</div>
                  <div style="font-size:.72rem;color:var(--text-muted)">Acima de 10°C — Despensa / Câmara Seca</div>
                </div>
              </label>

            </div>
          </div>
        </div>

        <!-- ESTOQUE E ARMAZENAMENTO -->
        <div class="form-section-title">Estoque e Armazenamento</div>
        <div class="form-grid" style="margin-bottom:20px">
          <div class="form-group">
            <label>Unidade de Medida *</label>
            <select id="pUnidade" required>
              ${unidades.map(u => `<option value="${u}" ${sel('unidade', u)}>${u}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Local de Armazenamento</label>
            <select id="pLocal">
              <option value="">Selecione...</option>
              ${locais.map(l => `<option value="${l}" ${sel('local', l)}>${l}</option>`).join('')}
            </select>
            <span class="form-hint" id="localHint">Sugestão automática pela temperatura</span>
          </div>
          <div class="form-group">
            <label>Estoque Mínimo</label>
            <input type="number" id="pEstMin" min="0" step="0.01" placeholder="0" value="${val('estoqueMinimo')}" />
          </div>
          <div class="form-group">
            <label>Estoque Máximo</label>
            <input type="number" id="pEstMax" min="0" step="0.01" placeholder="0" value="${val('estoqueMaximo')}" />
          </div>
          ${estInicialHtml}
          <div class="form-group" id="grpFormMax" style="display:${val('categoria') === 'Recheios' ? 'block' : 'none'}">
            <label>Máx. Padrão no Formulário de Pedidos (Lojas)</label>
            <input type="number" id="pFormMax" min="0" step="1" placeholder="0" value="${val('formularioMaximo')}" />
            <span class="form-hint">Quantidade máxima exibida no inventário das lojas. Pode ser ajustado por loja em "Cfg Estoque Máximo".</span>
          </div>
          <div class="form-group">
            <label>Custo Unitário (R$)</label>
            <input type="number" id="pCusto" min="0" step="0.01" placeholder="0.00" value="${val('custo')}" />
          </div>
          <div class="form-group">
            <label>Preço de Venda (R$)</label>
            <input type="number" id="pPrecoVenda" min="0" step="0.01" placeholder="0.00" value="${val('precoVenda')}" />
          </div>
          <div class="form-group">
            <label>Fornecedor Principal</label>
            <input type="text" id="pFornecedor" placeholder="Nome do fornecedor" value="${val('fornecedor')}" />
          </div>
          <div class="form-group full-width">
            <label>Observações</label>
            <textarea id="pObs" placeholder="Informações adicionais...">${val('observacoes')}</textarea>
          </div>
        </div>

        <input type="submit" style="display:none" />
      </form>`;

    App.openModal(titulo, body, [
      { label: 'Cancelar',                      class: 'btn-secondary', action: 'App.closeModal()' },
      { label: produto ? 'Atualizar' : 'Cadastrar', class: 'btn-primary',
        action: "document.getElementById('formProduto').requestSubmit()" }
    ], 'modal-lg');

    // Destacar temperatura já selecionada (edição)
    if (produto && produto.temperatura) {
      setTimeout(() => ProdutosPage.onTemperaturaChange(produto.temperatura), 60);
    }
  },

  onCategoriaChange(categoria) {
    const grp = document.getElementById('grpFormMax');
    if (grp) grp.style.display = categoria === 'Recheios' ? 'block' : 'none';
  },

  onTemperaturaChange(valor) {
    const ids = { 'Congelado': 'lbl-congelado', 'Resfriado': 'lbl-resfriado', 'Temperatura Ambiente': 'lbl-ambiente' };
    Object.entries(ids).forEach(([v, lblId]) => {
      const lbl = document.getElementById(lblId);
      if (!lbl) return;
      const ativo = v === valor;
      lbl.style.borderColor = ativo ? 'var(--info)' : 'var(--border)';
      lbl.style.background  = ativo ? 'rgba(59,130,246,0.1)' : 'transparent';
    });

    // Sugerir local automaticamente (só se ainda não tiver sido escolhido)
    const localSel = document.getElementById('pLocal');
    const hint     = document.getElementById('localHint');
    if (!localSel) return;
    const mapa = {
      'Congelado':            { local: 'Congelador',  txt: '💡 Sugestão: Congelador' },
      'Resfriado':            { local: 'Câmara Fria', txt: '💡 Sugestão: Câmara Fria' },
      'Temperatura Ambiente': { local: 'Câmara Seca', txt: '💡 Sugestão: Câmara Seca' },
    };
    const sug = mapa[valor];
    if (sug && !localSel.value) {
      localSel.value = sug.local;
      if (hint) hint.textContent = sug.txt;
    }
  },

  scanBarcode() {
    BarcodeScanner.open(codigo => {
      document.getElementById('pCodigoBar').value = codigo;
    });
  },

  onFormaEntregaChange() {
    var forma = document.getElementById('pFormaEntrega');
    var lbl   = document.getElementById('lblQtdUnidade');
    var span  = document.getElementById('spanQtdUnidade');
    var hint  = document.getElementById('hintQtdUnidade');
    var unid  = (document.getElementById('pUnidade') || {}).value || 'kg';
    if (!forma || !lbl) return;
    var f = forma.value || 'Unidade';
    if (lbl)  lbl.textContent  = 'Quantidade em ' + unid + ' por ' + f;
    if (span) span.textContent = unid + ' / ' + f;
    if (hint) hint.textContent = 'Ex: 1 ' + f + ' cont\u00e9m ___ ' + unid + '. Ao dar entrada de 1 ' + f + ', o sistema adiciona esse valor ao estoque automaticamente.';
  },

  onQtdUnidadeInput() {
    var forma = (document.getElementById('pFormaEntrega') || {}).value || 'unidade';
    var unid  = (document.getElementById('pUnidade') || {}).value || 'kg';
    var qtd   = parseFloat((document.getElementById('pQtdPorUnidade') || {}).value) || 0;
    var hint  = document.getElementById('hintQtdUnidade');
    if (hint && qtd > 0) {
      hint.innerHTML = '\u2705 1 <strong>' + forma + '</strong> = <strong>' + qtd + ' ' + unid + '</strong>. Ao receber 2 ' + forma + 's, o sistema adicionar\u00e1 <strong>' + (qtd * 2) + ' ' + unid + '</strong> ao estoque.';
      hint.style.color = 'var(--accent)';
    }
  },

  salvar(e, id) {
    e.preventDefault();
    const temperaturaEl = document.querySelector('input[name="pTemperatura"]:checked');
    const dados = {
      nome:            document.getElementById('pNome').value.trim(),
      categoria:       document.getElementById('pCategoria').value,
      codigoInterno:   document.getElementById('pCodigoInt').value.trim(),
      codigoBarras:    document.getElementById('pCodigoBar').value.trim(),
      formaEntrega:    document.getElementById('pFormaEntrega').value,
      qtdPorUnidade:   parseFloat(document.getElementById('pQtdPorUnidade').value) || 0,
      temperatura:     temperaturaEl ? temperaturaEl.value : '',
      unidade:         document.getElementById('pUnidade').value,
      local:           document.getElementById('pLocal').value,
      estoqueMinimo:   parseFloat(document.getElementById('pEstMin').value) || 0,
      estoqueMaximo:   parseFloat(document.getElementById('pEstMax').value) || 0,
      formularioMaximo: parseFloat(document.getElementById('pFormMax')?.value) || 0,
      custo:           parseFloat(document.getElementById('pCusto').value) || 0,
      precoVenda:      parseFloat(document.getElementById('pPrecoVenda').value) || 0,
      fornecedor:      document.getElementById('pFornecedor').value.trim(),
      observacoes:     document.getElementById('pObs').value.trim(),
    };

    if (dados.codigoInterno) {
      const duplicado = DB.getProdutos().find(p => p.codigoInterno === dados.codigoInterno && p.id !== id);
      if (duplicado) {
        App.showToast('Código "' + dados.codigoInterno + '" já está em uso por: ' + duplicado.nome, 'warning');
        return;
      }
    }

    if (id) {
      DB.updateProduto(id, dados);
      App.showToast('Produto atualizado!', 'success');
    } else {
      const estInicial = parseFloat(document.getElementById('pEstInicial').value) || 0;
      dados.estoque = estInicial;
      DB.addProduto(dados);
      App.showToast('Produto cadastrado!', 'success');
    }

    App.closeModal();
    App.navigateTo('produtos');
  },

  deletar(id) {
    const p = DB.getProdutoPorId(id);
    if (!confirm('Excluir "' + p?.nome + '"? Esta ação não pode ser desfeita.')) return;
    DB.deleteProduto(id);
    App.showToast('Produto excluído.', 'info');
    App.navigateTo('produtos');
  },

  verHistorico(id) {
    const produto = DB.getProdutoPorId(id);
    const movs    = DB.getMovimentacoesPorProduto(id).sort((a, b) => new Date(b.data) - new Date(a.data));

    const rows = movs.map(m => {
      const tipo = m.tipo === 'entrada' ? '📥 Entrada' : m.tipo === 'saida' ? '📤 Saída' : '🍳 Produção';
      const cor  = m.tipo === 'entrada' ? 'text-accent' : m.tipo === 'saida' ? 'text-danger' : '';
      const sinal = m.tipo === 'saida' ? '-' : '+';
      const data  = new Date(m.data).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
      return `<tr>
        <td style="font-size:.8rem">${data}</td>
        <td>${tipo}</td>
        <td class="${cor}" style="font-weight:600">${sinal} ${m.quantidade} ${produto?.unidade || ''}</td>
        <td style="font-size:.78rem;color:var(--text-muted)">${m.observacao || m.motivo || '—'}</td>
      </tr>`;
    }).join('');

    const body = `
      <div style="margin-bottom:16px">
        <h4 style="color:var(--accent)">${produto?.nome}</h4>
        <p style="font-size:.82rem;color:var(--text-muted)">
          Estoque atual: <strong style="color:var(--text-primary)">${parseFloat(produto?.estoque || 0).toFixed(2)} ${produto?.unidade || ''}</strong>
          ${produto?.formaEntrega ? ` &nbsp;|&nbsp; Entrega: <strong>${produto.formaEntrega}</strong>` : ''}
          ${produto?.temperatura  ? ` &nbsp;|&nbsp; Temp.: <strong>${produto.temperatura}</strong>` : ''}
        </p>
      </div>
      ${movs.length === 0
        ? '<p class="text-muted" style="text-align:center;padding:20px">Sem movimentações registradas</p>'
        : `<div style="max-height:320px;overflow-y:auto">
            <table>
              <thead><tr><th>Data</th><th>Tipo</th><th>Qtd</th><th>Obs</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
           </div>`}`;

    App.openModal('Histórico — ' + produto?.nome, body, [
      { label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal()' }
    ], 'modal-lg');
  },

  exportCSV() {
    const produtos = DB.getProdutos();
    const header   = 'ID,Nome,Categoria,Forma de Entrega,Temperatura,Cod.Interno,Cod.Barras,Unidade,Estoque,Est.Mínimo,Est.Máximo,Custo,Preço Venda,Fornecedor,Local';
    const rows     = produtos.map(p =>
      [p.id, p.nome, p.categoria, p.formaEntrega, p.temperatura,
       p.codigoInterno, p.codigoBarras, p.unidade, p.estoque,
       p.estoqueMinimo, p.estoqueMaximo, p.custo, p.precoVenda, p.fornecedor, p.local]
        .map(v => `"${v || ''}"`)
        .join(',')
    );
    const csv  = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'produtos_' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
  },

  postRender() {
    this._limparDuplicados();
  },

  _limparDuplicados() {
    const produtos = DB.getProdutos();
    const grupos = {};
    produtos.forEach(p => {
      if (!p.codigoInterno) return;
      if (!grupos[p.codigoInterno]) grupos[p.codigoInterno] = [];
      grupos[p.codigoInterno].push(p);
    });

    let removidos = 0;
    Object.values(grupos).forEach(grupo => {
      if (grupo.length <= 1) return;
      // Mantém o mais recente; remove os demais
      grupo.sort((a, b) => new Date(b.criadoEm || 0) - new Date(a.criadoEm || 0));
      grupo.slice(1).forEach(p => { DB.deleteProduto(p.id); removidos++; });
    });

    if (removidos > 0) {
      App.showToast(removidos + ' produto(s) duplicado(s) removido(s) automaticamente.', 'info');
      document.getElementById('produtosTableBody').innerHTML = this.renderTable();
    }
  },
};


/**
 * fichas.js — Módulo de Fichas Técnicas (Receitas)
 */

const FichasPage = {
  ingredientesTmp: [],

  render() {
    const fichas = DB.getFichas();
    return `
      <div class="page-header">
        <div>
          <h1>📋 Fichas Técnicas</h1>
          <p>Receitas e formulações dos pratos produzidos</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="FichasPage.openModal()">+ Nova Ficha</button>
        </div>
      </div>

      ${fichas.length === 0 ? `
        <div class="empty-state card"><div class="empty-icon">📋</div><h3>Nenhuma ficha técnica</h3><p>Crie fichas técnicas para controlar a produção</p></div>
      ` : `
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
          ${fichas.map(f => this.renderFichaCard(f)).join('')}
        </div>
      `}
    `;
  },

  renderFichaCard(f) {
    const custo = this.calcularCusto(f);
    const produto = f.produtoId ? DB.getProdutoPorId(f.produtoId) : null;
    return `
      <div class="card" style="cursor:default;transition:all .2s" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)'">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div style="flex:1;min-width:0">
            <h3 style="font-size:1rem;font-weight:700;color:var(--text-primary)">${f.nome}</h3>
            ${produto ? `<div style="font-size:.75rem;color:var(--accent);font-weight:600;margin-top:2px">📦 ${produto.nome}</div>` : ''}
            <span class="badge badge-info" style="margin-top:4px">${f.categoria||'Geral'}</span>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0;margin-left:8px">
            <button class="btn btn-secondary btn-sm" onclick="FichasPage.verDetalhes('${f.id}')" title="Ver">👁️</button>
            <button class="btn btn-secondary btn-sm" onclick="FichasPage.openModal('${f.id}')" title="Editar">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="FichasPage.deletar('${f.id}')" title="Excluir">🗑️</button>
          </div>
        </div>
        <div style="display:flex;gap:16px;margin-bottom:12px">
          <div style="text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:var(--accent)">${f.rendimento}</div>
            <div style="font-size:.7rem;color:var(--text-muted)">${f.unidadeRendimento||'porções'}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:var(--info)">${f.tempoPreparo||0}min</div>
            <div style="font-size:.7rem;color:var(--text-muted)">Preparo</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:1.2rem;font-weight:700;color:var(--warning)">R$${custo.total.toFixed(2)}</div>
            <div style="font-size:.7rem;color:var(--text-muted)">Custo total</div>
          </div>
        </div>
        <div style="font-size:.78rem;color:var(--text-muted)">
          ${f.ingredientes?.length||0} ingrediente(s) • R$ ${custo.porPorcao.toFixed(2)}/porção
        </div>
        <button class="btn btn-primary w-full mt-16" style="justify-content:center" onclick="ProducaoPage.iniciarProducaoFicha('${f.id}'); App.navigateTo('producao')">
          🍳 Iniciar Produção
        </button>
      </div>
    `;
  },

  calcularCusto(ficha) {
    let total = 0;
    (ficha.ingredientes || []).forEach(ing => {
      const p = DB.getProdutoPorId(ing.produtoId);
      if (p) total += parseFloat(p.custo || 0) * parseFloat(ing.quantidade || 0);
    });
    const rendimento = parseFloat(ficha.rendimento || 1);
    return { total, porPorcao: rendimento > 0 ? total / rendimento : 0 };
  },

  // ── Ponto de entrada: nova ficha abre seletor de produto; edição abre form direto ──
  openModal(id = null) {
    if (!id) {
      this._abrirSeletorProduto();
    } else {
      const ficha = DB.getFichas().find(f => f.id === id);
      this._abrirFormFicha(ficha, null);
    }
  },

  // ── Passo 1: escolher o produto ao qual a ficha pertence ──
  _abrirSeletorProduto() {
    const produtos = DB.getProdutos()
      .sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));

    if (produtos.length === 0) {
      App.showToast('Cadastre pelo menos um produto antes de criar uma ficha técnica.', 'warning');
      return;
    }

    const itens = produtos.map(p => `
      <div class="card" style="padding:12px;cursor:pointer;transition:border-color .15s,background .15s"
           data-busca="${p.nome.toLowerCase()} ${(p.categoria||'').toLowerCase()}"
           onclick="FichasPage._selecionarProdutoFicha('${p.id}')"
           onmouseenter="this.style.borderColor='var(--accent)';this.style.background='var(--bg-hover)'"
           onmouseleave="this.style.borderColor='var(--border)';this.style.background=''">
        <div style="font-weight:700;font-size:.9rem;color:var(--text-primary)">${p.nome}</div>
        <div style="font-size:.75rem;color:var(--text-muted);margin-top:2px">${p.categoria||'—'} • ${p.unidade}</div>
      </div>
    `).join('');

    const body = `
      <div style="margin-bottom:12px">
        <input type="text" id="buscaProdFicha" class="input-form"
               placeholder="🔍 Buscar produto..."
               oninput="FichasPage._filtrarSeletor()"
               style="width:100%" />
      </div>
      <div id="listaProdsFicha"
           style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;max-height:430px;overflow-y:auto">
        ${itens}
      </div>
    `;

    App.openModal('Selecionar Produto para a Ficha Técnica', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' }
    ], 'modal-lg');
  },

  _filtrarSeletor() {
    const termo = (document.getElementById('buscaProdFicha')?.value || '').toLowerCase();
    document.querySelectorAll('#listaProdsFicha > div').forEach(el => {
      el.style.display = el.dataset.busca.includes(termo) ? '' : 'none';
    });
  },

  _selecionarProdutoFicha(produtoId) {
    App.closeModal();
    setTimeout(() => this._abrirFormFicha(null, produtoId), 150);
  },

  // ── Passo 2: formulário completo da ficha, com produto vinculado no topo ──
  _abrirFormFicha(ficha, produtoId) {
    this.ingredientesTmp = ficha ? JSON.parse(JSON.stringify(ficha.ingredientes || [])) : [];

    const pId = produtoId || ficha?.produtoId || '';
    const produto = pId ? DB.getProdutoPorId(pId) : null;

    const categorias = ['Sopas', 'Proteínas', 'Acompanhamentos', 'Saladas', 'Sobremesas', 'Bebidas', 'Lanches', 'Geral'];
    const unidades = ['kg', 'g', 'L', 'ml', 'un', 'colher', 'xícara', 'pitada'];
    const produtos = DB.getProdutos();

    const body = `
      <form id="formFicha" onsubmit="FichasPage.salvar(event, '${ficha?.id||''}')">

        <div style="background:var(--bg-input);border:1px solid var(--accent);border-radius:10px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px">
          <div style="font-size:1.6rem;line-height:1">📦</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">Produto vinculado</div>
            <div style="font-weight:700;font-size:1rem;color:var(--text-primary);margin-top:1px">${produto?.nome || '<em style="color:var(--text-muted);font-weight:400">Nenhum produto selecionado</em>'}</div>
            ${produto ? `<div style="font-size:.75rem;color:var(--text-muted)">${produto.categoria||''} ${produto.unidade ? '• '+produto.unidade : ''}</div>` : ''}
          </div>
          ${ficha ? `<button type="button" class="btn btn-secondary btn-sm" onclick="App.closeModal();setTimeout(()=>FichasPage._abrirSeletorParaTrocar('${ficha.id}'),150)">Trocar</button>` : ''}
          <input type="hidden" id="fProdutoId" value="${pId}" />
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nome da Ficha *</label>
            <input type="text" id="fNome" required placeholder="Ex: Frango ao Molho" value="${ficha?.nome || produto?.nome || ''}" />
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select id="fCategoria">
              ${categorias.map(c => `<option value="${c}" ${ficha?.categoria===c?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Rendimento</label>
            <input type="number" id="fRendimento" min="1" step="0.1" value="${ficha?.rendimento||10}" />
          </div>
          <div class="form-group">
            <label>Unidade do Rendimento</label>
            <input type="text" id="fUnidadeRend" placeholder="Ex: porções" value="${ficha?.unidadeRendimento||'porções'}" />
          </div>
          <div class="form-group">
            <label>Tempo de Preparo (min)</label>
            <input type="number" id="fTempo" min="0" value="${ficha?.tempoPreparo||30}" />
          </div>
        </div>

        <div style="margin:16px 0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <label style="margin:0">Ingredientes</label>
            <button type="button" class="btn btn-secondary btn-sm" onclick="FichasPage.adicionarIngrediente()">+ Adicionar</button>
          </div>
          <div class="ingredient-list" id="ingredientesList">
            ${this.renderIngredientes(produtos, unidades)}
          </div>
        </div>

        <div class="form-group">
          <label>Modo de Preparo</label>
          <textarea id="fModo" rows="4" placeholder="Descreva o passo a passo...">${ficha?.modoPreparo||''}</textarea>
        </div>
        <div class="form-group">
          <label>Observações</label>
          <textarea id="fObs" rows="2" placeholder="Alérgicos, variações...">${ficha?.observacoes||''}</textarea>
        </div>
        <input type="submit" style="display:none" />
      </form>
    `;

    App.openModal(ficha ? 'Editar Ficha Técnica' : 'Nova Ficha Técnica', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: 'Salvar', class: 'btn-primary', action: `document.getElementById('formFicha').requestSubmit()` }
    ], 'modal-lg');
  },

  // Permite trocar o produto vinculado a uma ficha existente
  _abrirSeletorParaTrocar(fichaId) {
    const produtos = DB.getProdutos()
      .sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));

    const itens = produtos.map(p => `
      <div class="card" style="padding:12px;cursor:pointer;transition:border-color .15s,background .15s"
           data-busca="${p.nome.toLowerCase()} ${(p.categoria||'').toLowerCase()}"
           onclick="FichasPage._trocarProdutoFicha('${fichaId}','${p.id}')"
           onmouseenter="this.style.borderColor='var(--accent)';this.style.background='var(--bg-hover)'"
           onmouseleave="this.style.borderColor='var(--border)';this.style.background=''">
        <div style="font-weight:700;font-size:.9rem">${p.nome}</div>
        <div style="font-size:.75rem;color:var(--text-muted);margin-top:2px">${p.categoria||'—'} • ${p.unidade}</div>
      </div>
    `).join('');

    const body = `
      <div style="margin-bottom:12px">
        <input type="text" id="buscaProdFicha2" class="input-form"
               placeholder="🔍 Buscar produto..."
               oninput="FichasPage._filtrarSeletor2()"
               style="width:100%" />
      </div>
      <div id="listaProdsFicha2"
           style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;max-height:430px;overflow-y:auto">
        ${itens}
      </div>
    `;

    App.openModal('Trocar Produto Vinculado', body, [
      { label: 'Cancelar', class: 'btn-secondary', action: `App.closeModal();setTimeout(()=>FichasPage.openModal('${fichaId}'),150)` }
    ], 'modal-lg');
  },

  _filtrarSeletor2() {
    const termo = (document.getElementById('buscaProdFicha2')?.value || '').toLowerCase();
    document.querySelectorAll('#listaProdsFicha2 > div').forEach(el => {
      el.style.display = el.dataset.busca.includes(termo) ? '' : 'none';
    });
  },

  _trocarProdutoFicha(fichaId, produtoId) {
    App.closeModal();
    setTimeout(() => {
      const ficha = DB.getFichas().find(f => f.id === fichaId);
      if (ficha) this._abrirFormFicha(ficha, produtoId);
    }, 150);
  },

  renderIngredientes(produtos, unidades) {
    if (this.ingredientesTmp.length === 0) {
      return `<div id="emptyIng" style="text-align:center;padding:20px;color:var(--text-muted);font-size:.85rem">Nenhum ingrediente. Clique em "+ Adicionar"</div>`;
    }
    const unids = unidades || ['kg', 'g', 'L', 'ml', 'un'];
    return this.ingredientesTmp.map((ing, i) => `
      <div class="ingredient-item" id="ing_${i}">
        <select style="flex:2" onchange="FichasPage.updateIngrediente(${i}, 'produtoId', this.value)">
          <option value="">Selecione o produto...</option>
          ${(produtos || DB.getProdutos()).map(p => `<option value="${p.id}" ${ing.produtoId===p.id?'selected':''}>${p.nome} (${p.unidade})</option>`).join('')}
        </select>
        <input type="number" style="flex:0.8;min-width:70px" placeholder="Qtd" min="0" step="0.001" value="${ing.quantidade||''}" onchange="FichasPage.updateIngrediente(${i}, 'quantidade', this.value)" />
        <select style="flex:0.6" onchange="FichasPage.updateIngrediente(${i}, 'unidade', this.value)">
          ${unids.map(u => `<option value="${u}" ${ing.unidade===u?'selected':''}>${u}</option>`).join('')}
        </select>
        <button type="button" class="remove-btn" onclick="FichasPage.removerIngrediente(${i})">✕</button>
      </div>
    `).join('');
  },

  adicionarIngrediente() {
    this.ingredientesTmp.push({ produtoId: '', quantidade: '', unidade: 'kg' });
    document.getElementById('ingredientesList').innerHTML = this.renderIngredientes(DB.getProdutos(), ['kg','g','L','ml','un','colher','xícara','pitada']);
  },

  removerIngrediente(i) {
    this.ingredientesTmp.splice(i, 1);
    document.getElementById('ingredientesList').innerHTML = this.renderIngredientes(DB.getProdutos(), ['kg','g','L','ml','un','colher','xícara','pitada']);
  },

  updateIngrediente(i, campo, valor) {
    this.ingredientesTmp[i][campo] = campo === 'quantidade' ? parseFloat(valor) : valor;
    if (campo === 'produtoId' && valor) {
      const p = DB.getProdutoPorId(valor);
      if (p) this.ingredientesTmp[i].unidade = p.unidade;
    }
  },

  salvar(e, id) {
    e.preventDefault();
    const dados = {
      produtoId: document.getElementById('fProdutoId')?.value || '',
      nome: document.getElementById('fNome').value.trim(),
      categoria: document.getElementById('fCategoria').value,
      rendimento: parseFloat(document.getElementById('fRendimento').value) || 1,
      unidadeRendimento: document.getElementById('fUnidadeRend').value.trim(),
      tempoPreparo: parseInt(document.getElementById('fTempo').value) || 0,
      ingredientes: this.ingredientesTmp.filter(i => i.produtoId && i.quantidade > 0),
      modoPreparo: document.getElementById('fModo').value.trim(),
      observacoes: document.getElementById('fObs').value.trim()
    };

    if (id) {
      DB.updateFicha(id, dados);
      App.showToast('Ficha técnica atualizada!', 'success');
    } else {
      DB.addFicha(dados);
      App.showToast('Ficha técnica criada!', 'success');
    }
    App.closeModal();
    App.navigateTo('fichas');
  },

  deletar(id) {
    const f = DB.getFichas().find(f => f.id === id);
    if (!confirm(`Excluir ficha "${f?.nome}"?`)) return;
    DB.deleteFicha(id);
    App.showToast('Ficha excluída.', 'info');
    App.navigateTo('fichas');
  },

  verDetalhes(id) {
    const f = DB.getFichas().find(fi => fi.id === id);
    if (!f) return;
    const custo = this.calcularCusto(f);
    const produto = f.produtoId ? DB.getProdutoPorId(f.produtoId) : null;

    const body = `
      ${produto ? `
        <div style="background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
          <span style="font-size:1.2rem">📦</span>
          <div>
            <div style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">Produto vinculado</div>
            <div style="font-weight:700;font-size:.9rem">${produto.nome}</div>
            <div style="font-size:.72rem;color:var(--text-muted)">${produto.categoria||''} ${produto.unidade ? '• '+produto.unidade : ''}</div>
          </div>
        </div>
      ` : ''}

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px">
        <div class="card" style="text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:var(--accent)">${f.rendimento}</div>
          <div style="font-size:.75rem;color:var(--text-muted)">${f.unidadeRendimento||'porções'}</div>
        </div>
        <div class="card" style="text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:var(--info)">${f.tempoPreparo||0}min</div>
          <div style="font-size:.75rem;color:var(--text-muted)">Tempo de Preparo</div>
        </div>
        <div class="card" style="text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:var(--warning)">R$ ${custo.porPorcao.toFixed(2)}</div>
          <div style="font-size:.75rem;color:var(--text-muted)">Custo/porção</div>
        </div>
      </div>

      <h4 style="font-size:.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px">INGREDIENTES</h4>
      <div class="table-container" style="margin-bottom:16px">
        <table>
          <thead><tr><th>Produto</th><th>Quantidade</th><th>Unidade</th><th>Custo</th><th>Disponível</th></tr></thead>
          <tbody>
            ${(f.ingredientes||[]).map(ing => {
              const p = DB.getProdutoPorId(ing.produtoId);
              const custoIng = p ? parseFloat(p.custo||0) * parseFloat(ing.quantidade||0) : 0;
              const disponivel = p ? parseFloat(p.estoque||0) >= parseFloat(ing.quantidade||0) : false;
              return `<tr>
                <td><strong>${p?.nome || ing.nome || '—'}</strong></td>
                <td>${ing.quantidade}</td>
                <td>${ing.unidade}</td>
                <td>R$ ${custoIng.toFixed(2)}</td>
                <td><span class="badge ${disponivel?'badge-success':'badge-danger'}">${disponivel?'✅ OK':'❌ Insuf.'}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

      ${f.modoPreparo ? `
        <h4 style="font-size:.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px">MODO DE PREPARO</h4>
        <div style="background:var(--bg-input);border-radius:8px;padding:12px;font-size:.85rem;line-height:1.6;white-space:pre-line">${f.modoPreparo}</div>
      ` : ''}
    `;

    App.openModal(f.nome, body, [
      { label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: '🍳 Iniciar Produção', class: 'btn-primary', action: `App.closeModal();ProducaoPage.iniciarProducaoFicha('${f.id}');App.navigateTo('producao')` }
    ], 'modal-lg');
  },

  postRender() {}
};

          EntradaPage.openModal(p.id);

      } else {
        App.showToast('Código não encontrado', 'warning');
        EntradaPage._setBarcodeStatus('warn', '⚠️ Código não encontrado: ' + codigo);
      }
    });
  },

  // Chamado enquanto o usuário digita — detecta leitura rápida do scanner (termina em Enter automaticamente)
  _barcodeTimer: null,
  onBarcodeInput: function(val) {
    // Leitores USB enviam o código inteiro em ~100ms. Se o campo tiver 5+ chars e parar de receber
    // input por 300ms, faz a busca automaticamente (sem precisar apertar Enter)
    clearTimeout(EntradaPage._barcodeTimer);
    if (val.length >= 4) {
      EntradaPage._barcodeTimer = setTimeout(function() {
        EntradaPage.buscarPorBarcode();
      }, 300);
    }
  },

  buscarPorBarcode: function() {
    var input = document.getElementById('erBarcode');
    if (!input) return;
    var codigo = input.value.trim();
    if (!codigo) return;

    var p = DB.getProdutoPorCodigo(codigo);
    if (p) {
      var sel = document.getElementById('erProduto');
      if (sel) sel.value = p.id;
      EntradaPage._setBarcodeStatus('success', '✅ Produto encontrado: <strong>' + p.nome + '</strong> — Estoque: ' + parseFloat(p.estoque||0).toFixed(2) + ' ' + p.unidade);
      EntradaPage._atualizarPainelUnidade(p);
      var qtdEl = document.getElementById('erQtd');
      if (qtdEl && !qtdEl.value) { setTimeout(function(){ qtdEl.focus(); qtdEl.select(); }, 50); }
    } else {
      EntradaPage._setBarcodeStatus('warn', '⚠️ Nenhum produto com o código: <strong>' + codigo + '</strong>');
    }
  },

  _setBarcodeStatus: function(tipo, msg) {
    var el = document.getElementById('erBarcodeStatus');
    if (!el) return;
    var cor = tipo === 'success' ? '#10b981' : tipo === 'warn' ? '#f59e0b' : '#ef4444';
    el.innerHTML = '<span style="color:' + cor + '">' + msg + '</span>';
  },

  // Chamado quando o produto é selecionado no dropdown
  onProdutoChange: function() {
    var sel = document.getElementById('erProduto');
    if (!sel || !sel.value) {
      var panel = document.getElementById('erUnidadePanel');
      if (panel) panel.style.display = 'none';
      return;
    }
    var p = DB.getProdutoPorId(sel.value);
    if (!p) return;
    EntradaPage._atualizarPainelUnidade(p);
  },

  _atualizarPainelUnidade: function(p) {
    var panel = document.getElementById('erUnidadePanel');
    if (!panel) return;
    var qtdPor = parseFloat(p.qtdPorUnidade || 0);
    if (qtdPor <= 0) {
      panel.style.display = 'none';
      return;
    }
    panel.style.display = 'block';
    var forma = p.formaEntrega || 'Unidade';
    var unid  = p.unidade || 'kg';
    var formaLabel  = document.getElementById('erFormaLabel');
    var unidadeNome = document.getElementById('erUnidadeNome');
    var qtdSpan     = document.getElementById('erQtdPorUnidade');
    var medSpan     = document.getElementById('erUnidadeMedida');
    var totalUnid   = document.getElementById('erTotalUnid');
    if (formaLabel)  formaLabel.textContent  = forma;
    if (unidadeNome) unidadeNome.textContent = forma + (forma.slice(-1) === 'a' ? 's' : 's');
    if (qtdSpan)     qtdSpan.textContent     = qtdPor;
    if (medSpan)     medSpan.textContent     = unid;
    if (totalUnid)   totalUnid.textContent   = unid;
    // Limpa o campo de unidades
    var erUnidades = document.getElementById('erUnidades');
    if (erUnidades) erUnidades.value = '';
    var erTotal = document.getElementById('erTotalCalc');
    if (erTotal) erTotal.textContent = '0';
  },

  calcularPorUnidade: function() {
    var prodSel = document.getElementById('erProduto');
    if (!prodSel || !prodSel.value) return;
    var p = DB.getProdutoPorId(prodSel.value);
    if (!p) return;
    var qtdPor = parseFloat(p.qtdPorUnidade || 0);
    var nUnid  = parseFloat((document.getElementById('erUnidades') || {}).value) || 0;
    var total  = qtdPor * nUnid;
    var el     = document.getElementById('erTotalCalc');
    if (el) el.textContent = total % 1 === 0 ? total : total.toFixed(3);
  },

  aplicarCalculo: function() {
    var prodSel = document.getElementById('erProduto');
    if (!prodSel || !prodSel.value) { App.showToast('Selecione um produto primeiro', 'warning'); return; }
    var p = DB.getProdutoPorId(prodSel.value);
    if (!p) return;
    var qtdPor = parseFloat(p.qtdPorUnidade || 0);
    var nUnid  = parseFloat((document.getElementById('erUnidades') || {}).value) || 0;
    if (nUnid <= 0) { App.showToast('Informe quantas ' + (p.formaEntrega || 'unidades') + ' chegaram', 'warning'); return; }
    var total = qtdPor * nUnid;
    var qtdEl = document.getElementById('erQtd');
    if (qtdEl) { qtdEl.value = total % 1 === 0 ? total : total.toFixed(3); }
    App.showToast(nUnid + ' ' + (p.formaEntrega || 'unidade(s)') + ' = ' + total + ' ' + p.unidade + ' aplicados!', 'success');
  },

  onQtdManualChange: function() {
    // Se o usuário digitou a quantidade manualmente, limpa o campo de unidades para evitar confusão
    var erUnidades = document.getElementById('erUnidades');
    if (erUnidades) erUnidades.value = '';
    var erTotal = document.getElementById('erTotalCalc');
    if (erTotal) erTotal.textContent = '0';
  },

  salvarRapido(e) {
    e.preventDefault();
    const produtoId = document.getElementById('erProduto').value;
    const quantidade = parseFloat(document.getElementById('erQtd').value);
    const custo = parseFloat(document.getElementById('erCusto').value) || 0;
    const fornecedor = document.getElementById('erFornecedor').value.trim();
    const notaFiscal = document.getElementById('erNF').value.trim();
    const validade = document.getElementById('erValidade').value;

    const produto = DB.getProdutoPorId(produtoId);
    if (!produto || !quantidade) return;

    const lote = DB._gerarLote();
    DB.addMovimentacao({
      tipo: 'entrada',
      produtoId,
      produtoNome: produto.nome,
      quantidade,
      custo,
      fornecedor,
      notaFiscal,
      validade,
      lote
    });

    // Criar lote de armazenamento
    if (validade || true) {
      DB.addLote({
        produtoId,
        produtoNome: produto.nome,
        lote,
        quantidadeInicial: quantidade,
        quantidadeAtual: quantidade,
        local: produto.local || 'Câmara Seca',
        validade,
        fornecedor,
        notaFiscal
      });
    }

    // Atualizar custo unitário se fornecido
    if (custo > 0) {
      DB.updateProduto(produtoId, { custo });
    }

    // Atualizar badge
    const badgeEl = document.getElementById('badge-entrada');
    if (badgeEl) {
      const tot = parseInt(badgeEl.textContent || '0') + 1;
      badgeEl.textContent = tot;
      badgeEl.classList.add('visible');
    }

    App.showToast(`Entrada de ${quantidade} ${produto.unidade} de "${produto.nome}" registrada!`, 'success');
    e.target.reset();
    App.navigateTo('entrada');
  },

  postRender() {},

  // ═══════════════════════════════════════════════════════════
  // IMPORTAÇÃO NF-e
  // ═══════════════════════════════════════════════════════════

  openImportarNFe: function() {
    var body = '<div style="display:flex;flex-direction:column;gap:20px">'
