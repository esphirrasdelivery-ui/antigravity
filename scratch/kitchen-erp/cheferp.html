    `;

    return `
      <div style="margin-bottom:-1px;display:flex;gap:4px;flex-wrap:wrap">${tabs}</div>
      ${painel}
    `;
  },

  _trocarCatTab(idx) {
    // Persiste edições da aba atual antes de trocar
    this._coletarEdicoesDaAba();
    this._catTab = idx;
    // Re-renderiza só o corpo do moídal sem fechar
    const modalBodyEl = document.getElementById('modalBody');
    if (modalBodyEl) modalBodyEl.innerHTML = this._renderCatalogoBody();
  },

  _coletarEdicoesDaAba() {
    const cats = DB.getCatalogoPedido();
    const cat  = cats[this._catTab];
    if (!cat || cat.id === 'insumos') return; // Recheios é somente leitura
    const newItens = [];
    cat.itens.forEach((_, idx) => {
      const nEl = document.getElementById('catNome_' + idx);
      const mEl = document.getElementById('catMax_'  + idx);
      const fEl = document.getElementById('catForn_' + idx);
      if (nEl) {
        const nome = nEl.value.trim();
        if (nome) {
          const lojas = this.LOJAS_FIXAS.filter((_, li) => {
            const cb = document.getElementById(`catLoja_${idx}_${li}`);
            return cb && cb.checked;
          });
          newItens.push({ nome, max: parseInt(mEl?.value) || 0, fornecedor: fEl?.value.trim() || '', lojas });
        }
      }
    });
    // Reordena alfabéticamente após edição
    newItens.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));
    cat.itens = newItens;
    DB.saveCatalogoPedido(cats);
  },

  _adicionarItemCatalogo() {
    const nomeEl = document.getElementById('novoItemNome');
    const maxEl  = document.getElementById('novoItemMax');
    const nome   = (nomeEl?.value || '').trim();
    if (!nome) { App.showToast('Digite o nome do item!', 'warning'); return; }

    const fornEl = document.getElementById('novoItemForn');
    this._coletarEdicoesDaAba();
    const cats = DB.getCatalogoPedido();
    cats[this._catTab].itens.push({ nome, max: parseInt(maxEl?.value) || 0, fornecedor: fornEl?.value.trim() || '', lojas: [] });
    // Mantém ordem alfabética
    cats[this._catTab].itens.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));
    DB.saveCatalogoPedido(cats);

    const modalBodyEl = document.getElementById('modalBody');
    if (modalBodyEl) modalBodyEl.innerHTML = this._renderCatalogoBody();
    App.showToast(`✅ "${nome}" adicionado em ordem alfabética!`, 'success');
  },

  _deletarItemCatalogo(idx) {
    this._coletarEdicoesDaAba();
    const cats = DB.getCatalogoPedido();
    const item = cats[this._catTab].itens[idx];
    if (!item) return;
    if (!confirm(`Remover "${item.nome}" da categoria?`)) return;
    cats[this._catTab].itens.splice(idx, 1);
    DB.saveCatalogoPedido(cats);
    const modalBodyEl = document.getElementById('modalBody');
    if (modalBodyEl) modalBodyEl.innerHTML = this._renderCatalogoBody();
    App.showToast(`🗑️ Item removido!`, 'success');
  },

  salvarCatalogo() {
    this._coletarEdicoesDaAba();
    // Salva apenas as categorias não-Recheios (Recheios é gerenciado pelo cadastro de produtos)
    const cats = DB.getCatalogoPedido().filter(c => c.id !== 'insumos');
    DB.saveCatalogoPedido(cats);
    App.showToast('Catalogo salvo e sincronizado!', 'success');
    App.closeModal();
  },

  // ===== CONFIGURAÇÃO DE METAS (PAR-LEVEL) =====
  abrirModalMetas() {
      const lojasOpts = this.LOJAS_FIXAS.map(l => `<option value="${l}">${l}</option>`).join('');
      
      const body = `
        <div class="form-group" style="margin-bottom:20px;">
          <label>Selecione a Loja para Configurar o Estoque Máximo</label>
          <select id="selLojaMeta" class="input-form" onchange="PedidosPage.carregarInputsMeta(this.value)">
            <option value="">Selecione...</option>
            ${lojasOpts}
          </select>
        </div>
        <div id="metasContainer" style="display:none; max-height: 50vh; overflow-y:auto; padding-right:10px;">
           <div class="alert alert-info">Digite o ESTOQUE MÁXIMO IDEAL que a loja deve ter de cada item. Se não houver teto, deixe 0.</div>
           <div class="grid" style="grid-template-columns: 1fr 1fr; gap:10px;" id="metasGrid">
           </div>
        </div>
      `;

      App.openModal('⚙️ Configurar Estoque Máximo por Loja', body, [
          { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
          { label: 'Salvar Estoque Máximo', class: 'btn-primary', action: 'PedidosPage.salvarMetasLoja()' },
      ], 'modal-lg');
  },

  carregarInputsMeta(lojaStr) {
      if(!lojaStr) {
          document.getElementById('metasContainer').style.display='none';
          return;
      }
      
      // Busca DB
      const metasDB = DB.getMetas();
      const metaDaLoja = metasDB.find(m => m.loja === lojaStr);
      const confData = metaDaLoja ? metaDaLoja.itens : {};

      // Busca itens direto do catálogo dinâmico (mesmo que o formulário de pedidos)
      const catalogo = DB.getCatalogoPedido();
      let html = '';

      catalogo.forEach(cat => {
          // Título da categoria como separador visual
          html += `
            <div style="grid-column:1/-1; padding:6px 0 2px; margin-top:8px; border-bottom:1px solid var(--border)">
              <span style="font-size:.75rem; font-weight:700; color:var(--accent); letter-spacing:.06em; text-transform:uppercase">
                ${cat.icon} ${cat.nome}
              </span>
            </div>
          `;

          // Itens da categoria em ordem alfabética
          const itensOrdenados = [...cat.itens].sort((a, b) =>
            (a.nome || '').localeCompare(b.nome || '', 'pt-BR', { sensitivity: 'base' })
          );

          itensOrdenados.forEach(item => {
              const nome = typeof item === 'object' ? item.nome : item;
              const val  = confData[nome] || 0;
              html += `
                <div style="background:var(--bg-secondary); padding:10px; border-radius:6px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                   <label style="margin:0; font-size:0.9rem">${nome}</label>
                   <input type="number" min="0" data-item="${nome}" class="input-meta" value="${val}" style="width:70px; text-align:center; padding:5px; border-radius:4px; border:1px solid var(--border); background:var(--bg-primary); color:var(--text-primary);" />
                </div>
              `;
          });
      });

      document.getElementById('metasGrid').innerHTML = html;
      document.getElementById('metasContainer').style.display = 'block';
  },

  salvarMetasLoja() {
      const lojaStr = document.getElementById('selLojaMeta').value;
      if(!lojaStr) return alert("Selecione a loja primeiro.");

      const inputs = document.querySelectorAll('.input-meta');
      const objParams = {};
      inputs.forEach(inp => {
          const item = inp.getAttribute('data-item');
          const val = parseInt(inp.value) || 0;
          objParams[item] = val;
      });

      DB.updateMeta(lojaStr, objParams);
      App.showToast(`✅ Estoque máximo atualizado para ${lojaStr}!`, 'success');
      App.closeModal();
      App.navigateTo('pedidos'); // atualiza calculos visuais
  },

  // ===== LÓGICA DE ROMANEIO (CÁLCULO E INIMPRESSÃO) =====
  calcularItensAEnviar(pedido) {
      // Modo direto: a loja já informou a quantidade que quer receber
      if (pedido.tipoPedido === 'direto') {
          return pedido.itens
              .filter(i => Number(i.quantidade || 0) > 0)
              .map(i => ({
                  nome:          i.nome,
                  estoqueNaLoja: null, // não se aplica no modo direto
                  quantidade:    Number(i.quantidade),
                  separado:      i.separado || 0
              }));
      }

      // Modo inventário: calcula pelo par-level (max - estoque atual)
      const metas = DB.getMetas();
      const metaDaLoja = metas.find(m => m.loja === pedido.loja);
      const limites = metaDaLoja ? metaDaLoja.itens : {};

      const itensRepor = [];
      pedido.itens.forEach(i => {
          const limite = Number(limites[i.nome] || 0);
          const estoqueAtual = Number(i.quantidade || 0);
          const aMandar = limite - estoqueAtual;
          if (aMandar > 0) {
              itensRepor.push({
                  nome: i.nome,
                  estoqueNaLoja: estoqueAtual,
                  quantidade: aMandar,
                  separado: i.separado || 0
              });
          }
      });
      return itensRepor;
  },

  // ===== VIEW DE SEPARAÇÃO (PICKING) =====
  iniciarSeparacao(pedidoId) {
    this.activeSeparacao = pedidoId;
    App.navigateTo('pedidos');
  },

  cancelarSeparacao() {
    this.activeSeparacao = null;
    App.navigateTo('pedidos');
  },

  renderSeparacaoView() {
    const pedidos = DB.getPedidos();
    const pedido = pedidos.find(p => p.id === this.activeSeparacao);
    
    if(!pedido) return '<div class="alert alert-danger">Pedido não encontrado.</div>';

    // 1. Calcula o que de fato tem que mandar via Par-Level
    const itensAEnviar = this.calcularItensAEnviar(pedido);

    if (itensAEnviar.length === 0) {
        return `
            <div class="card" style="max-width:800px; margin:0 auto; padding:40px; text-align:center">
                <h2>Não há itens para separar!</h2>
                <p style="color:var(--text-muted)">O estoque relatado pelo gerente da loja ${pedido.loja} já atingiu ou excedeu o estoque máximo configurado para essa loja. Zero repasses calculados.</p>
                <br/>
                <button class="btn btn-primary" onclick="PedidosPage.finalizarPedido(true)">Baixar Diretamente no Sistema como Finalizado</button>
                <button class="btn btn-secondary" onclick="PedidosPage.cancelarSeparacao()">Voltar</button>
            </div>
        `;
    }

    let itemsHtml = '';
    let prontos = 0;
    
    itensAEnviar.forEach((item, index) => {
      const isDone = item.separado >= item.quantidade;
      if (isDone) prontos++;
      
      const pct = Math.min(100, Math.floor(((item.separado || 0) / item.quantidade) * 100));

      // Buscar o produto no ERP para exibir o código e unidade
      const prodERP = DB.getProdutos().find(p =>
        p.nome.toLowerCase() === item.nome.toLowerCase() ||
        p.nome.toLowerCase().includes(item.nome.toLowerCase()) ||
        item.nome.toLowerCase().includes(p.nome.toLowerCase())
      );
      const codInterno  = prodERP ? (prodERP.codigoInterno || '—') : '—';
      const unidade     = prodERP ? (prodERP.unidade || 'un') : 'un';
      const isKg        = ['kg','g','L','ml'].includes(unidade);
      const sepDisplay  = isKg
        ? `${(item.separado || 0).toFixed(3)} ${unidade}`
        : `${item.separado || 0} ${unidade}`;
      const metaDisplay = isKg
        ? `${item.quantidade.toFixed(3)} ${unidade}`
        : `${item.quantidade} ${unidade}`;
      
      itemsHtml += `
        <div class="item-separacao" style="background: ${isDone ? 'var(--accent-dim)' : 'var(--bg-secondary)'}; padding:15px; border-radius:8px; margin-bottom:12px; border:1px solid var(--border)">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <div>
              <strong style="font-size:1.1rem; color:${isDone ? 'var(--accent)' : 'var(--text-primary)'}">${item.nome}</strong>
              <div style="font-size:0.78rem; color:var(--text-muted); margin-top:2px">
                Cód: <code style="background:var(--bg-card);padding:1px 5px;border-radius:3px">${codInterno}</code>
                &nbsp;|&nbsp; Estoque loja: ${item.estoqueNaLoja} &nbsp;|&nbsp; Est. Máx: ${item.estoqueNaLoja + item.quantidade}
              </div>
            </div>
            <div style="font-size:1.1rem; font-weight:bold; color:${isDone ? 'var(--accent)' : 'var(--warning)'}; text-align:right; min-width:120px">
              ${sepDisplay} / ${metaDisplay}
            </div>
          </div>
          <div style="height:8px; width:100%; background:var(--bg-card); border-radius:4px; overflow:hidden">
            <div style="height:100%; width:${pct}%; background:var(--accent); transition: width 0.3s"></div>
          </div>
        </div>
      `;
    });

    const isTotalDone = prontos === itensAEnviar.length;

    return `
      <div class="card" style="max-width:800px; margin: 0 auto;">
        <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <h2>📦 Reposição: ${this._badgeLoja(pedido.loja)}</h2>
            <p>Pegue o leitor e bip os códigos de barras de cada produto listado até completar a quantidade.</p>
          </div>
          <button class="btn btn-secondary" onclick="PedidosPage.cancelarSeparacao()">Listagem</button>
        </div>
        <div class="card-body">
          <div class="alert alert-info" style="margin-bottom:20px; font-weight:bold">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px; vertical-align:middle"><path d="M4 7V4h16v3M9 20h6M12 14v6M4 20h2"/></svg>
            Leitor de Código de Barras ativo. Pode começar a bipar os produtos...
          </div>
          
          <div style="display:flex; margin-bottom:20px; gap:10px">
              <input type="text" id="manualSimScanner" class="input-form" placeholder="Digitar código manually e dar ENTER (teste)" onkeydown="if(event.key==='Enter') PedidosPage.onBarcodeScanned(this.value)" style="flex:1" />
          </div>

          <div id="separacaoLista">
            ${itemsHtml}
          </div>

          <div style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px; display:flex; justify-content:flex-end">
            ${isTotalDone 
                ? `<button class="btn btn-primary" onclick="PedidosPage.finalizarPedido()" style="font-size:1.2rem; padding:12px 30px">✅ Finalizar e Dar Baixa de Estoque</button>`
                : `<button class="btn btn-danger" onclick="PedidosPage.finalizarParcial()" style="opacity: 0.8">Forçar Finalização Parcial</button>`
            }
          </div>
        </div>
      </div>
    `;
  },

  // ===== EAN-13 CUSTOMIZADO (BALANÇA) =====
  // Formato: 2 | CCCCC | PPPPPP | V
  //   Dígito 1    : fixo = "2"
  //   Dígitos 2-6 : código interno do produto (5 dígitos, ex: "00014")
  //   Dígitos 7-12: peso em gramas sem vírgula (6 dígitos, ex: "001154" → 1,154 kg)
  //   Dígito 13   : dígito verificador EAN-13 padrão
  parseEAN13Balanca(codigo) {
    if (!/^\d{13}$/.test(codigo) || codigo[0] !== '2') return null;
    const codProduto = codigo.substring(1, 6);   // 5 dígitos do código
    const pesoRaw    = codigo.substring(6, 12);  // 6 dígitos do peso
    const pesoKg     = parseInt(pesoRaw, 10) / 1000; // "001154" → 1.154 kg
    return { codProduto, pesoKg };
  },

  // Interceptor do Barcode (chamado pelo app.js global)
  onBarcodeScanned(codigo) {
    if (!this.activeSeparacao) return;

    codigo = (codigo || '').trim();
    if (!codigo) return;

    let produto  = null;
    let qtdBipada = 1;
    let modoBalanca = false;
    let pesoKg = 0;

    // ── Tentar parsear como EAN-13 de balança ──────────────────────────────
    const parsed = this.parseEAN13Balanca(codigo);
    if (parsed) {
      modoBalanca = true;
      pesoKg      = parsed.pesoKg;

      // Busca pelo codigoInterno — aceita com ou sem zeros à esquerda
      const codNum = parseInt(parsed.codProduto, 10).toString();
      const todos  = DB.getProdutos();
      produto = todos.find(p =>
        p.codigoInterno === parsed.codProduto ||
        p.codigoInterno === codNum ||
        (p.codigoInterno || '').replace(/^0+/, '') === codNum
      );

      if (!produto) {
        App.showToast(`❌ Código "${parsed.codProduto}" (EAN-balança) não encontrado no cadastro!`, 'error');
        this.playBeep(false);
        this._focarScanner();
        return;
      }
      qtdBipada = pesoKg;

    } else {
      // ── Fallback: código de barras padrão ─────────────────────────────────
      produto = DB.getProdutoPorCodigo(codigo);
      if (!produto) {
        App.showToast(`❌ Código "${codigo}" não encontrado no ERP!`, 'error');
        this.playBeep(false);
        this._focarScanner();
        return;
      }
    }

    // ── Buscar pedido e lista de separação ────────────────────────────────
    const pedidos = DB.getPedidos();
    const pedido  = pedidos.find(p => p.id === this.activeSeparacao);
    if (!pedido) return;

    const itensCalculados = this.calcularItensAEnviar(pedido);
    const itemAEnviar = itensCalculados.find(i =>
      i.nome.toLowerCase() === produto.nome.toLowerCase() ||
      produto.nome.toLowerCase().includes(i.nome.toLowerCase()) ||
      i.nome.toLowerCase().includes(produto.nome.toLowerCase())
    );

    if (!itemAEnviar) {
      App.showToast(`🚨 "${produto.nome}" não consta na lista de separação desta loja!`, 'error');
      this.playBeep(false);
      this._focarScanner();
      return;
    }

    // ── Atualizar quantidade separada ─────────────────────────────────────
    const itemNoBanco = pedido.itens.find(i => i.nome === itemAEnviar.nome);
    if (itemNoBanco) {
      const anterior = parseFloat(itemNoBanco.separado || 0);
      itemNoBanco.separado = Math.round((anterior + qtdBipada) * 1000) / 1000;

      const label = modoBalanca
        ? `${produto.nome} — ${pesoKg.toFixed(3)} kg bipado | Total: ${itemNoBanco.separado.toFixed(3)} / ${itemAEnviar.quantidade} kg`
        : `${produto.nome} (${itemNoBanco.separado} / ${itemAEnviar.quantidade})`;

      if (itemNoBanco.separado > itemAEnviar.quantidade) {
        App.showToast(`⚠️ Acima do necessário: ${label}`, 'warning');
        this.playBeep(false);
      } else {
        App.showToast(`✅ ${label}`, 'success');
        this.playBeep(true);
      }

      DB.updatePedido(pedido.id, { itens: pedido.itens });
    }

    App.navigateTo('pedidos');
    this._focarScanner();
  },

  _focarScanner() {
    setTimeout(() => {
      const inp = document.getElementById('manualSimScanner');
      if (inp) { inp.value = ''; inp.focus(); }
    }, 50);
  },

  // Finaliza gerando saidas
  finalizarPedido(overrideEmptiness = false) {
    this._efetuarBaixa(true, overrideEmptiness);
  },

  finalizarParcial() {
    if(confirm("ATENÇÃO: A reposição não foi totalmente completada. Deseja realizar a baixa APENAS do que foi bipado até agora e fechar este documento?")) {
      this._efetuarBaixa(false, false);
    }
  },

  _efetuarBaixa(completo, overrideEmptiness) {
    const pedidos = DB.getPedidos();
    const pedido = pedidos.find(p => p.id === this.activeSeparacao);
    if(!pedido) return;

    if (overrideEmptiness) {
        // Apenas mata o pedido
        DB.updatePedido(pedido.id, { status: 'conferido', finalizadoEm: new Date().toISOString() });
        App.showToast(`✅ Baixa documentada (0 itens movidos).`, 'success');
        this.activeSeparacao = null;
        App.navigateTo('pedidos');
        return;
    }

    let saidasRealizadas = 0;
    const itensCalculados = this.calcularItensAEnviar(pedido);

    // Gerar Movimentações apenas do que o separador BIppo
    pedido.itens.forEach(itemBipou => {
      const qtdBaixar = itemBipou.separado || 0;
      if (qtdBaixar <= 0) return;

      const pERP = DB.getProdutos().find(p => 
        p.nome.toLowerCase() === itemBipou.nome.toLowerCase() ||
        p.nome.toLowerCase().includes(itemBipou.nome.toLowerCase()) ||
        itemBipou.nome.toLowerCase().includes(p.nome.toLowerCase())
      );

      if (pERP) {
        DB.addMovimentacao({
          produtoId: pERP.id,
          tipo: 'saida',
          quantidade: qtdBaixar, 
          documento: `REPOSICAO-${pedido.loja}`,
          observacao: completo ? 'Saída via Conferência Total ParLevel' : 'Saída via Conferência Parcial ParLevel'
        });
        saidasRealizadas++;
      } else {
        console.warn('Produto não encontrado para baixa: ', itemBipou.nome);
        App.showToast(`Problema ao abaixar: ${itemBipou.nome}`, 'error');
      }
    });

    DB.updatePedido(pedido.id, { status: 'conferido', finalizadoEm: new Date().toISOString() });
    
    App.showToast(`✅ Baixa de ${saidasRealizadas} lotes finalizada!`, 'success');
    this.activeSeparacao = null;
    App.navigateTo('pedidos');
  },

  imprimirRomaneio(pedidoId) {
    const pedidos = DB.getPedidos();
    const pedido = pedidos.find(p => p.id === pedidoId);
    if (!pedido) return;

    const itensRepor = this.calcularItensAEnviar(pedido);

    // Mapa nome → valor bruto digitado no formulário (TODOS os itens com qualquer entrada)
    const informadoMap = {};
    (pedido.itens || []).forEach(i => {
      if (Number(i.quantidade || 0) > 0) informadoMap[i.nome] = Number(i.quantidade);
    });

    // Itens que constam no formulário mas foram filtrados pelo cálculo de par-level
    // (sem máximo cadastrado, ou estoque já acima do máximo)
    const nomeRepor = new Set(itensRepor.map(i => i.nome));
    const itensExtras = Object.entries(informadoMap)
      .filter(([nome]) => !nomeRepor.has(nome))
      .map(([nome, qtdInformada]) => ({
        nome,
        estoqueNaLoja: qtdInformada,
        quantidade:    0,
        separado:      0,
        isExtra:       true
      }));

    const todosItens = [...itensRepor, ...itensExtras]
      .sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));

    // Índice nome→fornecedor: catálogo (já enriquecido com dados ERP) + fallback direto nos produtos
    const catalogoFlat = {};
    DB.getCatalogoPedido().forEach(cat => {
      cat.itens.forEach(item => { if (item.fornecedor) catalogoFlat[item.nome] = item.fornecedor; });
    });
    const prodFornFlat = {};
    DB.getProdutos().forEach(p => { prodFornFlat[p.nome.toLowerCase()] = p.fornecedor || ''; });
    const _getForn = nome => {
      if (catalogoFlat[nome]) return catalogoFlat[nome];
      const k = nome.toLowerCase();
      if (prodFornFlat[k]) return prodFornFlat[k];
      const match = Object.keys(prodFornFlat).find(pk => pk.includes(k) || k.includes(pk));
      return match ? prodFornFlat[match] : '';
    };

    // Índice nome(lowercase)→precoVenda a partir dos produtos cadastrados
    const precoFlat = {};
    DB.getProdutos().forEach(p => {
      precoFlat[p.nome.toLowerCase()] = parseFloat(p.precoVenda || 0);
    });
    const _getPreco = nome => {
      const k = nome.toLowerCase();
      if (precoFlat[k] !== undefined) return precoFlat[k];
      const match = Object.keys(precoFlat).find(pk => pk.includes(k) || k.includes(pk));
      return match ? precoFlat[match] : 0;
    };

    const isDireto = pedido.tipoPedido === 'direto';
    let trs = '';
    let totalGeral = 0;

    todosItens.forEach(i => {
      const fornecedor = _getForn(i.nome);
      const separado   = i.separado || 0;
      const confOk     = separado >= i.quantidade && i.quantidade > 0;
      const confLabel  = separado > 0
        ? `<strong>${separado}</strong>${confOk ? ' ✓' : ' !'}`
        : '—';
      const confStyle  = confOk
        ? 'font-size:0.8rem;text-align:center;color:#166534'
        : separado > 0
          ? 'font-size:0.8rem;text-align:center;color:#92400e'
          : 'font-size:0.8rem;text-align:center;color:#999';

      const precoVenda = _getPreco(i.nome);
      const qtdValor   = separado > 0 ? separado : i.quantidade;
      const valorItem  = precoVenda * qtdValor;
      if (!i.isExtra) totalGeral += valorItem;

      const valorLabel = precoVenda > 0 && !i.isExtra ? 'R$ ' + valorItem.toFixed(2) : '—';
      const valorStyle = 'font-size:0.75rem;text-align:right;white-space:nowrap;' + (precoVenda > 0 && !i.isExtra ? 'font-weight:600' : 'color:#999');

      const informado   = informadoMap[i.nome] ?? '—';
      const enviarLabel = i.isExtra ? '<span style="color:#aaa">—</span>' : i.quantidade;
      const rowStyle    = i.isExtra ? 'opacity:0.55;background:#fafafa' : '';

      trs += `
        <tr style="${rowStyle}">
          <td><div style="width:14px;height:14px;border:1.5px solid ${i.isExtra ? '#ccc' : '#000'};border-radius:3px"></div></td>
          <td style="font-size:0.85rem;font-weight:bold;text-align:center;white-space:nowrap">${enviarLabel}</td>
          <td style="font-size:0.85rem;text-align:center;color:#1d4ed8;font-weight:700;white-space:nowrap">${informado}</td>
          <td style="font-size:0.82rem">${i.nome}</td>
          <td style="font-size:0.75rem;color:#555;font-weight:600">${fornecedor || '—'}</td>
          <td style="${confStyle};white-space:nowrap">${confLabel}</td>
          <td style="${valorStyle}">${valorLabel}</td>
        </tr>
      `;
    });

    const colSpanTotal = 7;
    if (todosItens.length === 0) {
      trs = `<tr><td colspan="${colSpanTotal}" style="text-align:center;padding:20px">Nenhum item solicitado.</td></tr>`;
    }

    const totalRow = totalGeral > 0 ? `
      <tr style="background:#f0f0f0;font-weight:bold;border-top:2px solid #000">
        <td colspan="6" style="text-align:right;padding:5px 8px;font-size:0.8rem;letter-spacing:.03em">VALOR TOTAL DO PEDIDO:</td>
        <td style="text-align:right;padding:5px 8px;font-size:0.9rem;color:#166534">R$ ${totalGeral.toFixed(2)}</td>
      </tr>
    ` : '';

    const corLoja = this._corLoja(pedido.loja);
    const win = window.open('', '_blank');
    win.document.write(`
      <html>
        <head>
          <title>Romaneio Reposição - ${pedido.loja}</title>
          <style>
            body { font-family: Arial, sans-serif; padding: 12px; color:#000; font-size:11px; }
            .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 12px; }
            .loja-banner { display:inline-block; padding:3px 14px; border-radius:20px; font-size:0.95rem; font-weight:800; letter-spacing:.05em; background:${corLoja.bg}; color:${corLoja.text}; margin:4px 0; }
            table { width: 100%; border-collapse: collapse; margin-top:8px; table-layout:auto; }
            th, td { padding: 3px 5px; text-align: left; border-bottom: 1px solid #ddd; }
            th { background: #f0f0f0; border-bottom: 2px solid #000; font-size:0.72rem; }
            th:nth-child(1), td:nth-child(1),
            th:nth-child(2), td:nth-child(2),
            th:nth-child(3), td:nth-child(3),
            th:nth-child(6), td:nth-child(6),
            th:nth-child(7), td:nth-child(7) { white-space:nowrap; width:1%; }
            @media print {
              body { padding: 5mm; }
              button { display: none; }
            }
          </style>
        </head>
        <body>
          <div class="header">
            <h1 style="margin:0;font-size:1rem">ROMANEIO DE RESSUPRIMENTO</h1>
            <div><span class="loja-banner">${pedido.loja}</span></div>
            <p style="margin:2px 0 0;font-size:0.72rem">Leitura de Estoque em: ${new Date(pedido.data).toLocaleString()}</p>
          </div>
          <table>
            <thead>
              <tr>
                <th>OK</th>
                <th style="text-align:center">ENVIAR</th>
                <th style="text-align:center;color:#1d4ed8">INFORMADO</th>
                <th>DESCRIÇÃO DO ITEM</th>
                <th>FORNECEDOR</th>
                <th style="text-align:center">CONF.</th>
                <th style="text-align:right">VALOR (R$)</th>
              </tr>
            </thead>
            <tbody>${trs}${totalRow}</tbody>
          </table>
          <div style="margin-top:16px;text-align:center">
            <button onclick="window.print()" style="padding:8px 28px;font-size:0.9rem;cursor:pointer;background:#222;color:#fff;border:none;border-radius:6px">Imprimir Agora</button>
          </div>
        </body>
      </html>
    `);
    win.document.close();
  },

  migrarRecheiosParaERP() {
    const catRecheios = DB.getCatalogoPedido().find(c => c.id === 'insumos');
    if (!catRecheios || !catRecheios.itens.length) {
      App.showToast('Nenhum item para migrar.', 'warning');
      return;
    }
    if (!confirm('Criar produtos na categoria "Recheios" para cada item do catálogo atual?\nItens com o mesmo nome já existentes no ERP serao ignorados.')) return;

    const existentes = DB.getProdutos().map(p => p.nome.toLowerCase());
    let criados = 0;
    catRecheios.itens.forEach(item => {
      const nome = typeof item === 'object' ? item.nome : item;
      if (existentes.includes(nome.toLowerCase())) return;
      DB.addProduto({
        nome,
        categoria:        'Recheios',
        formularioMaximo: (typeof item === 'object' ? item.max : 0) || 0,
        fornecedor:       (typeof item === 'object' ? item.fornecedor : '') || '',
        codigoInterno: '', codigoBarras: '', unidade: 'kg', estoque: 0,
        estoqueMinimo: 0, estoqueMaximo: 0, custo: 0, precoVenda: 0,
        temperatura: 'Resfriado', formaEntrega: '', qtdPorUnidade: 0,
        local: 'Camara Fria', observacoes: ''
      });
      criados++;
    });
    const ignorados = catRecheios.itens.length - criados;
    App.showToast(criados + ' produto(s) criado(s)' + (ignorados > 0 ? ', ' + ignorados + ' ja existiam.' : '!'), 'success');
    App.closeModal();
    App.navigateTo('produtos');
  },

  playBeep(success) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      
      if(success) {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        osc.start();
        osc.stop(ctx.currentTime + 0.35);
      }
    } catch(e) {}
  }
};


/**

const RelatoriosPage = {
  charts: {},
  abaAtiva: 'movimentacao',
  dataInicio: '',
  dataFim: '',

  render() {
    const hoje = new Date();
    const inicio = new Date(hoje);
    inicio.setDate(hoje.getDate() - 30);
    if (!this.dataInicio) this.dataInicio = inicio.toISOString().split('T')[0];
    if (!this.dataFim) this.dataFim = hoje.toISOString().split('T')[0];

    return `
      <div class="page-header">
        <div>
          <h1>📊 Relatórios</h1>
          <p>Análise e exportação de dados do estoque</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨️ Imprimir</button>
        </div>
      </div>

      <!-- Filtro de Período -->
      <div class="card mb-16">
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
          <div class="form-group" style="min-width:140px">
            <label>Data Início</label>
            <input type="date" id="relDataInicio" value="${this.dataInicio}" onchange="RelatoriosPage.setPeriodo(this.value, null)" />
          </div>
          <div class="form-group" style="min-width:140px">
            <label>Data Fim</label>
            <input type="date" id="relDataFim" value="${this.dataFim}" onchange="RelatoriosPage.setPeriodo(null, this.value)" />
          </div>
          <button class="btn btn-primary btn-sm" onclick="RelatoriosPage.aplicarFiltro()">Aplicar</button>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:8px">
            <button class="btn btn-secondary btn-sm" onclick="RelatoriosPage.preset(7)">7 dias</button>
            <button class="btn btn-secondary btn-sm" onclick="RelatoriosPage.preset(30)">30 dias</button>
            <button class="btn btn-secondary btn-sm" onclick="RelatoriosPage.preset(90)">90 dias</button>
          </div>
        </div>
      </div>

      <!-- Abas -->
      <div class="tabs">
        <button class="tab-btn ${this.abaAtiva==='movimentacao'?'active':''}" onclick="RelatoriosPage.setAba('movimentacao')">📦 Movimentação</button>
        <button class="tab-btn ${this.abaAtiva==='estoque'?'active':''}" onclick="RelatoriosPage.setAba('estoque')">📋 Posição de Estoque</button>
        <button class="tab-btn ${this.abaAtiva==='producao'?'active':''}" onclick="RelatoriosPage.setAba('producao')">🍳 Produção</button>
        <button class="tab-btn ${this.abaAtiva==='perdas'?'active':''}" onclick="RelatoriosPage.setAba('perdas')">⚠️ Perdas</button>
      </div>

      <div id="relatorioConteudo">
        ${this.renderAba()}
      </div>
    `;
  },

  setAba(aba) {
    this.abaAtiva = aba;
    const el = document.getElementById('relatorioConteudo');
    if (el) {
      el.innerHTML = this.renderAba();
      this.postRenderAba();
    }
  },

  setPeriodo(inicio, fim) {
    if (inicio !== null) this.dataInicio = inicio;
    if (fim !== null) this.dataFim = fim;
  },

  aplicarFiltro() {
    const el = document.getElementById('relatorioConteudo');
    if (el) {
      el.innerHTML = this.renderAba();
      this.postRenderAba();
    }
  },

  preset(dias) {
    const hoje = new Date();
    const inicio = new Date(hoje);
    inicio.setDate(hoje.getDate() - dias);
    this.dataInicio = inicio.toISOString().split('T')[0];
    this.dataFim = hoje.toISOString().split('T')[0];
    document.getElementById('relDataInicio').value = this.dataInicio;
    document.getElementById('relDataFim').value = this.dataFim;
    this.aplicarFiltro();
  },

  getMovsFiltradas() {
    const inicio = new Date(this.dataInicio + 'T00:00:00');
    const fim = new Date(this.dataFim + 'T23:59:59');
    return DB.getMovimentacoes().filter(m => {
      const d = new Date(m.data);
      return d >= inicio && d <= fim;
    });
  },

  renderAba() {
    switch (this.abaAtiva) {
      case 'movimentacao': return this.renderMovimentacao();
      case 'estoque': return this.renderEstoque();
      case 'producao': return this.renderProducao();
      case 'perdas': return this.renderPerdas();
      default: return '';
    }
  },

  renderMovimentacao() {
    const movs = this.getMovsFiltradas().sort((a,b) => new Date(b.data)-new Date(a.data));
    const entradas = movs.filter(m => m.tipo === 'entrada');
    const saidas = movs.filter(m => m.tipo === 'saida');
    const consumos = movs.filter(m => m.tipo === 'consumo');

    const totalEntradas = entradas.reduce((s,m) => s + (parseFloat(m.custo||0)*parseFloat(m.quantidade||0)), 0);
    const totalSaidas = saidas.length + consumos.length;

    return `
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card" style="--stat-color:var(--accent);--stat-bg:var(--accent-dim)">
          <div class="stat-icon">📥</div>
          <div class="stat-info">
            <div class="stat-value">${entradas.length}</div>
            <div class="stat-label">Entradas</div>
            <div class="stat-sub">R$ ${totalEntradas.toFixed(2)}</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color:var(--danger);--stat-bg:var(--danger-dim)">
          <div class="stat-icon">📤</div>
          <div class="stat-info">
            <div class="stat-value">${totalSaidas}</div>
            <div class="stat-label">Saídas + Consumos</div>
          </div>
        </div>

  renderEstoque() {

        <div class="stat-card" style="--stat-color:var(--danger);--stat-bg:var(--danger-dim)">

            <tbody>
              ${produtos.map(p => {
                const est = parseFloat(p.estoque||0);
                const min = parseFloat(p.estoqueMinimo||0);
                const max = parseFloat(p.estoqueMaximo||0);
                const val = est * parseFloat(p.custo||0);
                let status, cls;
                if (est === 0) { status='Zerado'; cls='badge-danger'; }
                else if (min > 0 && est <= min) { status='Crítico'; cls='badge-warning'; }
                else { status='Normal'; cls='badge-success'; }
                return `<tr>
                  <td><strong>${p.nome}</strong></td>
                  <td><span class="badge badge-gray">${p.categoria||'—'}</span></td>
                  <td class="${est<=min&&min>0?'text-warning':''}" style="font-weight:600">${est.toFixed(2)} ${p.unidade||''}</td>
                  <td style="font-size:.83rem">${min} ${p.unidade||''}</td>
                  <td style="font-size:.83rem">${max||'—'} ${p.unidade||''}</td>
                  <td>R$ ${parseFloat(p.custo||0).toFixed(2)}</td>

  renderProducao() {
    const producoes = DB.getProducoes()

    return `
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card" style="--stat-color:var(--accent);--stat-bg:var(--accent-dim)">
          <div class="stat-icon">🍳</div>
          <div class="stat-info">
            <div class="stat-value">${producoes.length}</div>
            <div class="stat-label">Produções no Período</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color:var(--info);--stat-bg:var(--info-dim)">
          <div class="stat-icon">📋</div>
          <div class="stat-info">
            <div class="stat-value">${[...new Set(producoes.map(p=>p.fichaId||p.produtoId))].length}</div>

          <div style="font-weight:600">Histórico de Produções</div>
          <button class="btn btn-secondary btn-sm" onclick="RelatoriosPage.exportProducoes()">⬇️ CSV</button>
        </div>
        ${producoes.length === 0 ? '<div class="empty-state"><p class="text-muted">Nenhuma produção no período</p></div>' : `
          <table>
            <thead><tr><th>Data</th><th>Produto</th><th>Ficha</th><th>Lote</th><th>Quantidade</th><th>Validade</th><th>Local</th></tr></thead>
            <tbody>
              ${producoes.map(p => `<tr>
                <td style="font-size:.8rem">${new Date(p.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                <td><strong>${p.nomeProduto||'—'}</strong></td>
                <td style="font-size:.8rem">${p.fichaName||'Avulsa'}</td>
                <td><code style="font-size:.72rem;color:var(--text-secondary)">${p.lote}</code></td>
                <td class="text-accent fw-bold">${p.quantidade} ${p.unidade||''}</td>
                <td style="font-size:.8rem">${p.validade||'—'}</td>
                <td style="font-size:.8rem">${p.local||'—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        `}
      </div>
    `;
  },

  renderPerdas() {
    const movs = this.getMovsFiltradas();

    const totalDescarte = descartes.reduce((s,m) => {
      const p = DB.getProdutoPorId(m.produtoId);
      return s + (parseFloat(p?.custo||0) * parseFloat(m.quantidade||0));
    }, 0);

    return `
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card" style="--stat-color:var(--danger);--stat-bg:var(--danger-dim)">

            <div class="stat-label">Descartes no Período</div>
          </div>
        </div>

          <div class="stat-icon">💸</div>
          <div class="stat-info">
            <div class="stat-value">R$ ${totalDescarte.toFixed(2)}</div>
            <div class="stat-label">Custo das Perdas</div>
          </div>
        </div>
        <div class="stat-card" style="--stat-color:var(--warning);--stat-bg:var(--warning-dim)">
          <div class="stat-icon">❌</div>

            <div class="stat-value">${vencidos.length}</div>
            <div class="stat-label">Lotes Vencidos Agora</div>
          </div>
        </div>

      ${vencidos.length > 0 ? `

                <td>${l.quantidadeAtual}</td>

                <td><button class="btn btn-danger btn-sm" onclick="ArmazenamentoPage.descartar('${l.id}')">Descartar</button></td>

  postRender() {
    this.postRenderAba();
  },

  postRenderAba() {
    if (this.abaAtiva === 'movimentacao') {
      this.renderChartMovPeriodo();
      this.renderChartTipo();
    }
  },

  renderChartMovPeriodo() {
    const ctx = document.getElementById('chartRelMov');
    if (!ctx) return;

    const movs = this.getMovsFiltradas();
    const inicio = new Date(this.dataInicio);
    const fim = new Date(this.dataFim);
    const days = Math.min(60, Math.ceil((fim - inicio) / (1000*60*60*24)) + 1);

    const labels = [], entradas = [], saidas = [];
    for (let i = 0; i < days; i++) {
      const d = new Date(inicio);
      d.setDate(d.getDate() + i);
      const dayStr = d.toDateString();
      labels.push(d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}));
      const dayMovs = movs.filter(m => new Date(m.data).toDateString() === dayStr);
      entradas.push(dayMovs.filter(m=>m.tipo==='entrada').length);
      saidas.push(dayMovs.filter(m=>m.tipo==='saida'||m.tipo==='consumo').length);
    }

    if (this.charts.mov) this.charts.mov.destroy();
    this.charts.mov = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Entradas', data: entradas, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', tension: 0.4, fill: true, borderWidth: 2, pointRadius: 3 },
          { label: 'Saídas', data: saidas, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', tension: 0.4, fill: true, borderWidth: 2, pointRadius: 3 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8b949e', maxTicksLimit: 10 } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8b949e' } }
        }
      }
    });
  },

  renderChartTipo() {
    const ctx = document.getElementById('chartRelTipo');
    if (!ctx) return;
    const movs = this.getMovsFiltradas();
    const ent = movs.filter(m=>m.tipo==='entrada').length;
    const sai = movs.filter(m=>m.tipo==='saida').length;
    const cons = movs.filter(m=>m.tipo==='consumo').length;

    if (this.charts.tipo) this.charts.tipo.destroy();
    this.charts.tipo = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Entradas','Saídas','Consumos de Produção'],
        datasets: [{ data: [ent,sai,cons], backgroundColor: ['#10b981','#ef4444','#8b5cf6'], borderColor: 'transparent', borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { color: '#8b949e', font: { size: 11 }, padding: 12 } } }
      }
    });
  },

  exportMovs() {
    const movs = this.getMovsFiltradas();
    const header = 'Data,Tipo,Produto,Quantidade,Unidade,Custo,Motivo,Observação';
    const rows = movs.map(m => {
      const p = DB.getProdutoPorId(m.produtoId);
      return [new Date(m.data).toLocaleString('pt-BR'), m.tipo, p?.nome||m.produtoNome||'', m.quantidade, p?.unidade||'', m.custo||0, m.motivo||'', m.observacao||'']
        .map(v=>`"${v}"`).join(',');
    });
    const csv = [header,...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = `movimentacoes_${this.dataInicio}_${this.dataFim}.csv`;
    a.click();
  },

  exportProducoes() {
    const prods = DB.getProducoes();
    const header = 'Data,Produto,Ficha,Lote,Quantidade,Unidade,Validade,Local';
    const rows = prods.map(p=>[new Date(p.data).toLocaleString('pt-BR'),p.nomeProduto,p.fichaName||'',p.lote,p.quantidade,p.unidade,p.validade,p.local].map(v=>`"${v||''}"`).join(','));
    const csv = [header,...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = `producoes_${this.dataInicio}_${this.dataFim}.csv`;
    a.click();
  }
};

                    <td>
                      <span style="padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600;background:${c.status==='pendente'?'rgba(234,179,8,.15)':c.status==='usado'?'rgba(16,185,129,.15)':'rgba(107,114,128,.15)'};color:${c.status==='pendente'?'#eab308':c.status==='usado'?'#10b981':'#6b7280'}">
                        ${c.status === 'pendente' ? 'Pendente' : c.status === 'usado' ? 'Cadastrado' : 'Cancelado'}

                    <td>${c.criadoEm ? new Date(c.criadoEm).toLocaleDateString('pt-BR') : '—'}</td>

                        <button class="btn btn-sm btn-secondary" onclick="DpPage.copiarLink('${c.token}')">Copiar Link</button>
                        <button class="btn btn-sm" style="margin-left:4px;background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)" onclick="DpPage.cancelarConvite('${c.token}')">Cancelar</button>
                      ` : ''}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      ` : ''}
    `;
  },

  postRender() {
    setTimeout(function() {
      if (!window.emailjs) {
        App.showToast('⚠️ EmailJS não carregou. Convites serão salvos sem envio de email.', 'warning');
      }
    }, 1500);
  },

  abrirConvite() {
    App.openModal('Convidar Funcionário', `
      <div class="form-group">
        <label>Nome completo *</label>
        <input type="text" id="cNome" class="form-control" placeholder="Nome do funcionário" />
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="cEmail" class="form-control" placeholder="email@exemplo.com" />
      </div>
      <div class="form-group">
        <label>Cargo *</label>
        <select id="cCargo" class="form-control">
          <option value="">Selecione...</option>
          ${CARGOS_DP.map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Data de admissão</label>
        <input type="date" id="cAdmissao" class="form-control" value="${new Date().toISOString().split('T')[0]}" />
      </div>
    `, [
      { label: 'Cancelar', class: 'btn-secondary', action: 'App.closeModal()' },
      { label: 'Enviar Convite', class: 'btn-primary', action: 'DpPage.enviarConvite()' }
    ]);
  },

  enviarConvite() {
    const nome     = (document.getElementById('cNome').value || '').trim();
    const email    = (document.getElementById('cEmail').value || '').trim();
    const cargo    = document.getElementById('cCargo').value;
    const admissao = document.getElementById('cAdmissao').value;

    if (!nome || !email || !cargo) {
      App.showToast('Preencha nome, email e cargo', 'error');
      return;
    }

    const token  = _dpGerarToken();
    const codigo = _dpGerarCodigo();
    const link   = window.location.origin + '/funcionario.html?t=' + token;

    DB.addConvite({ token, email, nome, cargo, codigo, admitidoEm: admissao, status: 'pendente', criadoEm: new Date().toISOString() });

    const ejsCarregado = !!window.emailjs;
    const ejsConfigurado = DP_EMAILJS.publicKey !== 'SEU_PUBLIC_KEY';
    console.log('[DP] emailjs carregado:', ejsCarregado, '| configurado:', ejsConfigurado);

    if (ejsConfigurado && ejsCarregado) {
      emailjs.send(DP_EMAILJS.serviceId, DP_EMAILJS.templateId, {
        to_name: nome, to_email: email, cargo, codigo, link_cadastro: link
      }, { publicKey: DP_EMAILJS.publicKey })
      .then(function(resp) {
        console.log('[DP] EmailJS sucesso:', resp);
        App.closeModal();
        App.showToast('Convite enviado para ' + email, 'success');
        App.navigateTo('dp');
      })
      .catch(function(err) {
        console.error('[EmailJS] erro:', err);
        const detalhe = err && (err.text || err.message || JSON.stringify(err));
        App.openModal('Erro ao enviar email', `
          <p style="margin-bottom:12px">O convite foi salvo, mas o email não foi enviado. Use <strong>"Copiar Link"</strong> para enviar manualmente.</p>
          <p style="font-size:.8rem;color:var(--text-secondary);margin-bottom:6px">Detalhe do erro:</p>
          <pre style="background:#0d1117;padding:12px;border-radius:8px;font-size:.78rem;color:#f87171;white-space:pre-wrap;word-break:break-all">${detalhe}</pre>
        `, [{ label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal();App.navigateTo("dp")' }]);
      });
    } else {
      const motivo = !ejsCarregado ? 'EmailJS não carregou (verifique sua conexão)' : 'EmailJS não configurado';
      App.openModal('Convite salvo — email não enviado', `
        <p style="margin-bottom:16px">Motivo: <strong>${motivo}</strong></p>
        <p style="margin-bottom:8px;color:var(--text-secondary)">Envie o link abaixo diretamente ao funcionário:</p>

        { label: 'Copiar link', class: 'btn-primary', action: `navigator.clipboard.writeText('${link}').then(()=>App.showToast('Link copiado!','success'))` },
        { label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal();App.navigateTo("dp")' }
      ]);
    }

  copiarLink(token) {
    const link = window.location.origin + '/funcionario.html?t=' + token;

      navigator.clipboard.writeText(link).then(() => App.showToast('Link copiado!', 'success'));
    } else {
      App.openModal('Link do Cadastro', `

// ── HELPERS ────────────────────────────────────────────────────────────────────

function _dpGerarToken() {
  return 'tk' + Date.now().toString(36) + Math.random().toString(36).substr(2, 8);
}

function _dpGerarCodigo() {
  const funcs = DB.getFuncionarios();
  const convites = DB.getConvites().filter(c => c.status !== 'cancelado');
  const numeros = [...funcs, ...convites].map(x => parseInt((x.codigo || 'FUN000').replace('FUN', '')) || 0);
  const proximo = (numeros.length > 0 ? Math.max(...numeros) + 1 : 1).toString().padStart(3, '0');
  return 'FUN' + proximo;
}

function _dpMascaraCpf(cpf) {
  const c = cpf.replace(/\D/g, '');
  return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

function _dpDocBtn(base64, label) {
  if (!base64) {
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;border:1px dashed var(--border);color:var(--text-secondary);font-size:.82rem;opacity:.5">${label} <span style="font-size:.72rem">(não enviado)</span></div>`;
  }
  const isPdf = base64.startsWith('data:application/pdf');
  return `<button class="btn btn-secondary btn-sm" style="gap:6px" onclick="DpPage.verDocumento('${label}', event.currentTarget)"
    data-src="${base64}">
    ${isPdf ? '📄' : '🖼️'} ${label}
  </button>`;
}

function _dpCampo(label, value) {
  return `<div>
    <div style="font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text-secondary);margin-bottom:3px">${label}</div>
    <div style="font-weight:500;font-size:.9rem">${value || '<span style="color:var(--text-secondary)">—</span>'}</div>
  </div>`;
}


/**
 * app.js — Orchestrator principal do Controle Cozinha Central
 */

const App = {
  currentPage: 'dashboard',
  pages: {
    dashboard: { module: 'DashboardPage', title: '📊 Dashboard' },
    produtos: { module: 'ProdutosPage', title: '📦 Produtos' },

    armazenamento: { module: 'ArmazenamentoPage', title: '🗄️ Armazenamento' },
    saida: { module: 'SaidaPage', title: '📤 Saída de Produtos' },
    pedidos: { module: 'PedidosPage', title: '🛒 Pedidos / Romaneio' },
    relatorios: { module: 'RelatoriosPage', title: '📊 Relatórios' },
    dp: { module: 'DpPage', title: '👥 Departamento Pessoal' },
  },

  init() {
    // Sidebar toggle
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      const sidebar = document.getElementById('sidebar');
      const main = document.getElementById('mainContent');
      sidebar.classList.toggle('collapsed');
      main.classList.toggle('expanded');
    });

    // Mobile menu
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('mobile-open');
    });

    // Nav items
    document.querySelectorAll('.nav-item[data-page]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const page = el.dataset.page;
        this.navigateTo(page);

        // Fechar sidebar mobile
        document.getElementById('sidebar').classList.remove('mobile-open');
      });
    });

    // Modal close
    document.getElementById('modalClose').addEventListener('click', () => this.closeModal());
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) this.closeModal();
    });

    // Data/hora
    this.updateDateTime();
    setInterval(() => this.updateDateTime(), 60000);

    // Alertas de notificação
    this.checkAlerts();

    // URL hash routing
    const hash = window.location.hash.replace('#', '');
    if (hash && this.pages[hash]) {
      this.navigateTo(hash);
    } else {
      this.navigateTo('dashboard');
    }

    // Leitor USB de código de barras (listener global)
    BarcodeScanner.initKeyboardListener((codigo) => {
      // Delegate to page handler if exists
      var module = window.moduleRegistry ? window.moduleRegistry[this.pages[this.currentPage].module] : null;
      if (module && typeof module.onBarcodeScanned === 'function') {
        module.onBarcodeScanned(codigo);
        return;
      }
      
      const p = DB.getProdutoPorCodigo(codigo);
      if (p) {
        this.showToast(`📷 Produto lido: ${p.nome}`, 'info');
      }
    });
  },

  navigateTo(page) {
    if (!this.pages[page]) return;

    if (!window.moduleRegistry) {
        window.moduleRegistry = {
          DashboardPage:     DashboardPage,
          ProdutosPage:      ProdutosPage,
          FichasPage:        FichasPage,
          EntradaPage:       EntradaPage,
          ProducaoPage:      ProducaoPage,
          ArmazenamentoPage: ArmazenamentoPage,
          SaidaPage:         SaidaPage,
          PedidosPage:       PedidosPage,
          RelatoriosPage:    RelatoriosPage,
          DpPage:            DpPage
        };
    }

    this.currentPage = page;
    window.location.hash = page;

    // Atualiza nav
    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
    var navEl = document.querySelector('.nav-item[data-page="' + page + '"]');
    if (navEl) navEl.classList.add('active');

    // Atualiza título
    document.getElementById('pageTitle').textContent = this.pages[page].title;
    document.title = this.pages[page].title + " — Controle Cozinha Central";

    // Renderiza página
    var module = window.moduleRegistry[this.pages[page].module];
    if (!module) {
      document.getElementById('pageContainer').innerHTML = '<div style="padding:40px;color:#ef4444">Módulo não encontrado: ' + this.pages[page].module + '</div>';
      return;
    }

    var container = document.getElementById('pageContainer');
    try {
      container.innerHTML = module.render();
    } catch(err) {
      container.innerHTML = '<div style="padding:40px;color:#ef4444;font-family:sans-serif"><h3>Erro ao renderizar: ' + this.pages[page].title + '</h3><pre style="background:#1a1a2e;padding:16px;border-radius:8px;font-size:.78rem;overflow:auto;color:#f87171">' + (err.stack || err.message) + '</pre></div>';
      return;
    }

    // Post-render hook
    if (module.postRender) {
      requestAnimationFrame(function() { module.postRender(); });
    }

    container.scrollTop = 0;
  },

  openModal(title, body, buttons = [], extraClass = '') {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = body;

    const footer = document.getElementById('modalFooter');
    footer.innerHTML = buttons.map(btn =>
      `<button class="btn ${btn.class}" onclick="${btn.action}">${btn.label}</button>`
    ).join('');

    const modal = document.getElementById('modal');
    modal.className = `modal ${extraClass}`;

    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';

    // Focus primeiro input
    setTimeout(() => {
      const firstInput = modal.querySelector('input:not([type="submit"]), select');
      if (firstInput) firstInput.focus();
    }, 100);
  },

  closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
  },

  showToast(message, type = 'info') {
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    const container = document.getElementById('toastContainer');

    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
      <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
      <span class="toast-msg">${message}</span>
    `;
    container.appendChild(toast);

    setTimeout(() => {
      toast.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  },

  updateDateTime() {
    const now = new Date();
    const opts = { weekday: 'short', day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' };
    document.getElementById('dateDisplay').textContent = now.toLocaleDateString('pt-BR', opts);
  },

  checkAlerts() {
    const estoquesBaixos = DB.getEstoquesBaixos().length;
    const vencidos = DB.getLotesVencidos().length;
    const vencendo = DB.getLotesVencendo(7).length;

    const total = estoquesBaixos + vencidos + vencendo;
    const dot = document.getElementById('notifDot');
    if (dot) dot.classList.toggle('visible', total > 0);

    // Atualizar badge de entrada
    const badgeEntrada = document.getElementById('badge-entrada');
    if (badgeEntrada) {
      const hoje = new Date().toDateString();
      const entradasHoje = DB.getMovimentacoesPorTipo('entrada').filter(e => new Date(e.data).toDateString() === hoje).length;
      if (entradasHoje > 0) {
        badgeEntrada.textContent = entradasHoje;
        badgeEntrada.classList.add('visible');
      }
    }

    // Botão de notificação
    const notifBtn = document.getElementById('notifBtn');
    if (notifBtn && total > 0) {
      notifBtn.addEventListener('click', () => {
        let msg = '⚠️ Alertas do sistema:\n';
        if (estoquesBaixos > 0) msg += `• ${estoquesBaixos} produto(s) com estoque crítico\n`;
        if (vencidos > 0) msg += `• ${vencidos} lote(s) com validade vencida\n`;
        if (vencendo > 0) msg += `• ${vencendo} lote(s) vencem nos próximos 7 dias\n`;
        this.openModal('🔔 Notificações', `
          <div style="display:flex;flex-direction:column;gap:8px">
            ${estoquesBaixos > 0 ? `<div class="alert alert-warning">⚠️ ${estoquesBaixos} produto(s) com estoque crítico — <a href="#" onclick="App.closeModal();App.navigateTo('produtos')" style="color:inherit;text-decoration:underline">Ver produtos</a></div>` : ''}
            ${vencidos > 0 ? `<div class="alert alert-danger">❌ ${vencidos} lote(s) com VALIDADE VENCIDA — <a href="#" onclick="App.closeModal();App.navigateTo('armazenamento')" style="color:inherit;text-decoration:underline">Ver armazenamento</a></div>` : ''}
            ${vencendo > 0 ? `<div class="alert alert-warning">⏰ ${vencendo} lote(s) vencem nos próximos 7 dias — <a href="#" onclick="App.closeModal();App.navigateTo('armazenamento')" style="color:inherit;text-decoration:underline">Ver armazenamento</a></div>` : ''}
            ${total === 0 ? '<div class="alert alert-success">✅ Nenhum alerta no momento!</div>' : ''}
          </div>
        `, [{ label: 'Fechar', class: 'btn-secondary', action: 'App.closeModal()' }]);
      }, { once: true });
    } else if (notifBtn) {
      notifBtn.addEventListener('click', () => {
        this.showToast('✅ Nenhum alerta no momento!', 'success');
      });
    }
  }
};

// Inicializar — funciona tanto com script externo quanto inline no final do body
function _startApp() {
  try {
    App.init();
  } catch(err) {
    console.error('Erro ao iniciar ChefERP:', err);
    var c = document.getElementById('pageContainer');
    if (c) c.innerHTML = '<div style="padding:40px;color:#ef4444;font-family:sans-serif"><h2>Erro ao carregar</h2><pre style="background:#1a1a2e;padding:16px;border-radius:8px;font-size:.8rem;overflow:auto">' + err.stack + '</pre></div>';
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _startApp);
} else {
  // DOM já está pronto (script inline no final do body)
  _startApp();
}

// Atalhos de teclado
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var overlay = document.getElementById('modalOverlay');
    if (overlay && overlay.classList.contains('active')) App.closeModal();
    var scanner = document.getElementById('scannerOverlay');
    if (scanner && scanner.classList.contains('active')) BarcodeScanner.close();
  }
});
</script>
</body>
