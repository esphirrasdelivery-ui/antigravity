<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ERP para Cozinha Industrial — Controle completo de estoque, produção e armazenamento" />
  <title>Controle Cozinha Central — Esphirra's Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QuaggaJS for barcode scanning -->
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: #1c2230;
  --bg-card-hover: #212a3a;
  --bg-input: #0d1117;

  --accent: #10b981;
  --accent-light: #34d399;
  --accent-dim: rgba(16, 185, 129, 0.15);
  --accent-glow: rgba(16, 185, 129, 0.4);

  --warning: #f59e0b;
  --warning-dim: rgba(245, 158, 11, 0.15);
  --danger: #ef4444;
  --danger-dim: rgba(239, 68, 68, 0.15);
  --info: #3b82f6;
  --info-dim: rgba(59, 130, 246, 0.15);
  --purple: #8b5cf6;
  --purple-dim: rgba(139, 92, 246, 0.15);

  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;

  --border: rgba(255,255,255,0.08);
  --border-accent: rgba(16, 185, 129, 0.3);

  --sidebar-width: 240px;
  --header-height: 64px;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;

  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.5);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 15px; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition), width var(--transition);
  overflow: hidden;
}

.sidebar.collapsed { width: 72px; }
.sidebar.collapsed .logo-text,
.sidebar.collapsed .nav-item span:not(.nav-icon),
.sidebar.collapsed .nav-section-label,
.sidebar.collapsed .user-details,
.sidebar.collapsed .nav-badge { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 12px; }
.sidebar.collapsed .logo { justify-content: center; }

.sidebar-header {
  padding: 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  min-height: var(--header-height);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-img {
  width: 44px;
  height: 44px;
  object-fit: contain;
  border-radius: 50%;
  flex-shrink: 0;
  filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
}

.logo-text { display: flex; flex-direction: column; }
.logo-title {
  font-size: .95rem;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.logo-subtitle {
  font-size: 0.65rem;
  color: #FFD700;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.sidebar-toggle {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  display: flex;
  transition: all var(--transition);
}
.sidebar-toggle:hover { background: var(--border); color: var(--text-primary); }

.sidebar-nav {
  flex: 1;
  padding: 12px 8px;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.nav-section-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 16px 12px 6px;
  white-space: nowrap;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  white-space: nowrap;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 60%;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.nav-icon {
  width: 18px; height: 18px;
  flex-shrink: 0;
}

.nav-badge {
  margin-left: auto;
  background: var(--danger);
  color: white;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  min-width: 20px;
  text-align: center;
  display: none;
}
.nav-badge.visible { display: block; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--info));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}

.user-details { display: flex; flex-direction: column; }
.user-name { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); }
.user-role { font-size: 0.7rem; color: var(--accent); }

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: margin-left var(--transition);
}
.main-content.expanded { margin-left: 72px; }

/* ===== TOP HEADER ===== */
.top-header {
  height: var(--header-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  transition: all var(--transition);
}
.mobile-menu-btn:hover { background: var(--border); color: var(--text-primary); }

.header-breadcrumb {
  flex: 1;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.date-display {
  font-size: 0.8rem;
  color: var(--text-secondary);
  background: var(--bg-card);
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.btn-icon {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

.notif-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: var(--danger);
  border-radius: 50%;
  display: none;
}
.notif-dot.visible { display: block; }

/* ===== PAGE CONTENT ===== */
.page-container {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
}

/* ===== COMMON COMPONENTS ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.page-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-primary);
}

.page-header p {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.875rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-light);
  box-shadow: 0 0 20px var(--accent-glow);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) { background: var(--bg-card-hover); border-color: var(--accent); }

.btn-danger {
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.3);
}
.btn-danger:hover:not(:disabled) { background: var(--danger); color: white; }

.btn-warning {
  background: var(--warning-dim);
  color: var(--warning);
  border: 1px solid rgba(245,158,11,0.3);
}
.btn-warning:hover:not(:disabled) { background: var(--warning); color: black; }

.btn-sm {
  padding: 6px 12px;
  font-size: 0.8rem;
}
.btn-lg { padding: 12px 24px; font-size: 1rem; }

/* CARDS */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all var(--transition);
}
.card:hover { border-color: rgba(255,255,255,0.12); }

.card-glass {
  background: rgba(28, 34, 48, 0.8);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

/* STATS CARDS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--stat-color, var(--accent));
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

.stat-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--stat-bg, var(--accent-dim));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}

.stat-info { flex: 1; min-width: 0; }
.stat-value {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.stat-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* TABLES */
.table-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.table-toolbar {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.search-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  gap: 8px;
  flex: 1;
  min-width: 200px;
  max-width: 320px;
  transition: all var(--transition);
}
.search-input-wrap:focus-within { border-color: var(--accent); }
.search-input-wrap svg { color: var(--text-muted); flex-shrink: 0; }
.search-input-wrap input {
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 0.875rem;
  width: 100%;
  font-family: inherit;
}
.search-input-wrap input::placeholder { color: var(--text-muted); }

.table-actions { margin-left: auto; display: flex; gap: 8px; }

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  background: rgba(255,255,255,0.03);
  padding: 12px 20px;
  text-align: left;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}

tbody td {
  padding: 14px 20px;
  font-size: 0.875rem;
  color: var(--text-primary);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
.empty-state h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 0.85rem; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  gap: 4px;
}
.badge-success { background: var(--accent-dim); color: var(--accent); }
.badge-warning { background: var(--warning-dim); color: var(--warning); }
.badge-danger { background: var(--danger-dim); color: var(--danger); }
.badge-info { background: var(--info-dim); color: var(--info); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-gray { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

/* FORMS */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full-width { grid-column: 1 / -1; }

label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
}

input, select, textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.875rem;
  font-family: inherit;
  padding: 10px 14px;
  transition: all var(--transition);
  outline: none;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
input::placeholder, textarea::placeholder { color: var(--text-muted); }
select option { background: var(--bg-secondary); }

textarea { resize: vertical; min-height: 80px; }

.input-group {
  display: flex;
  gap: 0;
}
.input-group input {
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  flex: 1;
}
.input-group .btn {
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  flex-shrink: 0;
}

.form-hint {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal.modal-lg { max-width: 800px; }

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.92) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 1rem; font-weight: 700; }

.modal-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  display: flex;
  transition: all var(--transition);
}
.modal-close:hover { background: var(--danger-dim); color: var(--danger); }

.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* SCANNER OVERLAY */
.scanner-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
}
.scanner-overlay.active { display: flex; }

.scanner-container {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 100%;
  max-width: 520px;
  margin: 16px;
}

.scanner-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.scanner-header h3 { font-size: 1rem; font-weight: 700; }

.scanner-close {
  background: var(--danger-dim);
  border: none;
  color: var(--danger);
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.scanner-close:hover { background: var(--danger); color: white; }

.scanner-viewport {
  position: relative;
  background: #000;
  border-radius: var(--radius-sm);
  overflow: hidden;
  height: 260px;
  margin-bottom: 16px;
}

#interactive { width: 100% !important; height: 100% !important; }
#interactive video { width: 100% !important; height: 100% !important; object-fit: cover; }
#interactive canvas { display: none !important; }

.scanner-line {
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 2px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  animation: scanAnim 2s ease-in-out infinite;
}

@keyframes scanAnim {
  0%, 100% { top: 30%; opacity: 1; }
  50% { top: 70%; opacity: 0.7; }
}

.scanner-result {
  text-align: center;
  padding: 12px;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-bottom: 12px;
}

.scanner-manual {
  display: flex;
  gap: 8px;
}
.scanner-manual input { flex: 1; }

/* TOAST */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.875rem;
  font-weight: 500;
  box-shadow: var(--shadow);
  pointer-events: all;
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 260px;
  max-width: 380px;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px) scale(0.9); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes toastOut {
  to { opacity: 0; transform: translateX(40px) scale(0.9); }
}

.toast.toast-success { border-left: 3px solid var(--accent); }
.toast.toast-error { border-left: 3px solid var(--danger); }
.toast.toast-warning { border-left: 3px solid var(--warning); }
.toast.toast-info { border-left: 3px solid var(--info); }

.toast-icon { font-size: 1.1rem; flex-shrink: 0; }
.toast-msg { flex: 1; color: var(--text-primary); }

/* CHARTS */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.chart-card h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-secondary);
}

.chart-wrap {
  position: relative;
  height: 220px;
}

/* ALERTS */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 16px;
}

.alert-warning { background: var(--warning-dim); border: 1px solid rgba(245,158,11,0.3); color: var(--warning); }
.alert-danger { background: var(--danger-dim); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
.alert-success { background: var(--accent-dim); border: 1px solid var(--border-accent); color: var(--accent); }
.alert-info { background: var(--info-dim); border: 1px solid rgba(59,130,246,0.3); color: var(--info); }

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 20px;
  width: fit-content;
}

.tab-btn {
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
}
.tab-btn.active {
  background: var(--bg-card);
  color: var(--accent);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* PROGRESS */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
  background: var(--accent);
}
.progress-fill.warning { background: var(--warning); }
.progress-fill.danger { background: var(--danger); }

/* STOCK LEVEL */
.stock-level {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 100px;
}
.stock-level-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--text-secondary);
}

/* GRID LAYOUTS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* INGREDIENT LIST (Fichas) */
.ingredient-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 280px;
  overflow-y: auto;
}
.ingredient-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
}
.ingredient-item input { flex: 1; min-width: 80px; }
.ingredient-item select { flex: 2; }
.ingredient-item .remove-btn {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 1rem;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  transition: all var(--transition);
}
.ingredient-item .remove-btn:hover { background: var(--danger-dim); }

/* STORAGE LOCATIONS */
.storage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.storage-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all var(--transition);
}
.storage-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.storage-card.selected { border-color: var(--accent); background: var(--accent-dim); }
.storage-icon { font-size: 2rem; margin-bottom: 8px; }
.storage-name { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.storage-items { font-size: 0.78rem; color: var(--text-secondary); }

/* EXPIRY WARNINGS */
.expiry-near { color: var(--warning) !important; }
.expiry-expired { color: var(--danger) !important; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.mobile-open { transform: translateX(0); width: 240px; }
  .sidebar.mobile-open .logo-text,
  .sidebar.mobile-open .nav-item span,
  .sidebar.mobile-open .nav-section-label,
  .sidebar.mobile-open .user-details { display: flex; }
  .sidebar.mobile-open .nav-item { justify-content: flex-start; padding: 10px 12px; }
  .main-content { margin-left: 0 !important; }
  .mobile-menu-btn { display: flex; }
  .charts-grid { grid-template-columns: 1fr; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

@media (max-width: 600px) {
  .page-container { padding: 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .modal { max-width: 100%; }
}

/* UTILITY */
.text-accent { color: var(--accent); }
.text-warning { color: var(--warning); }
.text-danger { color: var(--danger); }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.fw-bold { font-weight: 700; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-16 { margin-bottom: 16px; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.w-full { width: 100%; }

/* FORM SECTION TITLE */
.form-section-title {
  font-size: .72rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .8px;
  padding-bottom: 8px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* TEMPERATURE OPTION CARDS */
.temp-option {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 400;
  cursor: pointer;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all var(--transition);
  user-select: none;
}
.temp-option:hover {
  border-color: var(--info);
  background: rgba(59,130,246,0.05);
}
.temp-option input[type="radio"] {
  width: auto;
  flex-shrink: 0;
}

/* PRINT */
@media print {
  .sidebar, .top-header, .page-actions, .modal-overlay { display: none !important; }
  .main-content { margin-left: 0 !important; }
  body { background: white; color: black; }
}
</style>

<script>/**
 * db.js — Camada de dados: Firebase Realtime Database + LocalStorage (cache offline)
 * Controle Cozinha Central — Esphirra's Delivery
 *
 * ── CONFIGURAÇÃO ──────────────────────────────────────────────────────────────
 * Substitua os valores abaixo com as informações do seu projeto Firebase.
 * Obtenha em: console.firebase.google.com → Configurações do projeto → Seus apps
 * ─────────────────────────────────────────────────────────────────────────────
 */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAogRVNoW95XtsY6sU7HQq0w8rSKIWqGP0",
  databaseURL:       "https://controle-cozinha-central-default-rtdb.firebaseio.com",
  projectId:         "controle-cozinha-central",
};

// ── ESTADO INTERNO ─────────────────────────────────────────────────────────────
var _fbReady   = false;   // Firebase está conectado e pronto
var _fbError   = false;   // Firebase falhou — usa só localStorage
var _syncQueue = [];      // Fila de escritas pendentes (modo offline)
var _listeners = {};      // Listeners ativos do Firebase

// ── CHAVES DO FIREBASE (coleções) ─────────────────────────────────────────────
var FB = {
  baseUrl: function() {
    return FIREBASE_CONFIG.databaseURL.replace(/\/$/, '');
  },
  url: function(colecao, id) {
    var base = FB.baseUrl() + '/' + colecao;
    return id ? base + '/' + id + '.json' : base + '.json';
  },
  headers: function() {
    return { 'Content-Type': 'application/json' };
  },

  // GET — busca todos os registros de uma coleção
  get: function(colecao) {
    return fetch(FB.url(colecao)).then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data) return [];
        // Firebase retorna objeto { id: {...}, id: {...} } — converte para array
        return Object.keys(data).map(function(k) {
          return Object.assign({}, data[k], { _fbKey: k });
        });
      });
  },

  // PUT — salva item (usa id como chave Firebase)
  put: function(colecao, id, dados) {
    return fetch(FB.url(colecao, id), {
      method:  'PUT',
      headers: FB.headers(),
      body:    JSON.stringify(dados)
    }).then(function(r) { return r.json(); });
  },

  // DELETE — remove item
  del: function(colecao, id) {
    return fetch(FB.url(colecao, id), { method: 'DELETE' }).then(function(r) { return r.json(); });
  },

  // PATCH — atualiza campos específicos
  patch: function(colecao, id, updates) {
    return fetch(FB.url(colecao, id), {
      method:  'PATCH',
      headers: FB.headers(),
      body:    JSON.stringify(updates)
    }).then(function(r) { return r.json(); });
  }
};

// ── INICIALIZAÇÃO E SYNC ───────────────────────────────────────────────────────
function _inicializarFirebase() {
  if (!FIREBASE_CONFIG.databaseURL || FIREBASE_CONFIG.databaseURL === 'FIREBASE_DATABASE_URL') {
    console.warn('[DB] Firebase não configurado. Usando apenas localStorage.');
    _fbError = true;
    return;
  }

  // Testa conexão
  fetch(FIREBASE_CONFIG.databaseURL.replace(/\/$/, '') + '/.json')
    .then(function(r) {
      if (r.ok) {
        _fbReady = true;
        _sincronizarDoFirebase();
        _mostrarStatusConexao(true);
        // Mantém todos os computadores sincronizados automaticamente
        setInterval(_sincronizarDoFirebase, 30000);
      } else {
        throw new Error('HTTP ' + r.status);
      }
    })
    .catch(function(e) {
      console.warn('[DB] Firebase offline. Modo local ativo.', e.message);
      _fbError = true;
      _mostrarStatusConexao(false);
    });
}

function _sincronizarDoFirebase() {
  var colecoes = ['chef_produtos', 'chef_movimentacoes', 'chef_lotes', 'chef_producoes', 'chef_fichas', 'chef_pedidos', 'chef_lojas_metas', 'chef_lixeira', 'chef_funcionarios', 'chef_convites'];
  var mudou = false;

  Promise.all(colecoes.map(function(col) {
    return FB.get(col).then(function(dados) {
      if (dados && dados.length > 0) {
        var novo = JSON.stringify(dados);
        if (novo !== localStorage.getItem(col)) {
          mudou = true;
          localStorage.setItem(col, novo);
        }
      }
    });
  }))
  .then(function() {
    // Catálogo é salvo como array direto (não como objetos com ID),
    // então precisa de tratamento especial fora do loop acima.
    return fetch(FB.baseUrl() + '/chef_pedido_catalogo.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var arr = null;
        if (Array.isArray(data)) {
          arr = data;
        } else if (data && typeof data === 'object') {
          // Firebase pode retornar objeto com chaves numéricas ao invés de array
          arr = Object.values(data).filter(function(v) { return v !== null; });
        }
        if (arr && arr.length > 0) {
          var novo = JSON.stringify(arr);
          if (novo !== localStorage.getItem('chef_pedido_catalogo')) {
            mudou = true;
            localStorage.setItem('chef_pedido_catalogo', novo);
          }
        }
      });
  })
  .then(function() {
    if (mudou) {
      console.log('[DB] Dados novos recebidos do Firebase — atualizando tela.');
      if (window.App && App.currentPage) {
        App.navigateTo(App.currentPage);
      }
    }
  })
  .catch(function(e) {
    console.warn('[DB] Erro ao sincronizar:', e);
  });
}

function _mostrarStatusConexao(online) {
  var el = document.getElementById('fbStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'fbStatus';
    el.style.cssText = 'position:fixed;bottom:8px;left:8px;font-size:.68rem;padding:3px 8px;border-radius:12px;z-index:9999;opacity:.85;font-weight:600';
    document.body.appendChild(el);
  }
  el.textContent   = online ? '☁️ Nuvem ativa' : '💾 Modo offline';
  el.style.background = online ? 'rgba(16,185,129,0.2)' : 'rgba(245,158,11,0.2)';
  el.style.color      = online ? '#10b981' : '#f59e0b';
  el.style.border     = '1px solid ' + (online ? 'rgba(16,185,129,0.4)' : 'rgba(245,158,11,0.4)');
}

// ── HELPERS INTERNOS ───────────────────────────────────────────────────────────
function _getLocal(chave) {
  return JSON.parse(localStorage.getItem(chave) || '[]');
}
function _saveLocal(chave, data) {
  localStorage.setItem(chave, JSON.stringify(data));
}
function _saveFirebase(colecao, id, dados) {
  if (!_fbReady) return;
  FB.put(colecao, id, dados).catch(function(e) {
    console.warn('[DB] Erro ao salvar no Firebase:', e);
  });
}
function _deleteFirebase(colecao, id) {
  if (!_fbReady) return;
  FB.del(colecao, id).catch(function(e) {
    console.warn('[DB] Erro ao deletar no Firebase:', e);
  });
}
function _patchFirebase(colecao, id, updates) {
  if (!_fbReady) return;
  FB.patch(colecao, id, updates).catch(function(e) {
    console.warn('[DB] Erro ao atualizar no Firebase:', e);
  });
}

// ── OBJETO PÚBLICO DB ──────────────────────────────────────────────────────────
const DB = {

  // ===== PRODUTOS =====
  getProdutos() {
    return _getLocal('chef_produtos');
  },
  saveProdutos(data) {
    _saveLocal('chef_produtos', data);
  },
  addProduto(produto) {
    const produtos = this.getProdutos();
    produto.id = 'p' + Date.now().toString();
    produto.criadoEm = new Date().toISOString();
    produtos.push(produto);
    this.saveProdutos(produtos);
    _saveFirebase('chef_produtos', produto.id, produto);
    return produto;
  },
  updateProduto(id, updates) {
    const produtos = this.getProdutos();
    const idx = produtos.findIndex(p => p.id === id);
    if (idx >= 0) {
      produtos[idx] = { ...produtos[idx], ...updates, atualizadoEm: new Date().toISOString() };
      this.saveProdutos(produtos);
      _saveFirebase('chef_produtos', id, produtos[idx]);
      return produtos[idx];
    }
    return null;
  },
  deleteProduto(id) {
    const produtos = this.getProdutos().filter(p => p.id !== id);
    this.saveProdutos(produtos);
    _deleteFirebase('chef_produtos', id);
  },
  getProdutoPorCodigo(codigo) {
    return this.getProdutos().find(p => p.codigoBarras === codigo || p.codigoInterno === codigo);
  },
  getProdutoPorId(id) {
    return this.getProdutos().find(p => p.id === id);
  },

  // ===== FICHAS TÉCNICAS =====
  getFichas() {
    return _getLocal('chef_fichas');
  },
  saveFichas(data) {
    _saveLocal('chef_fichas', data);
  },
  addFicha(ficha) {
    const fichas = this.getFichas();
    ficha.id = 'f' + Date.now().toString();
    ficha.criadoEm = new Date().toISOString();
    fichas.push(ficha);
    this.saveFichas(fichas);
    _saveFirebase('chef_fichas', ficha.id, ficha);
    return ficha;
  },
  updateFicha(id, updates) {
    const fichas = this.getFichas();
    const idx = fichas.findIndex(f => f.id === id);
    if (idx >= 0) {
      fichas[idx] = { ...fichas[idx], ...updates };
      this.saveFichas(fichas);
      _saveFirebase('chef_fichas', id, fichas[idx]);
      return fichas[idx];
    }
    return null;
  },
  deleteFicha(id) {
    const fichas = this.getFichas().filter(f => f.id !== id);
    this.saveFichas(fichas);
    _deleteFirebase('chef_fichas', id);
  },

  // ===== MOVIMENTAÇÕES DE ESTOQUE =====
  getMovimentacoes() {
    return _getLocal('chef_movimentacoes');
  },
  saveMovimentacoes(data) {
    _saveLocal('chef_movimentacoes', data);
  },
  addMovimentacao(mov) {
    const movs = this.getMovimentacoes();
    mov.id = 'm' + Date.now().toString() + Math.random().toString(36).substr(2, 4);
    mov.data = new Date().toISOString();
    movs.push(mov);
    this.saveMovimentacoes(movs);
    _saveFirebase('chef_movimentacoes', mov.id, mov);
    this._atualizarEstoque(mov);
    return mov;
  },
  _atualizarEstoque(mov) {
    const produto = this.getProdutoPorId(mov.produtoId);
    if (!produto) return;
    let qtd = parseFloat(produto.estoque || 0);
    if (mov.tipo === 'entrada') qtd += parseFloat(mov.quantidade);
    else if (mov.tipo === 'saida' || mov.tipo === 'consumo') qtd -= parseFloat(mov.quantidade);
    this.updateProduto(mov.produtoId, { estoque: Math.max(0, qtd) });
  },
  getMovimentacoesPorProduto(produtoId) {
    return this.getMovimentacoes().filter(m => m.produtoId === produtoId);
  },
  getMovimentacoesPorTipo(tipo) {
    return this.getMovimentacoes().filter(m => m.tipo === tipo);
  },
  getMovimentacoesRecentes(dias = 30) {
    const limite = new Date();
    limite.setDate(limite.getDate() - dias);
    return this.getMovimentacoes()
      .filter(m => new Date(m.data) >= limite)
      .sort((a, b) => new Date(b.data) - new Date(a.data));
  },

  // ===== PRODUÇÕES =====
  getProducoes() {
    return _getLocal('chef_producoes');
  },

  // ===== PEDIDOS DE LOJA =====
  getPedidos() {
    // Sempre exclui IDs que estão na lixeira — mesmo que o Firebase sync
    // tenha restaurado o pedido em chef_pedidos antes do DELETE concluir.
    const lixeiraIds = new Set((_getLocal('chef_lixeira') || []).map(i => i.id));
    return (_getLocal('chef_pedidos') || []).filter(p => !lixeiraIds.has(p.id));
  },
  savePedidos(data) {
    _saveLocal('chef_pedidos', data);
  },
  updatePedido(id, updates) {
    const pedidos = this.getPedidos();
    const idx = pedidos.findIndex(p => p.id === id);
    if (idx >= 0) {
      pedidos[idx] = { ...pedidos[idx], ...updates, atualizadoEm: new Date().toISOString() };
      this.savePedidos(pedidos);
      _saveFirebase('chef_pedidos', id, pedidos[idx]);
      return pedidos[idx];
    }
    return null;
  },
  deletePedido(id) {
    const pedido = this.getPedidos().find(p => p.id === id);
    if (!pedido) return;

    // 1. Remove do array local e do Firebase
    const pedidos = this.getPedidos().filter(p => p.id !== id);
    this.savePedidos(pedidos);

    // 2. Deleta do nó /chef_pedidos/<id> no Firebase de forma garantida
    fetch(FB.baseUrl() + '/chef_pedidos/' + id + '.json', { method: 'DELETE' })
      .catch(e => console.warn('[DB] Erro ao deletar pedido no Firebase:', e.message));

    // 3. Move para a lixeira (local + Firebase)
    this.moverParaLixeira(pedido);
  },

  // ===== LIXEIRA =====
  MESES_RETENCAO: 60, // 60 meses = 5 anos

  getLixeira() {
    return _getLocal('chef_lixeira') || [];
  },
  saveLixeira(data) {
    _saveLocal('chef_lixeira', data);
  },

  moverParaLixeira(pedido) {
    const lixeira = this.getLixeira();
    const item = {
      ...pedido,
      _deletadoEm: new Date().toISOString(),
      _expiraEm:   new Date(Date.now() + this.MESES_RETENCAO * 30 * 24 * 60 * 60 * 1000).toISOString()
    };
    lixeira.push(item);
    this.saveLixeira(lixeira);
    _saveFirebase('chef_lixeira', item.id, item);
  },

  restaurarDaLixeira(id) {
    const lixeira = this.getLixeira();
    const item = lixeira.find(i => i.id === id);
    if (!item) return;
    // Remove campos de lixeira e restaura como pedido pendente
    const { _deletadoEm, _expiraEm, ...pedido } = item;
    const pedidos = this.getPedidos();
    pedidos.push({ ...pedido, status: 'pendente' });
    this.savePedidos(pedidos);
    _saveFirebase('chef_pedidos', pedido.id, { ...pedido, status: 'pendente' });
    // Remove da lixeira
    this.saveLixeira(lixeira.filter(i => i.id !== id));
    fetch(FB.baseUrl() + '/chef_lixeira/' + id + '.json', { method: 'DELETE' })
      .catch(e => console.warn('[DB] Erro ao remover da lixeira Firebase:', e.message));
  },

  excluirDaLixeiraPermanentemente(id) {
    this.saveLixeira(this.getLixeira().filter(i => i.id !== id));
    fetch(FB.baseUrl() + '/chef_lixeira/' + id + '.json', { method: 'DELETE' })
      .catch(e => console.warn('[DB] Erro ao excluir lixeira Firebase:', e.message));
  },

  limparLixeiraExpirada() {
    const agora = new Date();
    const lixeira = this.getLixeira();
    const validos = lixeira.filter(i => {
      if (!i._expiraEm) return true; // sem data = mantém
      return new Date(i._expiraEm) > agora;
    });

    const produtos = this.getProdutos();

    // Mapa nome(lower) → produto — permite enriquecer itens do catálogo com dados do ERP
    const prodMap = {};
    produtos.forEach(p => { prodMap[p.nome.toLowerCase()] = p; });
    const _prodPorNome = nome => {
      const k = nome.toLowerCase();
      if (prodMap[k]) return prodMap[k];
      const match = Object.keys(prodMap).find(pk => pk.includes(k) || k.includes(pk));
      return match ? prodMap[match] : null;
    };
    // Garante que cada item do catálogo tenha fornecedor e max vindos do produto cadastrado
    // quando esses campos não estiverem definidos no catálogo
    const _enrich = item => {
      const p = _prodPorNome(item.nome);
      return {
        ...item,
        fornecedor: item.fornecedor || (p ? p.fornecedor || '' : ''),
        max: (item.max !== undefined && item.max !== null) ? item.max : (p ? parseFloat(p.formularioMaximo || 0) : 0)
      };

    // Recheios são derivados dos produtos cadastrados com categoria "Recheios"
    const recheios = produtos
      .filter(p => p.categoria === 'Recheios')
      .sort((a, b) => (a.nome || '').localeCompare(b.nome || '', 'pt-BR', { sensitivity: 'base' }))

/**
 * barcode.js — Módulo de leitura de código de barras
 * Usa QuaggaJS para leitura via câmera
 */

const BarcodeScanner = {
  isRunning: false,
  callbackFn: null,

  init(callback) {
    this.callbackFn = callback;
  },

  open(callback) {
    if (callback) this.callbackFn = callback;
    const overlay = document.getElementById('scannerOverlay');
    overlay.classList.add('active');
    document.getElementById('scannerResult').innerHTML = '<p>Iniciando câmera...</p>';
    document.getElementById('manualBarcode').value = '';
    this.start();
  },

  close() {
    this.stop();
    const overlay = document.getElementById('scannerOverlay');
    overlay.classList.remove('active');
  },

  start() {
    if (this.isRunning) return;

    // Verifica se QuaggaJS está disponível
    if (typeof Quagga === 'undefined') {
      document.getElementById('scannerResult').innerHTML =
        '<p style="color: var(--warning)">⚠️ Biblioteca de leitura não disponível. Use o campo manual abaixo.</p>';
      return;
    }

    const viewport = document.getElementById('interactive');
    viewport.innerHTML = '';

    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: viewport,
        constraints: {
          width: { min: 320 },
          height: { min: 240 },
          facingMode: 'environment',
          aspectRatio: { min: 1, max: 2 }
        }
      },
      locator: {
        patchSize: 'medium',
        halfSample: true
      },
      numOfWorkers: 2,
      frequency: 10,
      decoder: {
        readers: [
          'code_128_reader',
          'ean_reader',
          'ean_8_reader',
          'code_39_reader',
          'code_39_vin_reader',
          'codabar_reader',
          'upc_reader',
          'upc_e_reader',
          '2of5_reader',
          'i2of5_reader'
        ]
      },
      locate: true
    }, (err) => {
      if (err) {
        console.error('Quagga init error:', err);
        document.getElementById('scannerResult').innerHTML =
          `<p style="color: var(--danger)">❌ Câmera não disponível: ${err.message || err}.<br>Use o campo manual abaixo.</p>`;
        return;
      }
      Quagga.start();
      this.isRunning = true;
      document.getElementById('scannerResult').innerHTML =
        '<p>📷 Aponte a câmera para o código de barras...</p>';
    });

    Quagga.onDetected((result) => {
      if (!result || !result.codeResult) return;
      const code = result.codeResult.code;
      if (!code) return;

      // Feedback visual
      document.getElementById('scannerResult').innerHTML =
        `<p style="color: var(--accent)">✅ Código detectado: <strong>${code}</strong></p>`;

      this.stop();
      setTimeout(() => {
        this.close();
        if (this.callbackFn) this.callbackFn(code);
      }, 800);
    });

    Quagga.onProcessed((result) => {
      const drawingCtx = Quagga.canvas.ctx.overlay;
      const drawingCanvas = Quagga.canvas.dom.overlay;
      if (!drawingCtx || !drawingCanvas) return;
      drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute('width')), parseInt(drawingCanvas.getAttribute('height')));
    });
  },

  stop() {
    if (this.isRunning && typeof Quagga !== 'undefined') {
      try { Quagga.stop(); } catch(e) {}
    }
    this.isRunning = false;
  },

  // Leitura via USB (input de teclado) — detecta sequência rápida de teclas
  initKeyboardListener(callback) {
    let buffer = '';
    let timer = null;

    document.addEventListener('keydown', (e) => {
      // Ignora se estiver digitando em um input (exceto se for o leitor USB que é muito rápido)
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (timer) clearTimeout(timer);
      if (e.key === 'Enter' && buffer.length > 3) {
        callback(buffer);
        buffer = '';
        return;
      }
      if (e.key.length === 1) {
        buffer += e.key;
      }
      timer = setTimeout(() => {
        buffer = '';
      }, 100);
    });
  }
};

// Setup botões do scanner
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('scannerClose').addEventListener('click', () => {
    BarcodeScanner.close();
  });

  document.getElementById('manualBarcodeBtn').addEventListener('click', () => {
    const val = document.getElementById('manualBarcode').value.trim();
    if (val) {
      BarcodeScanner.close();
      if (BarcodeScanner.callbackFn) BarcodeScanner.callbackFn(val);
    }
  });

  document.getElementById('manualBarcode').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (val) {
        BarcodeScanner.close();
        if (BarcodeScanner.callbackFn) BarcodeScanner.callbackFn(val);
      }
    }
  });
});
